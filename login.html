    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: var(--font-zh);
        background: var(--gray-50);
        color: var(--dark-900);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .card {
        background: var(--white);
        border-radius: var(--radius-md);
        padding: 32px 24px;
        width: 100%;
        max-width: var(--max-width);
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      }
      .logo {
        text-align: center;
        margin-bottom: 24px;
      }
      .logo .icon {
        font-size: 48px;
      }
      .logo h1 {
        font-size: 22px;
        font-weight: 800;
        margin-top: 8px;
      }
      .logo p {
        font-size: 13px;
        color: var(--dark-700);
        margin-top: 4px;
      }
      .tabs {
        display: flex;
        margin-bottom: 20px;
        border-bottom: 2px solid var(--gray-200);
      }
      .tab {
        flex: 1;
        text-align: center;
        padding: 10px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        color: var(--dark-700);
        border-bottom: 2px solid transparent;
        margin-bottom: -2px;
        transition: all 0.2s;
      }
      .tab.active {
        color: var(--orange-700);
        border-bottom-color: var(--orange-700);
      }
      .form {
        display: none;
      }
      .form.active {
        display: block;
      }
      .form-group {
        margin-bottom: 14px;
      }
      .form-group label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 4px;
        color: var(--dark-700);
      }
      .form-group input {
        width: 100%;
        padding: 12px;
        border: 1px solid var(--gray-200);
        border-radius: var(--radius-sm);
        font-size: 15px;
        font-family: var(--font-zh);
        background: var(--white);
        transition: border 0.2s;
      }
      .form-group input:focus {
        outline: none;
        border-color: var(--orange-700);
      }
      .btn {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: var(--radius-sm);
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        font-family: var(--font-zh);
        transition: background 0.2s;
      }
      .btn-primary {
        background: var(--orange-600-bg);
        color: var(--white);
      }
      .btn-primary:hover {
        background: #e55a2b;
      }
      .btn-primary:disabled {
        background: var(--gray-200);
        cursor: not-allowed;
      }
      .btn-demo {
        background: var(--gray-100);
        color: var(--dark-700);
        margin-top: 8px;
        font-size: 13px;
        font-weight: 500;
      }
      .btn-demo:hover {
        background: var(--gray-200);
      }
      .msg {
        font-size: 13px;
        margin-top: 8px;
        padding: 8px;
        border-radius: 6px;
        display: none;
      }
      .msg.error {
        display: block;
        background: #fef2f2;
        color: var(--red-500);
      }
      .msg.success {
        display: block;
        background: #ecfdf5;
        color: var(--green-500);
      }
      .divider {
        text-align: center;
        margin: 16px 0;
        color: var(--dark-700);
        font-size: 13px;
        position: relative;
      }
      .divider::before,
      .divider::after {
        content: "";
        position: absolute;
        top: 50%;
        width: 42%;
        height: 1px;
        background: var(--gray-200);
      }
      .divider::before {
        left: 0;
      }
      .divider::after {
        right: 0;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .spinner {
        display: inline-block;
        width: 18px;
        height: 18px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        vertical-align: middle;
        margin-right: 8px;
      }
      @media (max-width: 480px) {
        .card {
          padding: 24px 16px;
        }
        .logo .icon {
          font-size: 36px;
        }
        .logo h1 {
          font-size: 18px;
        }
        .btn {
          padding: 12px;
          font-size: 14px;
        }
        .tab {
          font-size: 13px;
          padding: 8px;
        }
      }

  <body>
    <div class="card">
      <div class="logo">
        <div class="icon">🧘</div>
        <h1>ZenPass 禪流</h1>
        <p>解鎖全城 運動體驗</p>
      </div>

      <div class="tabs">
        <div class="tab active" onclick="switchTab('login')">登入</div>
        <div class="tab" onclick="switchTab('register')">註冊</div>
      </div>

      <!-- Login Form -->
      <div class="form active" id="form-login">
        <div class="form-group">
          <label>電郵</label>
          <input type="email" id="login-email" placeholder="your@email.com" />
        </div>
        <div class="form-group">
          <label>密碼</label>
          <input type="password" id="login-password" placeholder="••••••" />
        </div>
        <button class="btn btn-primary" id="login-btn" onclick="doLogin()">
          登入
        </button>
        <div class="msg" id="login-msg"></div>
        <div class="divider">快速登入</div>
        <div id="g_id_onload"
             data-client_id="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
             data-context="signin"
             data-ux_mode="popup"
             data-callback="handleGoogleCredential"
             data-auto_select="false"
             data-itp_support="true">
        </div>
        <div class="google-btn-wrapper"
             id="google-signin-button"
             style="display:flex;justify-content:center;margin-bottom:8px">
          <div class="g_id_signin"
               data-type="standard"
               data-shape="rectangular"
               data-theme="outline"
               data-text="signin_with"
               data-size="large"
               data-logo_alignment="left"
               style="width:100%;max-width:320px">
          </div>
        </div>
        <button
          class="btn btn-demo"
          onclick="socialLogin('apple')"
          style="
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            max-width: 320px;
            margin: 0 auto;
          "
        >
          <span style="font-size: 20px"></span> Apple 登入
        </button>
        <div class="divider">開發模式</div>
        <button class="btn btn-demo" onclick="quickLogin('admin')">
          🔑 快速登入 (管理員)
        </button>
        <button class="btn btn-demo" onclick="quickLogin('coach')">
          🔑 快速登入 (教練)
        </button>
        <button class="btn btn-demo" onclick="quickLogin('student')">
          🔑 快速登入 (學生)
        </button>
      </div>

      <!-- Register Form -->
      <div class="form" id="form-register">
        <div class="form-group">
          <label>姓名</label>
          <input type="text" id="reg-name" placeholder="你的名字" />
        </div>
        <div class="form-group">
          <label>電郵</label>
          <input type="email" id="reg-email" placeholder="your@email.com" />
        </div>
        <div class="form-group">
          <label>密碼</label>
          <input
            type="password"
            id="reg-password"
            placeholder="至少 6 個字元"
          />
        </div>
        <button
          class="btn btn-primary"
          id="register-btn"
          onclick="doRegister()"
        >
          註冊
        </button>
        <div class="msg" id="register-msg"></div>
      </div>
    </div>

    <script>
      // Get redirect URL from query parameter (e.g., ?redirect=payment.html?type=membership...)
      var loginRedirect = (function () {
        var match = window.location.search.match(/[?&]redirect=([^&]+)/);
        return match ? decodeURIComponent(match[1]) : null;
      })();

      function switchTab(tab) {
        document.querySelectorAll(".tab").forEach(function (t) {
          t.classList.remove("active");
        });
        document.querySelectorAll(".form").forEach(function (f) {
          f.classList.remove("active");
        });
        if (tab === "login") {
          document
            .querySelector(".tab[onclick*='login']")
            .classList.add("active");
          document.getElementById("form-login").classList.add("active");
        } else {
          document
            .querySelector(".tab[onclick*='register']")
            .classList.add("active");
          document.getElementById("form-register").classList.add("active");
        }
      }

      function setMsg(id, text, type) {
        var el = document.getElementById(id);
        el.textContent = text;
        el.className = "msg " + type;
      }

      async function doLogin() {
        var email = document.getElementById("login-email").value.trim();
        var password = document.getElementById("login-password").value;
        if (!email || !password) {
          setMsg("login-msg", "請輸入電郵和密碼", "error");
          return;
        }

        var btn = document.getElementById("login-btn");
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> 登入中...';

        try {
          var result = await auth.login({ email: email, password: password });
          setToken(result.token);
          storeUser(result.user);
          setMsg("login-msg", "✅ 登入成功！", "success");
          setTimeout(function () {
            window.location.href = loginRedirect || "explore.html";
          }, 800);
        } catch (e) {
          setMsg("login-msg", "❌ " + e.message, "error");
          btn.disabled = false;
          btn.textContent = "登入";
        }
      }

      async function doRegister() {
        var name = document.getElementById("reg-name").value.trim();
        var email = document.getElementById("reg-email").value.trim();
        var password = document.getElementById("reg-password").value;
        if (!name || !email || !password) {
          setMsg("register-msg", "請填寫所有欄位", "error");
          return;
        }
        if (password.length < 6) {
          setMsg("register-msg", "密碼至少需要 6 個字元", "error");
          return;
        }

        var btn = document.getElementById("register-btn");
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> 註冊中...';

        try {
          var result = await auth.register({
            name: name,
            email: email,
            password: password,
          });
          setToken(result.token);
          storeUser(result.user);
          setMsg("register-msg", "✅ 註冊成功！", "success");
          // Check if first-time user → redirect to onboarding
          var isFirstTime = !localStorage.getItem("zenpass_visited_before");
          localStorage.setItem("zenpass_visited_before", "1");
          var redirectTo =
            loginRedirect || (isFirstTime ? "onboarding.html" : "explore.html");
          setTimeout(function () {
            window.location.href = redirectTo;
          }, 800);
        } catch (e) {
          setMsg("register-msg", "❌ " + e.message, "error");
          btn.disabled = false;
          btn.textContent = "註冊";
        }
      }
      async function quickLogin(role) {
        var names = {
          admin: "管理員",
          manager: "平台經理",
          staff: "平台前線員工",
          partner: "場地營運",
          coach: "靜儀導師",
          student: "張三同學",
        };
        var emails = {
          admin: "admin@zenpass.hk",
          manager: "manager@zenpass.hk",
          staff: "staff@zenpass.hk",
          partner: "venue@zenpass.hk",
          coach: "coach@zenpass.hk",
          student: "student@zenpass.hk",
        };
        var passwords = {
          admin: "admin123",
          manager: "zenpass123",
          staff: "zenpass123",
          partner: "zenpass123",
          coach: "coach123",
          student: "admin123",
        };
        // Call real API to get valid JWT token
        try {
          var resp = await fetch(API_BASE + "/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              email: emails[role],
              password: passwords[role],
            }),
          });
          var data = await resp.json();
          if (data.token) {
            setToken(data.token);
            var userData = data.user || {};
            storeUser({
              name: names[role],
              email: emails[role],
              phone: userData.phone || "",
              role: role,
              credits: userData.credits || (role === "coach" ? 0 : 45),
            });
          } else {
            // Fallback: use demo token
            setToken("demo_token_" + role);
            storeUser({
              name: names[role],
              email: emails[role],
              phone: "",
              role: role,
              credits: 45,
            });
          }
        } catch (e) {
          setToken("demo_token_" + role);
          storeUser({
            name: names[role],
            email: emails[role],
            phone: "",
            role: role,
            credits: 45,
          });
        }
        window.location.href = loginRedirect || "explore.html";
      }

      // ===== Social Login (Apple / Google) =====

      // Google Sign-In callback — triggered by GIS SDK after user authenticates
      function handleGoogleCredential(response) {
        if (!response || !response.credential) {
          setMsg("login-msg", "❌ Google 登入失敗，請重試", "error");
          return;
        }
        // Decode JWT payload to get user info, send full token for server verification
        try {
          var payload = JSON.parse(atob(response.credential.split(".")[1]));
          doSocialAuth("google", payload.sub, payload.email, payload.name, response.credential);
        } catch (e) {
          setMsg("login-msg", "❌ 無法處理 Google 回傳資料", "error");
        }
      }

      // Apple Sign-In — triggers Apple login popup
      async function socialLogin(provider) {
        if (provider === "apple") {
          // Check if Apple JS SDK loaded
          if (typeof AppleID === "undefined") {
            setMsg("login-msg", "🍎 Apple SDK 載入中，請稍後再試", "error");
            return;
          }
          var appleClientId = localStorage.getItem("zenpass_apple_client_id");
          if (!appleClientId || appleClientId === "YOUR_APPLE_CLIENT_ID") {
            setMsg("login-msg", "🍎 Apple 登入需要 Apple Developer 帳號設定 Client ID，請聯絡管理員", "error");
            return;
          }
          try {
            AppleID.auth.init({
              clientId: appleClientId,
              scope: "name email",
              redirectURI: window.location.origin + "/login.html",
              state: "apple_login",
              usePopup: true,
            });
            var appleResp = await AppleID.auth.signIn();
            // Apple returns id_token JWT with user info
            var payload = JSON.parse(atob(appleResp.id_token.split(".")[1]));
            var userName = appleResp.user ?
              (appleResp.user.name.firstName + " " + appleResp.user.name.lastName) :
              payload.email;
            doSocialAuth("apple", payload.sub, payload.email, userName);
          } catch (e) {
            setMsg("login-msg", "🍎 " + (e.message || "Apple 登入取消或失敗"), "error");
          }
        }
      }

      // Send social login data to backend
      async function doSocialAuth(provider, providerId, email, name, providerToken) {
        setMsg("login-msg", "⏳ 登入中...", "info");
        try {
          var body = {
            provider: provider,
            providerId: providerId,
            email: email,
            name: name || (email ? email.split("@")[0] : provider + "_user"),
          };
          if (providerToken) body.providerToken = providerToken;
          var resp = await fetch(API_BASE + "/auth/social", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          var data = await resp.json();
          if (!resp.ok) {
            setMsg("login-msg", "❌ " + (data.error || "登入失敗"), "error");
            return;
          }
          setToken(data.token);
          storeUser(data.user);
          setMsg("login-msg", "✅ 登入成功！", "success");
          setTimeout(function () {
            window.location.href = loginRedirect || "explore.html";
          }, 800);
        } catch (e) {
          setMsg("login-msg", "❌ 網絡錯誤，請稍後再試", "error");
        }
      }
    </script>

    <script>
      // Load Google client ID from config if available
      (function() {
        var script = document.createElement("script");
        script.src = "api.js?v=" + Date.now();
        script.onload = function() {
          var clientId = window.ZENPASS_GOOGLE_CLIENT_ID || "YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com";
          var gId = document.getElementById("g_id_onload");
          if (gId) gId.setAttribute("data-client_id", clientId);
        };
        // Don't re-add if already present
        if (!window.__zenpassOAuthInit) {
          window.__zenpassOAuthInit = true;
          // Apple client ID from env
          var appleId = window.ZENPASS_APPLE_CLIENT_ID || "YOUR_APPLE_CLIENT_ID";
          localStorage.setItem("zenpass_apple_client_id", appleId);
        }
      })();
    </script>
