    <script>
// ==================== 變數 ====================
const courses = document.querySelectorAll('.modern-card');
const searchInput = document.getElementById('search-input');
const filterCount = document.getElementById('filter-count') || document.getElementById('resultCount');
const coursesGrid = document.getElementById('courses-grid');

// ==================== URL 同步 ====================
function updateURL() {
  var params = new URLSearchParams();
  if (searchInput?.value?.trim()) params.set('search', searchInput.value.trim());
  var newUrl = window.location.pathname + (params.toString() ? '?' + params.toString() : '');
  history.replaceState(null, '', newUrl);
}

function loadFromURL() {
  try {
    var params = new URLSearchParams(window.location.search);
    if (searchInput && params.get('search')) {
      searchInput.value = params.get('search');
    }
  } catch(e) {}
}

// ==================== 主篩選函數 ====================
function filterCourses() {
  const keyword = searchInput?.value?.toLowerCase().trim() || '';
  if (keyword && typeof gtag === "function") gtag("event", "search", { search_term: keyword });
  let visibleCount = 0;
  courses.forEach(function(card, idx) {
    const title = (card.getAttribute('data-title') || card.querySelector('.modern-card-title')?.textContent || '').toLowerCase();
    const instructor = (card.getAttribute('data-instructor') || '').toLowerCase();
    const category = (card.getAttribute('data-category') || '').toLowerCase();
    const location = (card.getAttribute('data-location') || '').toLowerCase();
    const difficulty = (card.getAttribute('data-difficulty') || '').toLowerCase();
    const price = parseInt(card.getAttribute('data-price')) || 0;
    const spots = parseInt(card.getAttribute('data-spots'));
    const timeStr = card.getAttribute('data-time') || '';

    let matchKeyword = !keyword;
    if (keyword) {
      const cardText = (card.textContent || '').toLowerCase();
      matchKeyword = cardText.includes(keyword);
    }

    const matchFilter = checkFilters(card, price, spots, timeStr);
    const shouldShow = matchKeyword && matchFilter;

    card.style.display = (shouldShow && idx < _loadMoreVisible) ? '' : 'none';
    if (shouldShow && idx < _loadMoreVisible) visibleCount++;
  });

  if (filterCount) filterCount.textContent = '找到 ' + visibleCount + ' 個課程';
  var lmBtn = document.getElementById('load-more-btn');
  if (lmBtn) lmBtn.style.display = visibleCount === 0 ? 'none' : '';
  // No results message
  var emptyEl = document.getElementById('no-results');
  if (visibleCount === 0 && courses.length > 0) {
    if (!emptyEl) {
      emptyEl = document.createElement('div');
      emptyEl.id = 'no-results';
      emptyEl.style.cssText = 'text-align:center;padding:40px 20px;color:var(--dark-700)';
      emptyEl.innerHTML = '<div style="font-size:48px;margin-bottom:12px">🔍</div><div style="font-size:16px;font-weight:600;margin-bottom:6px">搵唔到相關課程</div><div style="font-size:13px;color:var(--gray-300);margin-bottom:16px">試試調整篩選條件或搜尋其他關鍵字</div><button onclick="clearAllFilters()" style="padding:10px 24px;border-radius:50px;background:linear-gradient(135deg,#10b981,#059669);color:#fff;font-size:13px;font-weight:600;border:none;cursor:pointer">🔄 清除所有篩選</button>';
      coursesGrid?.appendChild(emptyEl);
    }
    emptyEl.style.display = 'block';
  } else if (emptyEl) {
    emptyEl.style.display = 'none';
  }
  // URL sync: save filter state
  try {
    var params = new URLSearchParams(window.location.search);
    if (keyword) params.set('q', keyword); else params.delete('q');
    var newUrl = window.location.pathname + (params.toString() ? '?' + params.toString() : '');
    window.history.replaceState(null, '', newUrl);
  } catch(e) {}
}

// ==================== 其他 Filter 邏輯 ====================
function checkFilters(card, price, spots, timeStr) {
  var activeCat = document.querySelector('#category-list .category-chip.active')?.textContent?.trim() || '全部';
  var activeTime = document.querySelector('#timeline-list .date-chip.active')?.textContent?.trim() || '全部';
  var activeDiff = document.querySelectorAll('#filterPanel .sort-btn.active');
  var activePrice = '';
  var activeSpots = '';
  
  activeDiff.forEach(function(b) {
    var t = b.textContent.trim();
    var o = b.getAttribute('onclick') || '';
    if (o.includes('difficulty') && t !== '全部') { /* handled below */ }
    if (o.includes('price') && t !== '全部') activePrice = t;
    if (o.includes('spots') && t !== '全部') activeSpots = t;
  });
  
  // Get difficulty from text of active chip
  var diffText = '';
  activeDiff.forEach(function(b) {
    if ((b.getAttribute('onclick')||'').includes('difficulty') && b.textContent.trim() !== '全部') diffText = b.textContent.trim();
  });

  // Category filter
  if (activeCat && activeCat !== '全部' && activeCat !== '🏠 全部') {
    var cat = (card.getAttribute('data-category') || '').toLowerCase();
    if (!cat.includes(activeCat.replace(/🏠|\s/g, '').toLowerCase())) return false;
  }

  // Difficulty
  if (diffText) {
    var diff = card.getAttribute('data-difficulty') || '';
    if (diffText.includes('初級') && diff !== '初級') return false;
    if (diffText.includes('中級') && diff !== '中級') return false;
    if (diffText.includes('高級') && diff !== '高級') return false;
  }

  // Price
  if (activePrice && activePrice !== '全部') {
    if (activePrice.includes('<') && price >= 100) return false;
    if (activePrice.includes('-')) {
      var parts = activePrice.match(/\d+/g);
      if (parts && parts.length >= 2 && (price < parseInt(parts[0]) || price > parseInt(parts[1]))) return false;
    }
    if (activePrice.includes('>') && price <= 200) return false;
  }

  // Spots
  if (activeSpots && activeSpots !== '全部') {
    if (activeSpots.includes('有位') && (isNaN(spots) || spots <= 0)) return false;
    if (activeSpots.includes('僅剩') && (isNaN(spots) || spots > 3)) return false;
  }

  // Time
  if (activeTime && activeTime !== '📅 全部') {
    var hour = parseInt(timeStr.split(':')[0]);
    if (!isNaN(hour)) {
      if ((activeTime.includes('早上') || activeTime.includes('Morning')) && (hour < 6 || hour >= 12)) return false;
      if ((activeTime.includes('下午') || activeTime.includes('Afternoon')) && (hour < 12 || hour >= 18)) return false;
      if ((activeTime.includes('晚上') || activeTime.includes('Evening')) && hour < 18) return false;
    }
  }

  return true;
}

// ==================== 事件監聽（完全即時聯動） ====================
document.addEventListener('DOMContentLoaded', function() {
  // 搜尋框即時反應
  if (searchInput) {
    var timeout;
    searchInput.addEventListener('input', function() {
      clearTimeout(timeout);
      timeout = setTimeout(function(){ filterCourses(); updateURL(); }, 200);
    });
  }

  // 所有外部 filter 變化 → 即時 filter
  // Category chips
  document.querySelectorAll('#category-list .category-chip').forEach(function(chip) {
    chip.addEventListener('click', function() { setTimeout(filterCourses, 100); });
  });
  // Advanced filter panel
  document.querySelectorAll('#filterPanel .sort-btn').forEach(function(btn) {
    btn.addEventListener('click', function() { setTimeout(filterCourses, 100); });
  });
  // Timeline chips
  document.querySelectorAll('#timeline-list .date-chip').forEach(function(chip) {
    chip.addEventListener('click', function() { setTimeout(filterCourses, 100); });
  });

  // 初始: 從 URL 恢復
  loadFromURL();

  // Sort select
  var sortSelect = document.getElementById('sort-select');
  if (sortSelect) {
    sortSelect.addEventListener('change', function() { filterCourses(); });
  }

  // Clear button
  var clearBtns = document.querySelectorAll('[onclick*="clearAllFilters"]');
  clearBtns.forEach(function(btn) {
    btn.addEventListener('click', function() { setTimeout(filterCourses, 200); });
  });

  // 初始載入
  setTimeout(filterCourses, 1500);
});
</script>

<script>
// ==================== Booking Modal + 已預約狀態 ====================
let currentCourse = null;
const bookedCourses = JSON.parse(localStorage.getItem('zenpass_booked')) || {};

function initBookingButtons() {
  document.querySelectorAll('.modern-card').forEach(function(card) {
    var courseId = card.getAttribute('data-id');
    var btn = card.querySelector('.booking-btn');
    if (courseId && btn && bookedCourses[courseId]) {
      setButtonAsBooked(btn);
    }
  });
}

function updateButtonState(btn, courseId) {
  if (bookedCourses[courseId]) {
    btn.textContent = '✅ 已預約';
    btn.style.background = '#a1a1aa'; btn.style.color = '#fff'; btn.style.cursor = 'pointer'; btn.style.boxShadow = 'none';
    btn.disabled = false;
    btn.onclick = function(e) { e.stopPropagation(); showCancelConfirm(courseId, btn); };
  } else {
    btn.textContent = '立即預約';
    btn.style.background = ''; btn.style.color = ''; btn.style.cursor = ''; btn.style.boxShadow = '';
    btn.disabled = false;
    btn.onclick = function(e) { e.stopPropagation(); handleBookingClick(btn); };
  }
}

function handleBookingClick(btn) {
  var card = btn.closest('.modern-card');
  if (!card) return;
  btn._courseTitle = card.getAttribute('data-title') || '課程';
  openBookingModal(card);
}

function showCancelConfirm(courseId, btn) {
  if (confirm('確定要取消預約「' + (window.ZenPassBooking.getAll()[courseId]?.title || '此課程') + '」？')) {
    window.ZenPassBooking.cancel(courseId);
    bookedCourses = window.ZenPassBooking.getAll();
    alert('✅ 預約已取消');
    updateButtonState(btn, courseId);
  }
}

// ==================== Modal ====================
function openBookingModal(card) {
  currentCourse = {
    id: card.getAttribute('data-id'),
    title: card.getAttribute('data-title') || '',
    instructor: card.getAttribute('data-instructor') || '',
    location: card.getAttribute('data-location') || '',
    image: card.getAttribute('data-image') || card.querySelector('img')?.src || '',
    credits: card.getAttribute('data-credits') || 1,
    time: card.getAttribute('data-time') || ''
  };

  document.getElementById('modal-course-title').textContent = '預約課程';
  document.getElementById('modal-course-name').textContent = currentCourse.title;
  document.getElementById('modal-instructor').textContent = currentCourse.instructor;
  document.getElementById('modal-location').textContent = currentCourse.location ? currentCourse.location + ' · ' + currentCourse.time : currentCourse.time;

  var imgEl = document.getElementById('modal-course-img');
  if (currentCourse.image) {
    imgEl.style.backgroundImage = "url('" + currentCourse.image + "')";
    imgEl.style.backgroundSize = 'cover'; imgEl.innerHTML = '';
  } else {
    imgEl.style.background = 'var(--gray-100)';
    imgEl.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:28px">📅</div>';
  }

  document.getElementById('modal-credits').textContent = (currentCourse.credits || 1) + ' Pass';
  document.getElementById('modal-remaining').textContent = currentCourse.spots || '充足';

  var sel = document.getElementById('modal-datetime');
  sel.innerHTML = '<option value="">請選擇時段</option>' +
    '<option value="today-0930">今天 09:30 - 10:30</option>' +
    '<option value="today-1800">今天 18:00 - 19:00</option>' +
    '<option value="tomorrow-1200">明天 12:00 - 13:00</option>';

  var modal = document.getElementById('booking-modal');
  modal.classList.remove('hidden');
  modal.style.display = 'flex';
  _syncModalDark();
}

function closeBookingModal() {
  var modal = document.getElementById('booking-modal');
  modal.classList.add('hidden');
  modal.style.display = 'none';
  var confirmBtn = document.querySelector('.book-confirm');
  if (confirmBtn) { confirmBtn.textContent = '確認預約'; confirmBtn.disabled = false; }
}

function confirmBooking() {
  var datetime = document.getElementById('modal-datetime').value;
  if (!datetime || !currentCourse?.id) { alert('請選擇日期 / 時段'); return; }
  var btn = document.querySelector('.book-confirm');
  btn.textContent = '⏳ 預約中...';
  btn.disabled = true;
  setTimeout(async function() {
    await window.ZenPassBooking.book(currentCourse.id, {
      title: currentCourse.title,
      instructor: currentCourse.instructor,
      location: currentCourse.location,
      datetime: datetime,
      credits: currentCourse.credits
    });
    alert('✅ 預約成功！\n\n課程：' + currentCourse.title + '\n時間：' + datetime);
    closeBookingModal();
    updateAllBookingButtons();
  }, 800);
}

window.cancelBooking = async function(courseId) {
  if (confirm('確定取消此預約？')) {
    await window.ZenPassBooking.cancel(courseId);
    alert('✅ 預約已取消');
    if (typeof renderBookings === 'function') renderBookings();
    updateAllBookingButtons();
  }
};

</script>

<script>
// Dark mode sync
function _syncModalDark() {
  var m = document.getElementById('booking-modal');
  if (!m || m.style.display === 'none') return;
  var dark = document.documentElement.classList.contains('dark');
  var c = m.firstElementChild;
  if (c) c.style.background = dark ? '#18181b' : '#fff';
  ['modal-course-title','modal-course-name','modal-remaining'].forEach(function(id){
    var el = document.getElementById(id);
    if (el) el.style.color = dark ? '#fafafa' : '#1a1a2e';
  });
  ['modal-instructor','modal-credits'].forEach(function(id){
    var el = document.getElementById(id);
    if (el) el.style.color = dark ? '#34d399' : '#10b981';
  });
}
var _obs = new MutationObserver(function(){ _syncModalDark(); });
_obs.observe(document.documentElement, {attributes:true,attributeFilter:['class']});
</script>

<script>
// 递增量 load more
_loadMoreVisible = 0; // no var, already declared
var _perPageLm = 12;
var _loadStepLm = 8;

window.initIncrementalLoad = function() {
  var cards = document.querySelectorAll('#courses-grid .modern-card');
  if (!cards.length) return;
  _loadMoreVisible = Math.min(_perPageLm, cards.length);
  cards.forEach(function(c, i) {
    c.style.display = i < _perPageLm ? '' : 'none';
  });
  _updateLoadMoreBtn(cards.length);
};

window.loadMore = function() {
  var cards = document.querySelectorAll('#courses-grid .modern-card');
  _loadMoreVisible = Math.min(_loadMoreVisible + _loadStepLm, cards.length);
  cards.forEach(function(c, i) {
    if (i < _loadMoreVisible) c.style.display = '';
  });
  if (typeof filterCourses === 'function') filterCourses();
  _updateLoadMoreBtn(cards.length);
};

function _updateLoadMoreBtn(total) {
  var container = document.getElementById('load-more-container');
  if (!container) return;
  container.style.display = _loadMoreVisible >= total ? 'none' : '';
}

// 自動初始化
document.addEventListener('DOMContentLoaded', function() {
  setTimeout(initIncrementalLoad, 100);
});
</script>
