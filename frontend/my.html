<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的帳戶 - ZenPass 禪流</title>
<link rel="icon" type="image/png" href="icons/favicon-96x96.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<style>
:root {
  --orange-500: #FF6B35;
  --orange-600: #E55A2B;
  --orange-50: #FFF3ED;
  --green-500: #059669;
  --green-50: #ECFDF5;
  --red-500: #EF4444;
  --red-50: #FEF2F2;
  --blue-500: #3B82F6;
  --dark-900: #1A1A2E;
  --dark-800: #2D2D3A;
  --dark-700: #6B7280;
  --gray-200: #E5E7EB;
  --gray-100: #F3F4F6;
  --gray-50: #F9FAFB;
  --white: #FFFFFF;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',-apple-system,sans-serif; background:var(--gray-50); color:var(--dark-900); min-height:100vh; }
.header { background:var(--white); border-bottom:1px solid var(--gray-200); padding:16px 20px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:10; }
.header h1 { font-size:18px; font-weight:600; flex:1; }
.container { max-width:600px; margin:0 auto; padding:20px; }
.loading { text-align:center; padding:40px; color:var(--dark-700); font-size:14px; }
.loading .spinner { display:inline-block; width:32px; height:32px; border:3px solid var(--gray-200); border-top-color:var(--orange-500); border-radius:50%; animation:spin .8s linear infinite; margin-bottom:12px; }
@keyframes spin { to { transform:rotate(360deg); } }

/* Profile card */
.profile-card { background:var(--white); border-radius:12px; padding:24px; margin-bottom:20px; box-shadow:0 1px 3px rgba(0,0,0,.08); text-align:center; }
.profile-card .avatar { width:64px; height:64px; border-radius:50%; background:var(--orange-50); display:flex; align-items:center; justify-content:center; margin:0 auto 12px; font-size:28px; color:var(--orange-500); }
.profile-card .name { font-size:18px; font-weight:700; }
.profile-card .email { font-size:13px; color:var(--dark-700); margin-top:4px; }

/* Stats */
.stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:20px; }
.stat-card { background:var(--white); border-radius:12px; padding:16px; text-align:center; box-shadow:0 1px 3px rgba(0,0,0,.08); }
.stat-card .num { font-size:22px; font-weight:700; color:var(--orange-500); }
.stat-card .label { font-size:12px; color:var(--dark-700); margin-top:4px; }

/* Section */
.section-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; margin-top:24px; }
.section-header h2 { font-size:16px; font-weight:600; }
.section-header .toggle-link { font-size:13px; color:var(--orange-500); cursor:pointer; text-decoration:none; background:none; border:none; }
.section-header .toggle-link:hover { text-decoration:underline; }

/* Booking cards */
.booking-list { display:flex; flex-direction:column; gap:12px; }
.booking-card { background:var(--white); border-radius:12px; padding:16px; box-shadow:0 1px 3px rgba(0,0,0,.08); }
.booking-card .bc-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
.booking-card .bc-title { font-size:15px; font-weight:600; }
.booking-card .bc-badge { font-size:11px; padding:3px 8px; border-radius:99px; font-weight:500; }
.booking-card .bc-badge.confirmed { background:var(--green-50); color:var(--green-500); }
.booking-card .bc-badge.pending_payment { background:var(--orange-50); color:var(--orange-500); }
.booking-card .bc-badge.cancelled { background:var(--red-50); color:var(--red-500); }
.booking-card .bc-badge.attended { background:#EFF6FF; color:var(--blue-500); }
.booking-card .bc-detail { font-size:13px; color:var(--dark-700); line-height:1.8; }
.booking-card .bc-detail span { display:block; }
.booking-card .bc-footer { display:flex; justify-content:space-between; align-items:center; margin-top:10px; padding-top:10px; border-top:1px solid var(--gray-100); }
.booking-card .bc-pay-status { font-size:12px; }
.booking-card .bc-pay-status.paid { color:var(--green-500); }
.booking-card .bc-pay-status.unpaid { color:var(--red-500); }
.booking-card .bc-pay-status.refunded { color:var(--dark-700); }
.booking-card .cancel-btn { font-size:12px; padding:6px 14px; border-radius:8px; border:1px solid var(--red-500); background:white; color:var(--red-500); cursor:pointer; transition:all .2s; }
.booking-card .cancel-btn:hover { background:var(--red-50); }
.booking-card .cancel-btn:disabled { opacity:.5; cursor:not-allowed; }
.booking-card .pay-now-btn { font-size:12px; padding:6px 14px; border-radius:8px; border:none; background:var(--orange-500); color:white; cursor:pointer; text-decoration:none; display:inline-block; }
.empty-state { text-align:center; padding:30px 20px; color:var(--dark-700); font-size:14px; }
.empty-state .empty-icon { font-size:40px; margin-bottom:12px; display:block; }
.action-btns { display:flex; gap:8px; align-items:center; }
.hidden { display:none !important; }
.error-card { background:var(--red-50); border-radius:12px; padding:24px; text-align:center; }
.error-card h3 { color:var(--red-500); margin-bottom:8px; }
.error-card p { color:var(--dark-700); font-size:14px; }
</style>
</head>
<body>
<div class="header">
  <h1>我的帳戶</h1>
  <a href="index.html" style="font-size:13px;color:var(--orange-500);text-decoration:none;">首頁</a>
</div>
<div class="container" id="app">
  <div class="loading" id="loadingState">
    <div class="spinner"></div>
    <div>正在載入...</div>
  </div>
  <div id="errorState" class="hidden"></div>
  <div id="contentArea" class="hidden">
    <!-- Profile -->
    <div class="profile-card" id="profileCard"></div>
    <!-- Membership & Credits -->
    <div class="profile-card" id="membershipCard" style="display:none;padding:16px;text-align:left;"></div>
    <!-- Stats -->
    <div class="stats-row" id="statsRow"></div>
    <!-- Confirmed Bookings -->
    <div class="section-header" id="confirmedHeader">
      <h2>已確認預約</h2>
    </div>
    <div class="booking-list" id="confirmedList"></div>
    <!-- All Bookings -->
    <div class="section-header" id="allBookingsHeader">
      <h2>所有預約記錄</h2>
    </div>
    <div class="booking-list" id="allBookingsList"></div>
  </div>
</div>
<script>
var API_BASE = '/api';

function getToken() {
  return localStorage.getItem('zenpass_token') || sessionStorage.getItem('zenpass_token');
}
function getAuthHeaders() {
  var t = getToken();
  return { 'Authorization': 'Bearer ' + t, 'Content-Type': 'application/json' };
}

// ===== Init =====
(function() {
  loadData();
})();

function loadData() {
  showLoading();
  var userStr = localStorage.getItem('zenpass_user') || sessionStorage.getItem('zenpass_user');
  var user = null;
  try { if (userStr) user = JSON.parse(userStr); } catch(e) {}
  var userObj = user;
  var name = (userObj && userObj.name) || localStorage.getItem('zenpass_name') || '用戶';
  var email = (userObj && userObj.email) || '';

  renderProfile(name, email);

  // Load membership & credits info from API
  try {
    var memResult = await memberships.my();
    if (memResult && memResult.current) {
      renderMembershipCard(memResult.current, userObj);
    }
  } catch(e) {
    // Fallback: show local user data
    if (userObj) {
      renderMembershipCard({
        type: userObj.membership_type || 'trial',
        expires_at: userObj.membership_expires_at || '',
        credits: userObj.credits || 0
      }, userObj);
    }
  }

  // Load bookings in parallel
  var p1 = fetch(API_BASE + '/bookings/my?status=confirmed', { headers: getAuthHeaders() }).then(function(r) { return r.json(); });
  var p2 = fetch(API_BASE + '/bookings/my', { headers: getAuthHeaders() }).then(function(r) { return r.json(); });

  try {
    var results = await Promise.all([p1, p2]);
    .then(function(results) {
      var confirmedData = results[0];
      var allData = results[1];

      var confirmed = confirmedData.bookings || [];
      var all = allData.bookings || [];

      renderStats(all);
      renderConfirmed(confirmed);
      renderAllBookings(all);
      showContent();
    })
    .catch(function(err) {
      showError('載入失敗', '無法連接到伺服器，請檢查網絡連線。');
    });
}

function renderProfile(name, email) {
  var initial = name ? name.charAt(0).toUpperCase() : '?';
  document.getElementById('profileCard').innerHTML =
    '<div class="avatar">' + escHtml(initial) + '</div>' +
    '<div class="name">' + escHtml(name) + '</div>' +
    (email ? '<div class="email">' + escHtml(email) + '</div>' : '');
}

function renderStats(all) {
  var confirmed = 0, pending = 0, cancelled = 0, attended = 0;
  all.forEach(function(b) {
    if (b.status === 'confirmed') confirmed++;
    else if (b.status === 'pending_payment') pending++;
    else if (b.status === 'cancelled') cancelled++;
    else if (b.status === 'attended') attended++;
  });
  document.getElementById('statsRow').innerHTML =
    '<div class="stat-card"><div class="num">' + confirmed + '</div><div class="label">已確認</div></div>' +
    '<div class="stat-card"><div class="num">' + pending + '</div><div class="label">待付款</div></div>' +
    '<div class="stat-card"><div class="num">' + (attended || 0) + '</div><div class="label">已完成</div></div>';
}

function renderConfirmed(list) {
  if (list.length === 0) {
    document.getElementById('confirmedList').innerHTML =
      '<div class="empty-state"><span class="empty-icon">📅</span>暫無已確認的預約</div>';
    return;
  }
  document.getElementById('confirmedList').innerHTML = list.map(function(b) { return renderBookingCard(b); }).join('');
}

function renderAllBookings(list) {
  if (list.length === 0) {
    document.getElementById('allBookingsList').innerHTML =
      '<div class="empty-state"><span class="empty-icon">📋</span>暫無預約記錄</div>';
    return;
  }
  document.getElementById('allBookingsList').innerHTML = list.map(function(b) { return renderBookingCard(b); }).join('');
}

function renderBookingCard(b) {
  var startStr = b.start_time ? formatTime(b.start_time) : '—';
  var dateStr = b.start_time ? formatDate(b.start_time) : '—';
  var badgeClass = b.status === 'confirmed' ? 'confirmed' : (b.status === 'pending_payment' ? 'pending_payment' : (b.status === 'cancelled' ? 'cancelled' : 'attended'));
  var badgeText = b.status === 'confirmed' ? '已確認' : (b.status === 'pending_payment' ? '待付款' : (b.status === 'cancelled' ? '已取消' : '已完成'));

  var payStatusClass = b.payment_status === 'paid' ? 'paid' : (b.payment_status === 'refunded' ? 'refunded' : 'unpaid');
  var payStatusText = b.payment_status === 'paid' ? '✅ 已付款' : (b.payment_status === 'refunded' ? '💰 已退款' : '⏳ 未付款');
  var price = 'HK$' + (b.amount || b.price_hkd || 0);

  var canCancel = false;
  if (b.status === 'confirmed' || b.status === 'pending_payment') {
    if (b.start_time) {
      var classTime = new Date(b.start_time).getTime();
      var now = Date.now();
      if (classTime - now > 2 * 60 * 60 * 1000) canCancel = true;
    }
  }

  var footerButtons = '';
  if (canCancel) {
    footerButtons = '<div class="action-btns"><button class="cancel-btn" onclick="cancelBooking(\'' + b.id + '\')">取消預約</button>';
  }
  if (b.status === 'pending_payment') {
    footerButtons += '<a href="payment.html?booking_id=' + b.id + '" class="pay-now-btn">立即付款</a>';
  }
  if (footerButtons) footerButtons += '</div>';

  return '<div class="booking-card"><div class="bc-header"><div class="bc-title">' + escHtml(b.title || '課程') + '</div><span class="bc-badge ' + badgeClass + '">' + badgeText + '</span></div>' +
    '<div class="bc-detail"><span>📅 ' + dateStr + '</span><span>⏰ ' + startStr + '</span><span>📍 ' + escHtml(b.venue_name || '—') + '</span><span>👤 導師：' + escHtml(b.coach_name || '—') + '</span></div>' +
    '<div class="bc-footer"><span class="bc-pay-status ' + payStatusClass + '">' + payStatusText + ' · ' + price + '</span>' + footerButtons + '</div></div>';
}

function cancelBooking(id) {
  if (!confirm('確定要取消此預約？')) return;
  var btn = event && event.target;
  if (btn) btn.disabled = true;

  fetch(API_BASE + '/bookings/' + id + '/cancel', {
    method: 'POST',
    headers: getAuthHeaders()
  })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) {
        showToast(data.error, 'error');
        if (btn) btn.disabled = false;
        return;
      }
      showToast('預約已取消', 'success');
      // Reload
      loadData();
    })
    .catch(function(err) {
      showToast('取消失敗，請重試', 'error');
      if (btn) btn.disabled = false;
    });
}

// ===== UI Helpers =====
function showLoading() {
  document.getElementById('loadingState').classList.remove('hidden');
  document.getElementById('contentArea').classList.add('hidden');
  document.getElementById('errorState').classList.add('hidden');
}

function showContent() {
  document.getElementById('loadingState').classList.add('hidden');
  document.getElementById('contentArea').classList.remove('hidden');
  document.getElementById('errorState').classList.add('hidden');
}

function showError(title, message) {
  document.getElementById('loadingState').classList.add('hidden');
  document.getElementById('contentArea').classList.add('hidden');
  var el = document.getElementById('errorState');
  el.classList.remove('hidden');
  el.innerHTML = '<div class="error-card"><h3>' + escHtml(title) + '</h3><p>' + escHtml(message) + '</p></div>';
}

function showToast(msg, type) {
  var toast = document.createElement('div');
  toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:' + (type === 'error' ? 'var(--red-500)' : 'var(--green-500)') + ';color:white;padding:12px 24px;border-radius:8px;font-size:14px;font-weight:500;z-index:1000;box-shadow:0 4px 12px rgba(0,0,0,.15);animation:fadeInUp .3s ease;';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(function() { toast.style.opacity = '0'; toast.style.transition = 'opacity .3s'; setTimeout(function() { toast.remove(); }, 300); }, 2500);
}

function escHtml(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function formatDate(isoStr) {
  if (!isoStr) return '—';
  var d = new Date(isoStr);
  return (d.getFullYear()) + '/' + (d.getMonth()+1) + '/' + d.getDate() + ' (' + ['日','一','二','三','四','五','六'][d.getDay()] + ')';
}
function formatTime(isoStr) {
  if (!isoStr) return '—';
  var d = new Date(isoStr);
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

var style = document.createElement('style');
style.textContent = '@keyframes fadeInUp { from { opacity:0; transform:translateX(-50%) translateY(10px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }';
document.head.appendChild(style);
</script>
</body>
</html>
