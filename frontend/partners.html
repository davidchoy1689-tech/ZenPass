    <script>
      var categoryEmoji = {
        瑜伽: "🧘",
        健身: "💪",
        舞蹈: "💃",
        新興運動: "🎯",
        冥想: "🧠",
        伸展: "🤸",
        兒童體適能: "🧒",
      };
      function escHtml(s) {
        if (!s) return "";
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }
      async function loadPartners() {
        try {
          var r = await fetch("/api/partner/list");
          if (!r.ok) throw new Error();
          var d = await r.json();
          var list = d.partners || [];
          var container = document.getElementById("partner-list");
          if (list.length === 0) {
            container.innerHTML =
              '<div style="text-align:center;padding:40px">暫無合作場地</div>';
            return;
          }
          container.innerHTML = list
            .map(function (p) {
              var emoji = categoryEmoji[p.category] || "🏪";
              return (
                '<div class="partner-card" onclick="location.href=\'partner-profile.html?id=' +
                p.id +
                "'\">" +
                '<div class="partner-icon">' +
                emoji +
                "</div>" +
                '<div class="partner-info">' +
                '<div class="name">' +
                escHtml(p.name) +
                "</div>" +
                '<div class="meta">' +
                escHtml(p.district || "") +
                " · " +
                escHtml(p.category || "") +
                "</div>" +
                '<div class="tag">🏪 合作場地</div></div></div>'
              );
            })
            .join("");
        } catch (e) {
          document.getElementById("partner-list").innerHTML =
            '<div style="text-align:center;padding:40px;color:var(--dark-700)">暫時未有合作場地</div>';
        }
      }
      loadPartners();
    </script>
