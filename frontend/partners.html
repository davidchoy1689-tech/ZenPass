<!doctype html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="-1">
    <title>合作場地 — ZenPass 禪流</title>
    <link rel="stylesheet" href="css/zenpass.css?v=2" />
    <style>
      body {
        font-family: var(--font-zh);
        background: var(--gray-50);
        color: var(--dark-900);
        max-width: var(--max-width);
        margin: 0 auto;
        padding: 0 0 80px;
      }
      .header {
        background: linear-gradient(
          135deg,
          var(--orange-600-bg),
          var(--orange-500)
        );
        color: white;
        padding: 14px 16px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .header .back-btn {
        background: rgba(255, 255, 255, 0.2);
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        cursor: pointer;
        color: white;
        text-decoration: none;
      }
      .header h1 {
        font-size: 17px;
        font-weight: 600;
        flex: 1;
        color: white;
        margin: 0;
      }
      .content {
        padding: 16px;
      }
      .partner-card {
        background: white;
        border-radius: 14px;
        padding: 16px;
        margin-bottom: 12px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        border: 1px solid rgba(0, 0, 0, 0.04);
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .partner-card:active {
        transform: scale(0.98);
      }
      .partner-icon {
        width: 50px;
        height: 50px;
        border-radius: 12px;
        background: var(--orange-50);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        flex-shrink: 0;
      }
      .partner-info {
        flex: 1;
      }
      .partner-info .name {
        font-size: 15px;
        font-weight: 600;
      }
      .partner-info .meta {
        font-size: 12px;
        color: var(--dark-700);
        margin-top: 2px;
      }
      .partner-info .tag {
        display: inline-block;
        padding: 1px 6px;
        border-radius: 4px;
        background: var(--orange-100);
        color: var(--orange-700);
        font-size: 10px;
        font-weight: 600;
        margin-top: 4px;
      }
      .loading {
        text-align: center;
        padding: 40px;
        color: var(--dark-700);
      }
    </style>
  </head>
  <body>
    <div class="header">
      <a class="back-btn" href="javascript:history.back()">←</a>
      <h1>🏪 合作場地</h1>
      <a
        href="partner-apply.html"
        style="
          color: white;
          font-size: 13px;
          font-weight: 600;
          background: rgba(255, 255, 255, 0.2);
          padding: 6px 14px;
          border-radius: 20px;
          text-decoration: none;
          white-space: nowrap;
        "
        >申請加盟</a
      >
    </div>
    <div class="content" id="partner-list">
      <div class="loading">載入中...</div>
    </div>

    <nav class="bottom-nav" role="navigation" aria-label="底部導航">
      <a href="index.html" class="nav-item"
        ><span class="nav-icon">🏠</span>首頁</a
      >
      <a href="explore.html" class="nav-item"
        ><span class="nav-icon">🔍</span>探索</a
      >
      <a href="membership.html" class="nav-item"
        ><span class="nav-icon">💎</span>會籍</a
      >
      <a href="coach-apply.html" class="nav-item"
        ><span class="nav-icon">👨🏫</span>成為教練</a
      >
      <a href="my.html" class="nav-item"
        ><span class="nav-icon">👤</span>我的</a
      >
    </nav>

    <script src="api.js?v=2"></script>
    <script>
      var categoryEmoji = {
        瑜伽: "🧘",
        健身: "💪",
        舞蹈: "💃",
        新興運動: "🎯",
        冥想: "🧠",
        伸展: "🤸",
        兒童體適能: "🧒",
      };
      function escHtml(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
      async function loadPartners() {
        try {
          var r = await fetch("/api/partner/list");
          if (!r.ok) throw new Error();
          var d = await r.json();
          var list = d.partners || [];
          var container = document.getElementById("partner-list");
          if (list.length === 0) {
            container.innerHTML =
              '<div style="text-align:center;padding:40px">暫無合作場地</div>';
            return;
          }
          container.innerHTML = list
            .map(function (p) {
              var emoji = categoryEmoji[p.category] || "🏪";
              return (
                '<div class="partner-card" onclick="location.href=\'partner-profile.html?id=' +
                p.id +
                "'\">" +
                '<div class="partner-icon">' +
                emoji +
                "</div>" +
                '<div class="partner-info">' +
                '<div class="name">' +
                escHtml(p.name) +
                "</div>" +
                '<div class="meta">' +
                escHtml(p.district || "") +
                " · " +
                escHtml(p.category || "") +
                "</div>" +
                '<div class="tag">🏪 合作場地</div></div></div>'
              );
            })
            .join("");
        } catch (e) {
          document.getElementById("partner-list").innerHTML =
            '<div style="text-align:center;padding:40px;color:var(--dark-700)">暫時未有合作場地</div>';
        }
      }
      loadPartners();
    </script>
  </body>
</html>
