<!doctype html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <link rel="stylesheet" href="css/zenpass.css?v=2" />
    <style>
      body {
        font-family: var(--font-zh);
        background: var(--gray-50);
        color: var(--dark-900);
        min-height: 100vh;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        max-width: 100%;
      }
      .onboarding-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        max-width: 480px;
        margin: 0 auto;
        width: 100%;
        padding: 24px 20px;
        position: relative;
      }
      .skip-btn {
        position: absolute;
        top: 16px;
        right: 20px;
        background: none;
        border: none;
        color: var(--dark-700);
        font-size: 13px;
        font-family: var(--font-zh);
        cursor: pointer;
        padding: 6px 12px;
        border-radius: 20px;
        transition: background 0.2s;
      }
      .skip-btn:hover {
        background: var(--gray-200);
      }
      .header-area {
        text-align: center;
        margin-bottom: 28px;
        margin-top: 8px;
      }
      .header-area .icon {
        font-size: 48px;
      }
      .header-area h1 {
        font-size: 22px;
        font-weight: 800;
        margin-top: 8px;
      }
      .header-area p {
        font-size: 14px;
        color: var(--dark-700);
        margin-top: 4px;
      }
      .step-dots {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-bottom: 28px;
        align-items: center;
      }
      .step-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--gray-200);
        transition: all 0.3s;
      }
      .step-dot.active {
        width: 28px;
        border-radius: 5px;
        background: var(--orange-600-bg);
      }
      .step-dot.done {
        background: var(--green-500);
      }
      .step-card {
        background: var(--white);
        border-radius: var(--radius-lg);
        padding: 28px 24px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        display: none;
        flex-direction: column;
        flex: 1;
      }
      .step-card.active {
        display: flex;
      }
      .step-card h2 {
        font-size: 20px;
        font-weight: 700;
        margin-bottom: 4px;
      }
      .step-card .desc {
        font-size: 13px;
        color: var(--dark-700);
        margin-bottom: 20px;
        line-height: 1.5;
      }
      .btn {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: var(--radius);
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        font-family: var(--font-zh);
        transition: all 0.2s;
      }
      .btn-primary {
        background: var(--orange-600-bg);
        color: var(--white);
      }
      .btn-primary:hover {
        background: #e55a2b;
      }
      .btn-primary:disabled {
        background: var(--gray-200);
        color: var(--dark-700);
        cursor: not-allowed;
      }
      .btn-outline {
        background: var(--white);
        border: 2px solid var(--gray-200);
        color: var(--dark-900);
      }
      .btn-outline:hover {
        border-color: var(--orange-700);
        color: var(--orange-700);
      }
      .btn-row {
        display: flex;
        gap: 10px;
        margin-top: auto;
        padding-top: 20px;
      }
      .btn-row .btn {
        flex: 1;
      }
      .pills-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 4px;
      }
      .pill {
        background: var(--gray-50);
        border-radius: 12px;
        padding: 16px 12px;
        text-align: center;
        border: 2px solid transparent;
        cursor: pointer;
        transition: all 0.2s;
        user-select: none;
      }
      .pill:hover {
        border-color: var(--orange-300);
      }
      .pill.selected {
        border-color: var(--orange-700);
        background: var(--orange-100);
      }
      .pill .emoji {
        font-size: 28px;
        display: block;
        margin-bottom: 4px;
      }
      .pill .label {
        font-size: 14px;
        font-weight: 600;
      }
      .goals-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 4px;
      }
      .goal-pill {
        background: var(--gray-50);
        border-radius: 12px;
        padding: 16px 12px;
        text-align: center;
        border: 2px solid transparent;
        cursor: pointer;
        transition: all 0.2s;
        user-select: none;
      }
      .goal-pill:hover {
        border-color: var(--orange-300);
      }
      .goal-pill.selected {
        border-color: var(--orange-700);
        background: var(--orange-100);
      }
      .goal-pill .emoji {
        font-size: 28px;
        display: block;
        margin-bottom: 4px;
      }
      .goal-pill .label {
        font-size: 14px;
        font-weight: 600;
      }
      .success-screen {
        text-align: center;
        padding: 20px 0;
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .success-screen .big-icon {
        font-size: 72px;
        margin-bottom: 12px;
      }
      .success-screen h2 {
        font-size: 22px;
        margin-bottom: 8px;
      }
      .success-screen p {
        font-size: 14px;
        color: var(--dark-700);
        margin-bottom: 24px;
        line-height: 1.6;
      }
      @keyframes bounceIn {
        0% { transform: scale(0); opacity: 0; }
        60% { transform: scale(1.15); }
        100% { transform: scale(1); opacity: 1; }
      }
      .bounce-in {
        animation: bounceIn 0.5s ease-out;
      }
      @media (max-width: 400px) {
        .pills-grid, .goals-grid {
          grid-template-columns: 1fr 1fr;
          gap: 8px;
        }
        .pill, .goal-pill { padding: 12px 8px; }
        .pill .emoji, .goal-pill .emoji { font-size: 24px; }
        .step-card { padding: 20px 16px; }
      }
    </style>
<!-- Footer & Back-to-Top Styles -->
    <style>
      .footer-grad {
        background: linear-gradient(135deg, #1a1a2e 0%, #2d2d44 50%, #c94420 100%);
      }
      .footer-grad .footer-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
        max-width: 400px;
        margin: 0 auto;
        padding: 40px 16px 0;
      }
      @media (min-width: 768px) {
        .footer-grad .footer-grid {
          grid-template-columns: 1fr 1fr 1fr 1fr;
          max-width: 720px;
        }
      }
      .footer-grad .footer-section-title {
        color: rgba(255,255,255,0.5);
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 10px;
      }
      .footer-grad ul {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      .footer-grad li {
        margin-bottom: 6px;
      }
      .footer-link {
        color: rgba(255,255,255,0.6);
        text-decoration: none;
        transition: color 0.2s;
        font-size: 13px;
      }
      .footer-link:hover {
        color: #fff;
      }
      .back-to-top {
        position: fixed;
        bottom: 80px;
        right: 16px;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: var(--orange-600-bg, #c94420);
        color: #fff;
        border: none;
        font-size: 20px;
        cursor: pointer;
        box-shadow: 0 2px 12px rgba(0,0,0,0.2);
        z-index: 999;
        opacity: 0;
        transform: translateY(20px);
        transition: opacity 0.3s, transform 0.3s;
        pointer-events: none;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .back-to-top.visible {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }
      .back-to-top:hover {
        background: #aa3218;
      }
    </style>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MKF5N4YLBM"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag("js", new Date());
      gtag("config", "G-MKF5N4YLBM");
    </script>
  </head>
  <body>
    <div class="onboarding-container">
      <!-- Skip Button -->
      <button class="skip-btn" onclick="skipOnboarding()">跳過 →</button>

      <!-- Header -->
      <div class="header-area">
        <div class="icon">🧘</div>
        <h1>歡迎加入 ZenPass</h1>
        <p>幾步設定，搵出最適合你嘅運動體驗</p>
      </div>

      <!-- Step Dots -->
      <div class="step-dots" id="stepDots">
        <span class="step-dot active"></span>
        <span class="step-dot"></span>
        <span class="step-dot"></span>
      </div>

      <!-- Step 1: Interests -->
      <div class="step-card active" id="step1">
        <h2>🎯 揀你嘅興趣</h2>
        <p class="desc">揀選你感興趣嘅運動類別，幫你搵最適合嘅課程（可選多項）</p>
        <div class="pills-grid" id="interestsGrid">
          <div class="pill selected" onclick="togglePill(this)">
            <span class="emoji">🧘</span><span class="label">瑜伽</span>
          </div>
          <div class="pill" onclick="togglePill(this)">
            <span class="emoji">💪</span><span class="label">健身</span>
          </div>
          <div class="pill" onclick="togglePill(this)">
            <span class="emoji">🧠</span><span class="label">冥想</span>
          </div>
          <div class="pill" onclick="togglePill(this)">
            <span class="emoji">🤸</span><span class="label">伸展</span>
          </div>
          <div class="pill" onclick="togglePill(this)">
            <span class="emoji">💃</span><span class="label">舞蹈</span>
          </div>
          <div class="pill" onclick="togglePill(this)">
            <span class="emoji">🏃</span><span class="label">跑步</span>
          </div>
          <div class="pill" onclick="togglePill(this)">
            <span class="emoji">🚴</span><span class="label">單車</span>
          </div>
          <div class="pill" onclick="togglePill(this)">
            <span class="emoji">🏊</span><span class="label">游水</span>
          </div>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="goStep(2)">下一步 →</button>
        </div>
      </div>

      <!-- Step 2: Goals -->
      <div class="step-card" id="step2">
        <h2>🎯 你的目標</h2>
        <p class="desc">你主要想透過運動達到咩目標？（可選多項）</p>
        <div class="goals-grid" id="goalsGrid">
          <div class="goal-pill" onclick="toggleGoal(this)">
            <span class="emoji">😌</span><span class="label">減壓</span>
          </div>
          <div class="goal-pill" onclick="toggleGoal(this)">
            <span class="emoji">💪</span><span class="label">增肌</span>
          </div>
          <div class="goal-pill" onclick="toggleGoal(this)">
            <span class="emoji">👗</span><span class="label">修身</span>
          </div>
          <div class="goal-pill" onclick="toggleGoal(this)">
            <span class="emoji">🧘</span><span class="label">放鬆</span>
          </div>
          <div class="goal-pill" onclick="toggleGoal(this)">
            <span class="emoji">👥</span><span class="label">社交</span>
          </div>
          <div class="goal-pill" onclick="toggleGoal(this)">
            <span class="emoji">🏆</span><span class="label">挑戰自己</span>
          </div>
          <div class="goal-pill" onclick="toggleGoal(this)">
            <span class="emoji">❤️</span><span class="label">健康</span>
          </div>
          <div class="goal-pill" onclick="toggleGoal(this)">
            <span class="emoji">🎯</span><span class="label">專注力</span>
          </div>
        </div>
        <div class="btn-row">
          <button class="btn btn-outline" onclick="goStep(1)">← 上一步</button>
          <button class="btn btn-primary" onclick="goStep(3)">下一步 →</button>
        </div>
      </div>

      <!-- Step 3: Ready! -->
      <div class="step-card" id="step3">
        <div class="success-screen">
          <div class="big-icon bounce-in">🎉</div>
          <h2>已就緒！</h2>
          <p>
            我哋已經根據你嘅喜好<br />
            準備好個人化推薦 🎯<br /><br />
            立即開始探索課程，預約你嘅第一堂！
          </p>
          <button class="btn btn-primary" style="max-width:280px" onclick="completeOnboarding()">
            🔍 開始探索
          </button>
          <button class="btn btn-outline" style="margin-top:12px;max-width:280px" onclick="goStep(2)">
            ← 返去修改
          </button>
        </div>
      </div>
    </div>

    <script>
      var currentStep = 1;
      var totalSteps = 3;

      function togglePill(el) {
        el.classList.toggle("selected");
      }

      function toggleGoal(el) {
        el.classList.toggle("selected");
      }

      function goStep(n) {
        if (n < 1 || n > totalSteps) return;
        // Validate step 1
        if (n === 2 && currentStep === 1) {
          var selected = document.querySelectorAll("#interestsGrid .pill.selected");
          if (selected.length === 0) {
            alert("請至少揀一個興趣！");
            return;
          }
        }
        // Show target step
        for (var i = 1; i <= totalSteps; i++) {
          document.getElementById("step" + i).classList.remove("active");
        }
        document.getElementById("step" + n).classList.add("active");
        currentStep = n;
        updateDots();
        window.scrollTo(0, 0);
      }

      function updateDots() {
        var dots = document.querySelectorAll(".step-dot");
        for (var i = 0; i < dots.length; i++) {
          dots[i].classList.remove("active", "done");
          if (i + 1 === currentStep) dots[i].classList.add("active");
          else if (i + 1 < currentStep) dots[i].classList.add("done");
        }
      }

      function getSelectedInterests() {
        var pills = document.querySelectorAll("#interestsGrid .pill.selected");
        return Array.from(pills).map(function(p) {
          return p.querySelector(".label").textContent;
        });
      }

      function getSelectedGoals() {
        var pills = document.querySelectorAll("#goalsGrid .goal-pill.selected");
        return Array.from(pills).map(function(p) {
          return p.querySelector(".label").textContent;
        });
      }

      function saveOnboardingData() {
        var interests = getSelectedInterests();
        var goals = getSelectedGoals();
        localStorage.setItem("zenpass_interests", JSON.stringify(interests));
        localStorage.setItem("zenpass_goals", JSON.stringify(goals));
        localStorage.setItem("zenpass_interests_date", new Date().toISOString());
        localStorage.setItem("zp_onboarded", "true");
      }

      function completeOnboarding() {
        saveOnboardingData();
        window.location.href = "explore.html";
      }

      function skipOnboarding() {
        // Save empty data so we know onboarding was skipped
        localStorage.setItem("zp_onboarded", "true");
        localStorage.setItem("zenpass_interests", "[]");
        localStorage.setItem("zenpass_goals", "[]");
        window.location.href = "explore.html";
      }

      // Allow Enter key to advance
      document.addEventListener("keydown", function(e) {
        if (e.key === "Enter" && currentStep < totalSteps) {
          goStep(currentStep + 1);
        }
      });
    </script>
  <script src="js/nav.js"></script>
<div id="zp-footer"></div>
<script src="assets/footer-loader.js"></script>
</body>
</html>
