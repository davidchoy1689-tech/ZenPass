<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#FF6B35">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>我的預約 — ZenPass 禪流</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root { --orange-500:#FF6B35; --orange-100:#FFF0E8; --orange-50:#FFF8F4; --dark-900:#1A1A2E; --dark-800:#2D2D44; --dark-700:#3D3D5A; --gray-200:#E5E7EB; --gray-300:#D1D5DB; --gray-100:#F3F4F6; --gray-50:#F9FAFB; --white:#FFFFFF; --green-500:#059669; --red-500:#EF4444; --blue-500:#3B82F6; --radius-sm:8px; --radius-md:12px; --radius-lg:16px; --radius-xl:24px; --font-zh:'Noto Sans TC',sans-serif; --max-width:480px; --nav-height:64px; }
        body { font-family:var(--font-zh); background:var(--gray-50); color:var(--dark-900); max-width:var(--max-width); margin:0 auto; padding-bottom:calc(var(--nav-height) + 20px); -webkit-font-smoothing:antialiased; }
        .header { background:linear-gradient(135deg,var(--dark-900),var(--dark-800)); color:var(--white); padding:16px 20px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:10; }
        .header a { color:var(--white); text-decoration:none; font-size:20px; min-width:32px; min-height:32px; display:flex; align-items:center; }
        .header h1 { font-size:18px; font-weight:700; flex:1; }
        .section { padding:16px; }

        .tabs { display:flex; gap:0; background:var(--white); border-radius:var(--radius-md); overflow:hidden; margin-bottom:16px; border:1px solid var(--gray-200); }
        .tab { flex:1; padding:12px; text-align:center; font-size:14px; font-weight:600; cursor:pointer; transition:all .2s; color:var(--dark-700); background:var(--white); }
        .tab.active { color:var(--orange-500); background:var(--orange-50); border-bottom:2px solid var(--orange-500); }

        .booking-card { background:var(--white); border-radius:var(--radius-md); padding:16px; margin-bottom:12px; box-shadow:var(--shadow-sm); border-left:4px solid var(--orange-500); position:relative; }
        .booking-card.cancelled { border-left-color:var(--red-500); opacity:.7; }
        .booking-card.attended { border-left-color:var(--green-500); }
        .booking-card .date-badge { position:absolute; top:12px; right:12px; background:var(--orange-100); color:var(--orange-500); padding:4px 10px; border-radius:8px; font-size:12px; font-weight:700; }
        .booking-card .class-name { font-size:16px; font-weight:700; margin-bottom:4px; padding-right:80px; }
        .booking-card .meta { font-size:13px; color:var(--dark-700); line-height:1.8; }
        .booking-card .meta span { display:inline-flex; align-items:center; gap:4px; margin-right:12px; }
        .booking-card .status-badge { display:inline-block; padding:2px 8px; border-radius:6px; font-size:11px; font-weight:600; margin-top:8px; }
        .status-badge.confirmed { background:var(--orange-100); color:var(--orange-500); }
        .status-badge.attended { background:#ECFDF5; color:var(--green-500); }
        .status-badge.cancelled { background:#FEF2F2; color:var(--red-500); }
        .status-badge.pending { background:#FEF3C7; color:#92400E; }

        .empty-state { text-align:center; padding:60px 20px; color:var(--dark-700); }
        .empty-state .icon { font-size:48px; margin-bottom:12px; }
        .empty-state p { font-size:14px; }

        .loading { text-align:center; padding:40px; color:var(--dark-700); }
        .loading::after { content:''; display:block; width:32px; height:32px; margin:10px auto; border:3px solid var(--gray-200); border-top-color:var(--orange-500); border-radius:50%; animation:spin .8s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }

        .bottom-nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:var(--max-width); background:var(--white); border-top:1px solid var(--gray-200); display:flex; justify-content:space-around; padding:8px 0 calc(8px + env(safe-area-inset-bottom)); z-index:100; }
        .nav-item { display:flex; flex-direction:column; align-items:center; text-decoration:none; color:var(--gray-300); font-size:10px; gap:2px; padding:4px 12px; min-width:44px; min-height:44px; justify-content:center; }
        .nav-item.active { color:var(--orange-500); }
        .nav-item .nav-icon { font-size:22px; line-height:1; }
    
        .rate-btn {
            padding:4px 12px; border-radius:12px; font-size:11px; font-weight:600;
            background:var(--orange-100); color:var(--orange-500); border:1px solid var(--orange-200);
            cursor:pointer; font-family:var(--font-zh); transition:all .15s;
        }
        .rate-btn:hover { background:var(--orange-500); color:var(--white); }

</style>
</head>
<body>
    <div class="header">
        <a href="javascript:if(document.referrer){history.back()}else{location.href='index.html'}">←</a>
        <h1>📅 我的預約</h1>
    </div>

    <div class="section">
        <div class="tabs">
            <div class="tab active" onclick="switchTab('upcoming',this)">📅 待上課</div>
            <div class="tab" onclick="switchTab('history',this)">📜 歷史記錄</div>
        </div>
        <div id="booking-list" class="loading">載入中...</div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span>首頁</a>
        <a href="explore.html" class="nav-item"><span class="nav-icon">🔍</span>探索</a>
        <a href="membership.html" class="nav-item"><span class="nav-icon">💎</span>會籍</a>
        <a href="coach-apply.html" class="nav-item"><span class="nav-icon">👨🏫</span>成為教練</a>
        <a href="my.html" class="nav-item active"><span class="nav-icon">👤</span>我的</a>
    </nav>

    <script>
        var currentTab = 'upcoming';

        function getUser() { try { return JSON.parse(localStorage.getItem('zenpass_user')); } catch(e) { return null; } }
        function getBookings() { try { var k = (typeof zpKey === 'function') ? zpKey('bookings') : 'zenpass_bookings'; return JSON.parse(localStorage.getItem(k) || '[]'); } catch(e) { return []; } }

        function getPersonRating(name, role) {
            try {
                var ratings = JSON.parse(localStorage.getItem('zenpass_ratings') || '[]');
                var total = 0, count = 0;
                for (var i = 0; i < ratings.length; i++) {
                    var r = ratings[i];
                    if (r.toRole === role && (r.toName === name || r.toUserId === name)) {
                        total += r.score; count++;
                    }
                }
                return count > 0 ? total / count : 0;
            } catch(e) { return 0; }
        }
        
        function switchTab(tab, el) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
            if (el) el.classList.add('active');
            renderBookings();
        }

        function renderBookings() {
            var list = document.getElementById('booking-list');
            var all = getBookings();
            var filtered = currentTab === 'upcoming'
                ? all.filter(function(b) { return b.status === 'confirmed' || b.status === 'pending_payment'; })
                : all.filter(function(b) { return b.status !== 'confirmed' && b.status !== 'pending_payment'; });

            if (filtered.length === 0) {
                list.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>' + (currentTab === 'upcoming' ? '暫無待上課預約' : '暫無歷史記錄') + '</p></div>';
                return;
            }

            var html = '';
            for (var i = 0; i < filtered.length; i++) {
                var b = filtered[i];
                var statusClass = b.status === 'cancelled' ? 'cancelled' : (b.status === 'attended' ? 'attended' : '');
                var statusLabel = b.status === 'confirmed' ? '✅ 已確認' : (b.status === 'pending_payment' ? '⏳ 待付款' : b.status === 'attended' ? '✔️ 已出席' : '❌ 已取消');
                var statusBadgeClass = b.status === 'confirmed' ? 'confirmed' : (b.status === 'pending_payment' ? 'pending' : b.status === 'attended' ? 'attended' : 'cancelled');
                var dateStr = b.date || '--';
                var timeStr = b.time || '--';
                var timeDisplay = timeStr.length > 5 ? timeStr.substring(0,5) : timeStr;

                // Get coach rating
                var cr = getPersonRating(b.coach || '', 'coach');
                var coachStars = cr > 0 ? '<span style="font-size:11px;color:#FBBF24;margin-left:4px;">' + '⭐'.repeat(Math.round(cr)) + ' ' + cr.toFixed(1) + '</span>' : '';
                
                html += '<div class="booking-card ' + statusClass + '">'
                    + '<div class="date-badge">' + dateStr + '</div>'
                    + '<div class="class-name">' + (b.className || '課程') + '</div>'
                    + '<div class="meta">'
                    + '<span>🕐 ' + timeDisplay + '</span>'
                    + '<span>👨‍🏫 ' + (b.coach || '—') + coachStars + '</span>'
                    + (b.credits > 0 ? '<span>💎 ' + b.credits + ' Credits</span>' : '')
                    + '</div>'
                    + '<div style="display:flex;align-items:center;gap:8px;margin-top:4px;">'
                    + '<span class="status-badge ' + statusBadgeClass + '">' + statusLabel + '</span>'
                    + (b.status === 'pending_payment' ? '<button class="rate-btn" onclick="event.stopPropagation();location.href=\'payment.html?type=single&amount=' + (b.pending_amount || 0) + '&item=' + encodeURIComponent(b.className || '') + '&booking_id=' + encodeURIComponent(b.id) + '\'">💳 繼續付款</button>' : '')
                    + (b.status === 'attended' && !b.rated ? '<button class="rate-btn" onclick="event.stopPropagation();window.location.href=\'rate.html?booking=' + b.id + '&from=student&to=' + encodeURIComponent(b.coach||'') + '&coach=' + encodeURIComponent(b.coach||'') + '&class=' + encodeURIComponent(b.className||'') + '&date=' + (b.date||'') + '\'">⭐ 評分</button>' : '')
                    + (b.rated ? '<span style="font-size:11px;color:var(--orange-500);">⭐ 已評分</span>' : '')
                    + '</div>'
                    + '</div>';
            }
            list.innerHTML = html;
        }

        // Init
        var user = getUser();
        if (!user) { window.location.href = 'index.html'; }
        else { renderBookings(); }
    </script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js")}</script>
<script>
(function(){var n=localStorage.getItem("zenpass_name");if(n){var b=document.createElement("div");b.style.cssText="position:fixed;top:10px;right:10px;z-index:9999;background:#FF6B35;color:white;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.15);font-family:sans-serif;";b.textContent="👤 "+n;b.onclick=function(){var nn=prompt("切換用戶\n當前："+n,n);if(nn&&nn.trim()&&nn.trim()!==n){localStorage.setItem("zenpass_name",nn.trim());localStorage.removeItem("zenpass_token");localStorage.removeItem("zenpass_user");location.reload()}};document.body.appendChild(b)}})();
</script>
</body>
</html>
