    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          "Inter",
          -apple-system,
          sans-serif;
        background: var(--gray-50);
        color: var(--dark-900);
        min-height: 100vh;
      }
      .header {
        background: linear-gradient(135deg, var(--orange-600-bg), #ff6b35);
        padding: 14px 16px;
        display: flex;
        align-items: center;
        gap: 12px;
        position: sticky;
        top: 0;
        z-index: 10;
        color: white;
      }
      .header .back-btn {
        background: rgba(255, 255, 255, 0.2);
        border: none;
        font-size: 20px;
        cursor: pointer;
        color: white;
        padding: 0;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
      }
      .header h1 {
        font-size: 17px;
        font-weight: 600;
        flex: 1;
        color: white;
        margin: 0;
      }
      .container {
        max-width: 600px;
        margin: 0 auto;
        padding: 16px;
      }
      .loading {
        text-align: center;
        padding: 40px;
        color: var(--dark-700);
        font-size: 14px;
      }
      .loading .spinner {
        display: inline-block;
        width: 32px;
        height: 32px;
        border: 3px solid var(--gray-200);
        border-top-color: var(--orange-700);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-bottom: 12px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Tabs */
      .tabs {
        display: flex;
        gap: 4px;
        background: var(--gray-100);
        border-radius: 10px;
        padding: 3px;
        margin-bottom: 16px;
      }
      .tab-btn {
        flex: 1;
        padding: 8px 6px;
        border: none;
        background: transparent;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        border-radius: 8px;
        color: var(--dark-700);
        transition: all 0.2s;
        text-align: center;
        white-space: nowrap;
      }
      .tab-btn.active {
        background: var(--orange-600-bg);
        color: white;
      }
      .tab-btn:hover:not(.active) {
        background: var(--gray-100);
      }
      .tab-btn .count {
        font-size: 11px;
        opacity: 0.7;
      }

      /* Booking cards */
      .booking-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .booking-card {
        background: var(--white);
        border-radius: 14px;
        padding: 14px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        border: 1px solid rgba(0, 0, 0, 0.04);
      }
      .booking-card .bc-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 6px;
      }
      .booking-card .bc-title {
        font-size: 15px;
        font-weight: 600;
      }
      .booking-card .bc-ref {
        font-size: 11px;
        color: var(--dark-700);
        margin-bottom: 2px;
      }
      .booking-card .bc-badge {
        font-size: 11px;
        padding: 3px 8px;
        border-radius: 99px;
        font-weight: 500;
      }
      .booking-card .bc-badge.confirmed {
        background: var(--green-50);
        color: var(--green-500);
      }
      .booking-card .bc-badge.pending_payment {
        background: var(--orange-50);
        color: var(--orange-700);
      }
      .booking-card .bc-badge.cancelled {
        background: var(--red-50);
        color: var(--red-500);
      }
      .booking-card .bc-badge.attended {
        background: var(--blue-50);
        color: var(--blue-500);
      }
      .booking-card .bc-detail {
        font-size: 13px;
        color: var(--dark-700);
        line-height: 1.8;
      }
      .booking-card .bc-detail span {
        display: block;
      }
      .booking-card .bc-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid var(--gray-100);
      }
      .booking-card .bc-pay-status {
        font-size: 12px;
      }
      .booking-card .bc-pay-status.paid {
        color: var(--green-500);
      }
      .booking-card .bc-pay-status.unpaid {
        color: var(--red-500);
      }
      .booking-card .bc-pay-status.refunded {
        color: var(--dark-700);
      }
      .booking-card .cancel-btn {
        font-size: 12px;
        padding: 6px 14px;
        border-radius: 8px;
        border: 1px solid var(--red-500);
        background: white;
        color: var(--red-500);
        cursor: pointer;
        transition: all 0.2s;
      }
      .booking-card .cancel-btn:hover {
        background: var(--red-50);
      }
      .booking-card .cancel-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .booking-card .pay-now-btn {
        font-size: 12px;
        padding: 6px 14px;
        border-radius: 8px;
        border: none;
        background: var(--orange-600-bg);
        color: white;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
      }
      .empty-state {
        text-align: center;
        padding: 40px 20px;
        color: var(--dark-700);
        font-size: 14px;
      }
      .empty-state .empty-icon {
        font-size: 40px;
        margin-bottom: 12px;
        display: block;
      }
      .action-btns {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .hidden {
        display: none !important;
      }
      .error-card {
        background: var(--red-50);
        border-radius: 12px;
        padding: 24px;
        text-align: center;
      }
      .error-card h3 {
        color: var(--red-500);
        margin-bottom: 8px;
      }
      .error-card p {
        color: var(--dark-700);
        font-size: 14px;
        margin-bottom: 16px;
      }
      .error-card .btn {
        display: inline-block;
        padding: 10px 24px;
        background: var(--orange-600-bg);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        cursor: pointer;
        text-decoration: none;
      }

      @media (max-width: 768px) {
        .page-header {
          flex-direction: column;
          gap: 8px;
        }
        .page-header h1 {
          font-size: 20px;
        }
        .tabs {
          overflow-x: auto;
          gap: 4px;
        }
        .tabs button {
          white-space: nowrap;
          padding: 8px 14px;
          font-size: 13px;
        }
        .booking-card {
          flex-direction: column;
          gap: 8px;
        }
        .booking-card .actions {
          flex-direction: row;
          gap: 6px;
        }
        .booking-card .actions button {
          flex: 1;
        }
      }

      /* Desktop layout - use wider containers */
      @media (min-width: 768px) {
        .container,
        .wrap,
        .page-wrap,
        .detail-wrap,
        .apply-wrap,
        .rate-wrap,
        .checkin-wrap,
        .payment-wrap,
        .badge-wrap,
        .membership-wrap,
        .explore-wrap {
          max-width: 900px;
          margin-left: auto;
          margin-right: auto;
        }
      }
      @media (min-width: 1200px) {
        .container,
        .wrap,
        .page-wrap,
        .detail-wrap,
        .apply-wrap,
        .rate-wrap,
        .checkin-wrap,
        .payment-wrap,
        .badge-wrap,
        .membership-wrap,
        .explore-wrap {
          max-width: 1100px;
        }
      }

      .bottom-nav {
        position: fixed;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 100%;
        max-width: var(--max-width);
        background: var(--white);
        border-top: 1px solid var(--gray-200);
        display: flex;
        justify-content: space-around;
        padding: 6px 0;
        z-index: 1000;
      }
      .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
        text-decoration: none;
        font-size: 10px;
        color: var(--dark-700);
        padding: 4px 12px;
      }
      .nav-item.active {
        color: var(--orange-700);
      }
      .nav-item .nav-icon {
        font-size: 22px;
        line-height: 1;
      }
    </style>

  <body>
    <div class="header">
      <button class="back-btn" onclick="history.back()">&larr;</button>
      <h1>我的預約</h1>
      <a
        href="my.html"
        style="font-size: 13px; color: var(--orange-700); text-decoration: none"
        >帳戶</a
      >
    </div>
    <div class="container" id="app">
      <div class="loading" id="loadingState"><script>showSkeleton(document.getElementById("loadingState"),"booking",4)</script>
        <div class="spinner"></div>
        <div>正在載入預約記錄...</div>
      </div>
      <div id="errorState" class="hidden"></div>
      <div id="contentArea" class="hidden">
        <!-- Filter Tabs -->
        <div class="tabs" id="filterTabs">
          <button class="tab-btn active" onclick="switchTab('all')">
            全部 <span class="count" id="countAll"></span>
          </button>
          <button class="tab-btn" onclick="switchTab('confirmed')">
            已確認 <span class="count" id="countConfirmed"></span>
          </button>
          <button class="tab-btn" onclick="switchTab('pending_payment')">
            待付款 <span class="count" id="countPending"></span>
          </button>
          <button class="tab-btn" onclick="switchTab('cancelled')">
            已取消 <span class="count" id="countCancelled"></span>
          </button>
        </div>
        <!-- Booking list -->
        <div class="booking-list" id="bookingList"></div>
      </div>
    </div>
    <script>
      // Use API_BASE from api.js if available, otherwise default to /api
      var MY_BASE = typeof API_BASE !== "undefined" ? API_BASE : "/api";

      function getToken() {
        return (
          localStorage.getItem("zenpass_token") ||
          sessionStorage.getItem("zenpass_token")
        );
      }
      function getAuthHeaders() {
        var t = getToken();
        return {
          Authorization: "Bearer " + t,
          "Content-Type": "application/json",
        };
      }

      var allBookings = [];
      var currentTab = "all";

      (function () {
        loadBookings();
        // Auto-refresh bookings every 30s (多人同時 book 時即時睇到變化)
        setInterval(function () {
          if (!document.hidden) loadBookings();
        }, 30000);
      })();

      function loadBookings() {
        showLoading();
        fetch(MY_BASE + "/bookings/my", { headers: getAuthHeaders() })
          .then(function (r) {
            return r.json();
          })
          .then(function (data) {
            allBookings = data.bookings || [];
            updateCounts();
            renderTab(currentTab);
            showContent();
          })
          // Check corporate info
          fetch("/api/corporate/my-company", { headers: getAuthHeaders() })
            .then(function(r) { return r.json(); })
            .then(function(corpData) {
              if (corpData && !corpData.error && corpData.company_name) {
                var avail = (corpData.credit_pool || 0) - (corpData.credit_used || 0);
                var corpBanner = document.createElement("div");
                corpBanner.className = "corp-banner";
                corpBanner.style.cssText = "background:linear-gradient(135deg,var(--orange-500),var(--orange-400),#e67a2e);border-radius:14px;padding:18px 20px;margin-bottom:16px;color:#fff;box-shadow:0 2px 12px rgba(201,68,32,0.15);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;";
                corpBanner.innerHTML = "<div><div style=\"font-weight:700;font-size:16px;margin-bottom:4px;\">🏢 " + corpData.company_name + "</div>" +
                  "<div style=\"font-size:12px;opacity:0.85;\">" +
                    "<span>公司池剩 <strong>" + avail + "</strong> cr</span>" +
                    (corpData.monthly_credit_limit ? "<span style=\"margin-left:14px;\">本月 <strong>" + (corpData.monthly_credit_used || 0) + "/" + corpData.monthly_credit_limit + "</strong> cr</span>" : "") +
                  "</div></div>" +
                  "<a href=\"corporate-hr.html\" style=\"padding:6px 14px;background:rgba(255,255,255,0.2);border-radius:8px;font-size:12px;color:#fff;text-decoration:none;font-weight:600;\">管理後台 →</a>";
                var bkList = document.getElementById("bookings-list");
                if (bkList) {
                  bkList.parentNode.insertBefore(corpBanner, bkList);
                }
              }
            })
            .catch(function (err) {
            showError("載入失敗", "無法連接到伺服器，請檢查網絡連線。");
          });
      }

      function updateCounts() {
        var confirmed = 0,
          pending = 0,
          cancelled = 0;
        allBookings.forEach(function (b) {
          if (b.status === "confirmed") confirmed++;
          else if (b.status === "pending_payment") pending++;
          else if (b.status === "cancelled") cancelled++;
        });
        document.getElementById("countAll").textContent =
          "(" + allBookings.length + ")";
        document.getElementById("countConfirmed").textContent =
          "(" + confirmed + ")";
        document.getElementById("countPending").textContent =
          "(" + pending + ")";
        document.getElementById("countCancelled").textContent =
          "(" + cancelled + ")";
      }

      function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll(".tab-btn").forEach(function (btn) {
          btn.classList.toggle(
            "active",
            btn.getAttribute("onclick").indexOf("'" + tab + "'") > -1,
          );
        });
        renderTab(tab);
      }

      function renderTab(tab) {
        var filtered;
        if (tab === "all") {
          filtered = allBookings;
        } else {
          filtered = allBookings.filter(function (b) {
            return b.status === tab;
          });
        }

        var container = document.getElementById("bookingList");
        if (filtered.length === 0) {
          container.innerHTML =
            '<div class="empty-state"><span class="empty-icon" style="font-size:48px;">📋</span><div style="font-size:15px;font-weight:600;margin:8px 0 4px">暫無預約記錄</div><p style="font-size:13px;color:var(--dark-700);margin-bottom:16px">仲未報名任何課程？而開始探索啦</p><button class="btn-primary" style="padding:10px 24px;font-size:13px" onclick="location.href=\'explore.html\'">🔍 探索課程</button></div>';
          return;
        }
        container.innerHTML = filtered
          .map(function (b) {
            return renderBookingCard(b);
          })
          .join("");
        setTimeout(updateCheckinButtons, 100);
      }

      function renderBookingCard(b) {
        var startStr = b.start_time ? formatTime(b.start_time) : "—";
        var dateStr = b.start_time ? formatDate(b.start_time) : "—";
        var badgeClass =
          b.status === "confirmed"
            ? "confirmed"
            : b.status === "pending_payment"
              ? "pending_payment"
              : b.status === "cancelled"
                ? "cancelled"
                : "attended";
        var badgeText =
          b.status === "confirmed"
            ? "已確認"
            : b.status === "pending_payment"
              ? "待付款"
              : b.status === "cancelled"
                ? "已取消"
                : "已完成";

        var payStatusClass =
          b.payment_status === "paid"
            ? "paid"
            : b.payment_status === "refunded"
              ? "refunded"
              : "unpaid";
        var payStatusText =
          b.payment_status === "paid"
            ? "✅ 已付款"
            : b.payment_status === "refunded"
              ? "💰 已退款"
              : "⏳ 未付款";
        var price = "HK$" + (b.amount || b.price_hkd || 0);

        var canCancel = false;
        if (b.status === "confirmed" || b.status === "pending_payment") {
          if (b.start_time) {
            var classTime = new Date(b.start_time).getTime();
            var now = Date.now();
            if (classTime - now > 2 * 60 * 60 * 1000) canCancel = true;
          }
        }

        var footerButtons = "";

        // Check-in button for confirmed bookings (within check-in window)
        var canCheckin = false;
        if (b.status === "confirmed" && b.start_time) {
          var classTime = new Date(b.start_time).getTime();
          var now = Date.now();
          var oneHourAfter = classTime + 60 * 60 * 1000;
          if (now >= classTime - 15 * 60 * 1000 && now <= oneHourAfter) {
            canCheckin = true;
          }
        }
        if (canCheckin) {
          var venueLat = b.latitude || 0;
          var venueLng = b.longitude || 0;
          var bookingId = b.id;
          footerButtons =
            '<div class="action-btns"><button class="checkin-btn geo-checkin-btn" style="background:#6b7280;color:white;border:none;border-radius:10px;padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;width:100%" data-booking-id="' + bookingId + '" data-lat="' + venueLat + '" data-lng="' + venueLng + '" data-schedule-id="' + b.schedule_id + '" data-class-id="' + b.class_id + '" data-date="' + (b.start_time ? b.start_time.split('T')[0] : '') + '" data-coach="' + encodeURIComponent(b.coach_name || '') + '" onclick="checkGeoBeforeCheckin(this)">📍 檢查位置中...</button></div>';
        } else {
          if (canCancel) {
            footerButtons =
              '<div class="action-btns"><button class="cancel-btn" onclick="cancelBooking(\'' +
              b.id +
              "', this)\">取消預約</button>";
          }
          if (b.status === "pending_payment") {
            footerButtons +=
              '<a href="payment.html?booking_id=' +
              b.id +
              '" class="pay-now-btn">立即付款</a>';
          }
          if (footerButtons) footerButtons += "</div>";

          // Show QR code / check-in link for upcoming confirmed bookings
          if (b.status === "confirmed") {
            footerButtons +=
              '<div style="margin-top:6px"><a href="checkin.html?schedule_id=' +
              b.schedule_id +
              '&class=' +
              b.class_id +
              '&date=' +
              (b.start_time ? b.start_time.split('T')[0] : '') +
              '&coach=' +
              encodeURIComponent(b.coach_name || '') +
              '" style="font-size:12px;color:#059669;text-decoration:underline">📱 查看簽到頁面</a></div>';
          }
        }

        // Add rating button for attended classes
        if (b.status === "attended") {
          footerButtons =
            '<a href="rate.html?booking_id=' +
            b.id +
            '" class="pay-now-btn" style="background:var(--blue-500);">⭐ 評分</a>' +
            (footerButtons || "");
        }
        var refText =
          b.class_reference || b.id
            ? "#" + (b.class_reference || b.id.substring(0, 8))
            : "";

        return (
          '<div class="booking-card"><div class="bc-header"><div><div class="bc-title">' +
          escHtml(b.title || "課程") +
          "</div>" +
          (refText
            ? '<div class="bc-ref">預約編號：' + escHtml(refText) + "</div>"
            : "") +
          '</div><span class="bc-badge ' +
          badgeClass +
          '">' +
          badgeText +
          "</span></div>" +
          '<div class="bc-detail"><span>📅 ' +
          dateStr +
          "</span><span>⏰ " +
          startStr +
          "</span><span>📍 " +
          escHtml(b.venue_name || "—") +
          (b.venue_address
            ? '<br><span style="font-size:11px;color:var(--dark-700)">' +
              escHtml(b.venue_address) +
              "</span>"
            : "") +
          "</span><span>👤 導師：" +
          escHtml(b.coach_name || "—") +
          (b.class_id
            ? '</span><span><a href="class-detail.html?id=' +
              b.class_id +
              '" style="color:var(--orange-700);text-decoration:none;font-size:12px">📖 課程詳情 →</a>'
            : "") +
          "</span></div>" +
          '<div class="bc-footer"><span class="bc-pay-status ' +
          payStatusClass +
          '">' +
          payStatusText +
          " · " +
          price +
          "</span>" +
          footerButtons +
          "</div></div>"
        );
      }

      // ===== Geo-fence check-in =====
      function calculateDistance(lat1, lon1, lat2, lon2) {
        var R = 6371000; // metres
        var phi1 = lat1 * Math.PI / 180;
        var phi2 = lat2 * Math.PI / 180;
        var deltaPhi = (lat2 - lat1) * Math.PI / 180;
        var deltaLambda = (lon2 - lon1) * Math.PI / 180;
        var a = Math.sin(deltaPhi/2) * Math.sin(deltaPhi/2) +
                Math.cos(phi1) * Math.cos(phi2) *
                Math.sin(deltaLambda/2) * Math.sin(deltaLambda/2);
        var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
      }

      function checkGeoBeforeCheckin(btn) {
        var lat = parseFloat(btn.getAttribute("data-lat"));
        var lng = parseFloat(btn.getAttribute("data-lng"));
        var scheduleId = btn.getAttribute("data-schedule-id");
        var classId = btn.getAttribute("data-class-id");
        var date = btn.getAttribute("data-date");
        var coach = btn.getAttribute("data-coach");

        if (!lat || !lng) {
          // No venue coordinates, just navigate
          window.location.href = "checkin.html?schedule_id=" + scheduleId +
            "&class=" + classId + "&date=" + date + "&coach=" + coach;
          return;
        }

        btn.disabled = true;
        btn.textContent = "📍 定位中...";
        btn.style.background = "#6b7280";

        if (!navigator.geolocation) {
          btn.disabled = false;
          btn.textContent = "📱 點擊簽到";
          btn.style.background = "#059669";
          showToast("請使用支援 GPS 的裝置", "warning");
          return;
        }

        navigator.geolocation.getCurrentPosition(
          function(pos) {
            var userLat = pos.coords.latitude;
            var userLng = pos.coords.longitude;
            var distance = calculateDistance(userLat, userLng, lat, lng);
            if (distance <= 100) {
              // Within 100m - allow check-in
              window.location.href = "checkin.html?schedule_id=" + scheduleId +
                "&class=" + classId + "&date=" + date + "&coach=" + coach;
            } else {
              btn.disabled = false;
              btn.textContent = "📍 需要到達場地才能簽到 (" + Math.round(distance) + "m)";
              btn.style.background = "#6b7280";
              showToast("你距離場地尚餘 " + Math.round(distance) + " 米，請到達後再簽到", "warning");
            }
          },
          function(err) {
            // Geolocation failed/denied - show fallback
            btn.disabled = false;
            btn.textContent = "📱 點擊簽到";
            btn.style.background = "#059669";
            var msg = err.code === 1 ? "請允許位置權限方可簽到" : "無法取得位置，請手動簽到";
            showToast(msg, "warning");
          },
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 30000 }
        );
      }

      // After rendering bookings, check geo for all check-in buttons
      function updateCheckinButtons() {
        var btns = document.querySelectorAll(".geo-checkin-btn");
        if (btns.length === 0) return;

        if (!navigator.geolocation) {
          // No geo support, make all navigable
          btns.forEach(function(btn) {
            btn.disabled = false;
            btn.textContent = "✅ 簽到";
            btn.style.background = "#059669";
          });
          return;
        }

        navigator.geolocation.getCurrentPosition(
          function(pos) {
            var userLat = pos.coords.latitude;
            var userLng = pos.coords.longitude;
            btns.forEach(function(btn) {
              var lat = parseFloat(btn.getAttribute("data-lat"));
              var lng = parseFloat(btn.getAttribute("data-lng"));
              if (lat && lng) {
                var dist = calculateDistance(userLat, userLng, lat, lng);
                if (dist <= 100) {
                  btn.textContent = "✅ 簽到 — 你已到達場地";
                  btn.style.background = "#059669";
                } else {
                  btn.textContent = "📍 需要到達場地才能簽到 (" + Math.round(dist) + "m)";
                  btn.style.background = "#6b7280";
                }
              } else {
                btn.textContent = "✅ 簽到";
                btn.style.background = "#059669";
              }
              btn.disabled = false;
            });
          },
          function() {
            // Geo denied/failed, make all navigable
            btns.forEach(function(btn) {
              btn.disabled = false;
              btn.textContent = "📱 點擊簽到";
              btn.style.background = "#059669";
            });
          },
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 30000 }
        );
      }

      function cancelBooking(id, btn) {
        if (!confirm("確定要取消此預約？")) return;
        if (btn) btn.disabled = true;

        fetch(MY_BASE + "/bookings/" + id + "/cancel", {
          method: "POST",
          headers: getAuthHeaders(),
        })
          .then(function (r) {
            return r.json();
          })
          .then(function (data) {
            if (data.error) {
              showToast(data.error, "error");
              if (btn) btn.disabled = false;
              return;
            }
            showToast("預約已取消", "success");
            loadBookings();
          })
          .catch(function (err) {
            showToast("取消失敗，請重試", "error");
            if (btn) btn.disabled = false;
          });
      }

      // ===== UI Helpers =====
      function showLoading() {
        document.getElementById("loadingState").classList.remove("hidden");
        document.getElementById("contentArea").classList.add("hidden");
        document.getElementById("errorState").classList.add("hidden");
      }

      function showContent() {
        document.getElementById("loadingState").classList.add("hidden");
        document.getElementById("contentArea").classList.remove("hidden");
        document.getElementById("errorState").classList.add("hidden");
      }

      function showError(title, message) {
        document.getElementById("loadingState").classList.add("hidden");
        document.getElementById("contentArea").classList.add("hidden");
        var el = document.getElementById("errorState");
        el.classList.remove("hidden");
        el.innerHTML =
          '<div class="error-card"><h3>' +
          escHtml(title) +
          "</h3><p>" +
          escHtml(message) +
          '</p><a href="index.html" class="btn">返回首頁</a></div>';
      }

      function showToast(msg, type) {
        var toast = document.createElement("div");
        toast.style.cssText =
          "position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:" +
          (type === "error" ? "var(--red-500)" : "var(--green-500)") +
          ";color:white;padding:12px 24px;border-radius:8px;font-size:14px;font-weight:500;z-index:1000;box-shadow:0 4px 12px rgba(0,0,0,.15);animation:fadeInUp .3s ease;";
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(function () {
          toast.style.opacity = "0";
          toast.style.transition = "opacity .3s";
          setTimeout(function () {
            toast.remove();
          }, 300);
        }, 2500);
      }

      function escHtml(s) {
        if (!s) return "";
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }
      function formatDate(isoStr) {
        if (!isoStr) return "—";
        var d = new Date(isoStr);
        return (
          d.getFullYear() +
          "/" +
          (d.getMonth() + 1) +
          "/" +
          d.getDate() +
          " (" +
          ["日", "一", "二", "三", "四", "五", "六"][d.getDay()] +
          ")"
        );
      }
      function formatTime(isoStr) {
        if (!isoStr) return "—";
        var d = new Date(isoStr);
        return (
          String(d.getHours()).padStart(2, "0") +
          ":" +
          String(d.getMinutes()).padStart(2, "0")
        );
      }

      var style = document.createElement("style");
      style.textContent =
        "@keyframes fadeInUp { from { opacity:0; transform:translateX(-50%) translateY(10px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }";
      document.head.appendChild(style);

    function cancelLocalBooking(id) {
      if (!confirm('確定要取消呢個預約？')) return;
      var data = JSON.parse(localStorage.getItem('zenpass_booked') || '{}');
      delete data[id];
      localStorage.setItem('zenpass_booked', JSON.stringify(data));
