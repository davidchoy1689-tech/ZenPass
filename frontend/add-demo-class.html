<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"><meta charset="UTF-8"><meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#FF6B35">
    <title>Add Class</title>
    <link rel="manifest" href="manifest.json">
<style>
body{font-family:sans-serif;background:#FFF8F4;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;}
.card{background:white;border-radius:24px;padding:32px;max-width:400px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.06);}
button{padding:14px 28px;background:#FF6B35;color:white;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;margin:8px;}
.success{display:none;color:#059669;font-weight:600;margin-top:16px;}
</style>
</head>
<body>
<div class="card">
    <div style="font-size:48px;">🧘</div>
    <h2>新增 Demo 課程</h2>
    <button onclick="addClass1()">➕ 流瑜伽 (今日 10:00)</button>
    <button onclick="addClass2()">➕ HIIT (今日 14:00)</button>
    <button onclick="addClass3()">➕ 冥想 (今日 19:00)</button>
    <div class="success" id="msg">✅ 已加入！㩒 <a href="coach-dashboard.html" style="color:#FF6B35;">→ 返回教練面板</a></div>
</div>
<script>
function addClass1(){window.opener?.postMessage?.({type:'add-schedule',classId:1,date:'2026-05-02',time:'10:00'},'*');document.getElementById('msg').style.display='block';}
function addClass2(){window.opener?.postMessage?.({type:'add-schedule',classId:2,date:'2026-05-02',time:'14:00'},'*');document.getElementById('msg').style.display='block';}
function addClass3(){window.opener?.postMessage?.({type:'add-schedule',classId:3,date:'2026-05-02',time:'19:00'},'*');document.getElementById('msg').style.display='block';}
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js")}</script>
</body>
</html>
