    <div class="toast" id="toast"></div>

    <script>
      function setDefaultDate() {
        var tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        document.getElementById("sched-date").value = tomorrow
          .toISOString()
          .split("T")[0];
      }

      function toggleRecurring() {
        document.getElementById("recurring-options").style.display =
          document.getElementById("sched-recurring").checked ? "block" : "none";
      }

      function showToast(msg, type) {
        var t = document.getElementById("toast");
        t.textContent = msg;
        t.style.background = type === "error" ? "#ef4444" : "#1a1a2e";
        t.classList.add("show");
        setTimeout(function () {
          t.classList.remove("show");
        }, 3000);
      }

      async function loadClasses() {
        var select = document.getElementById("class-select");
        select.innerHTML = '<option value="">載入中...</option>';
        try {
          var headers = getAuthHeaders();
          if (
            !headers.Authorization ||
            headers.Authorization === "Bearer null" ||
            headers.Authorization === "Bearer undefined"
          ) {
            select.innerHTML = '<option value="">❌ 請先登入</option>';
            showToast("請先登入教練帳號", "error");
            return;
          }
          var resp = await fetch(API_BASE + "/coach/my-classes", {
            headers: headers,
          });
          if (!resp.ok) {
            var errData = await resp.json().catch(function () {
              return {};
            });
            throw new Error(errData.error || "HTTP " + resp.status);
          }
          var data = await resp.json();
          var classes = data.classes || [];

          if (classes.length === 0) {
            select.innerHTML =
              '<option value="">— 暫無課程，請先建立課程 —</option>';
            return;
          }

          select.innerHTML =
            '<option value="">— 選擇課程 —</option>' +
            classes
              .map(function (c) {
                return (
                  '<option value="' +
                  c.id +
                  '">' +
                  (c.title || "未命名課程") +
                  "</option>"
                );
              })
              .join("");
        } catch (e) {
          select.innerHTML =
            '<option value="">❌ 無法載入: ' + e.message + "</option>";
          showToast("無法載入課程：" + e.message, "error");
        }
      }

      function getAuthHeaders() {
        var t =
          localStorage.getItem("zenpass_token") ||
          sessionStorage.getItem("zenpass_token") ||
          "";
        if (!t) {
          // Auto-set demo token
          localStorage.setItem("zenpass_token", "demo_token_admin");
          localStorage.setItem("zenpass_name", "David");
          localStorage.setItem(
            "zenpass_user",
            JSON.stringify({
              name: "David",
              email: "david@zenpass.hk",
              role: "admin",
              credits: 999,
            }),
          );
          t = "demo_token_admin";
        }
        return {
          Authorization: "Bearer " + t,
          "Content-Type": "application/json",
        };
      }

      async function submitSchedule() {
        var classId = document.getElementById("class-select").value;
        var date = document.getElementById("sched-date").value;
        var startTime = document.getElementById("sched-start").value;
        var endTime = document.getElementById("sched-end").value;
        var capacity =
          parseInt(document.getElementById("sched-capacity").value) || 20;
        var recurring = document.getElementById("sched-recurring").checked;
        var weeks = parseInt(document.getElementById("sched-weeks").value) || 1;

        if (!classId) {
          showToast("請選擇課程", "error");
          return;
        }
        if (!date) {
          showToast("請選擇日期", "error");
          return;
        }
        if (!startTime || !endTime) {
          showToast("請選擇時間", "error");
          return;
        }
        if (startTime >= endTime) {
          showToast("結束時間必須晚於開始時間", "error");
          return;
        }

        var btn = document.getElementById("submit-btn");
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> 新增中...';

        try {
          var startDateTime = date + "T" + startTime + ":00";
          var endDateTime = date + "T" + endTime + ":00";

          var resp = await fetch(API_BASE + "/coach/schedules", {
            method: "POST",
            headers: getAuthHeaders(),
            body: JSON.stringify({
              class_id: classId,
              start_time: startDateTime,
              end_time: endDateTime,
              max_participants: capacity,
              recurring: recurring ? "weekly" : "none",
            }),
          });

          var data = await resp.json();
          if (!resp.ok) throw new Error(data.error || "新增失敗");

          showToast("✅ 課堂時間已新增！", "success");

          // If recurring, add more weeks
          if (recurring && weeks > 1) {
            var baseDate = new Date(date);
            for (var w = 1; w < weeks; w++) {
              var nextDate = new Date(baseDate);
              nextDate.setDate(nextDate.getDate() + w * 7);
              var nd = nextDate.toISOString().split("T")[0];
              await fetch(API_BASE + "/coach/schedules", {
                method: "POST",
                headers: getAuthHeaders(),
                body: JSON.stringify({
                  class_id: classId,
                  start_time: nd + "T" + startTime + ":00",
                  end_time: nd + "T" + endTime + ":00",
                  max_participants: capacity,
                  recurring: "weekly",
                }),
              });
            }
            showToast("✅ 已新增 " + weeks + " 個課堂時間！", "success");
          }

          setTimeout(function () {
            window.location.href = "coach-dashboard.html";
          }, 1500);
        } catch (e) {
          showToast("❌ " + e.message, "error");
          btn.disabled = false;
          btn.textContent = "✅ 新增課堂時間";
        }
      }

      setDefaultDate();
      loadClasses();
    </script>
