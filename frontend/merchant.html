<!doctype html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#f06030" />
    <link rel="icon" href="favicon.png" type="image/png" />
    <title id="page-title">商戶 — ZenPass 禪流</title>
    <link rel="stylesheet" href="css/zenpass.css?v=2" />
    <style>
      .merchant-banner {
        width: 100%;
        height: 180px;
        background: linear-gradient(135deg, #ff6b35, #ffa075);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 64px;
        position: relative;
      }
      .merchant-banner .back {
        position: absolute;
        top: 16px;
        left: 16px;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.3);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        font-size: 20px;
        z-index: 2;
      }
      .merchant-section {
        padding: 16px;
      }
      .schedule-item {
        display: flex;
        gap: 10px;
        padding: 10px 0;
        border-bottom: 1px solid #f3f4f6;
        cursor: pointer;
      }
      .schedule-item:last-child {
        border-bottom: none;
      }
      .schedule-item .date {
        font-weight: 600;
        min-width: 60px;
        font-size: 14px;
      }
      .schedule-item .info {
        font-size: 13px;
        color: var(--dark-700);
        flex: 1;
      }
      .schedule-item .price {
        font-weight: 700;
        color: var(--orange-600-bg);
      }
      @media (max-width: 360px) {
        .merchant-banner {
          height: 140px;
          font-size: 48px;
        }
        .merchant-section {
          padding: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div class="merchant-banner" id="banner">
      <span id="banner-icon">🏢</span>
      <a href="explore.html" class="back">←</a>
    </div>
    <div class="merchant-section">
      <div class="card">
        <h1
          id="merchant-name"
          style="font-size: 22px; font-weight: 700; margin-bottom: 4px"
        >
          載入中...
        </h1>
        <div
          id="merchant-meta"
          style="font-size: 13px; color: var(--dark-700); margin-bottom: 4px"
        ></div>
        <div
          id="merchant-stats"
          style="
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 12px;
          "
        ></div>
      </div>
      <div class="card">
        <h3 style="font-size: 16px; font-weight: 700; margin-bottom: 8px">
          📅 即將開班
        </h3>
        <div id="schedule-list" style="min-height: 60px">載入中...</div>
      </div>
      <a
        id="book-link"
        href="explore.html"
        class="btn-primary"
        style="display: block; text-align: center; margin-top: 4px"
        >🔍 瀏覽所有課程</a
      >
    </div>
    <script>
      (function () {
        var params = new URLSearchParams(location.search);
        var merchantId = params.get("id");
        var merchantName = params.get("name");

        if (merchantName) {
          var decoded = decodeURIComponent(merchantName);
          document.getElementById("merchant-name").textContent = decoded;
          document.title = decoded + " — ZenPass 禪流";
        }

        (async function () {
          try {
            var r = await fetch("/api/classes?limit=100");
            var d = await r.json();
            var classes = d.classes || [];

            // Try to match by coach_id, then by venue_name containing merchantName
            var matched = classes;
            if (merchantId) {
              matched = classes.filter(function (c) {
                return (
                  c.coach_id === merchantId || c.venue_partner_id === merchantId
                );
              });
            }
            if (matched.length === 0 && merchantName) {
              var q = decodeURIComponent(merchantName).toLowerCase();
              matched = classes.filter(function (c) {
                return (
                  (c.venue_name || "").toLowerCase().includes(q) ||
                  (c.coach_name || "").toLowerCase().includes(q)
                );
              });
            }

            var allSchedules = [];
            matched.forEach(function (c) {
              (c.schedules || []).forEach(function (s) {
                allSchedules.push({
                  title: c.title,
                  price: c.price_hkd,
                  start_time: s.start_time,
                  end_time: s.end_time,
                  venue: c.venue_name,
                  classId: c.id,
                  scheduleId: s.id,
                });
              });
            });
            allSchedules.sort(function (a, b) {
              return (a.start_time || "").localeCompare(b.start_time || "");
            });

            var count = matched.length;
            var upcoming = allSchedules.length;
            var prices = matched.map(function (c) {
              return c.price_hkd || 999;
            });
            var minPrice = Math.min.apply(null, prices);

            document.getElementById("merchant-stats").innerHTML =
              '<div class="stat-box"><div class="stat-value">' +
              count +
              '</div><div class="stat-label">課程</div></div>' +
              '<div class="stat-box"><div class="stat-value">' +
              upcoming +
              '</div><div class="stat-label">即將開班</div></div>';

            if (count > 0) {
              document.getElementById("merchant-meta").textContent =
                "💰 課程由 HK$" + minPrice + " 起";
            }

            if (upcoming === 0) {
              document.getElementById("schedule-list").innerHTML =
                '<div style="text-align:center;padding:20px;color:#888;font-size:13px">暫無即將開班嘅課程</div>';
            } else {
              document.getElementById("schedule-list").innerHTML = allSchedules
                .slice(0, 10)
                .map(function (s) {
                  var d = (s.start_time || "").split("T")[0];
                  var t = ((s.start_time || "").split("T")[1] || "").substring(
                    0,
                    5,
                  );
                  return (
                    '<div class="schedule-item" onclick="location.href=\'class-detail.html?id=' +
                    s.classId +
                    "'\">" +
                    '<div class="date">' +
                    d.slice(5) +
                    "</div>" +
                    '<div class="info"><strong>' +
                    s.title +
                    "</strong><br>" +
                    t +
                    " · " +
                    (s.venue || "") +
                    "</div>" +
                    '<div class="price">$' +
                    s.price +
                    "</div></div>"
                  );
                })
                .join("");
            }
          } catch (e) {
            document.getElementById("schedule-list").innerHTML =
              '<div style="text-align:center;padding:20px;color:#ef4444;font-size:13px">❌ 載入失敗：' +
              e.message +
              "</div>";
          }
        })();
      })();
    </script>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js");
      }
    </script>
  </body>
</html>
