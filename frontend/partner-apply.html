<!doctype html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="favicon.png" type="image/png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <link rel="stylesheet" href="css/zenpass.css?v=2" />
    <style>
      :root {
        --orange-500: #ff6b35;
        --orange-700: #aa3218;
        --orange-600-bg: #c94420;
        --dark-900: #1a1a2e;
        --dark-700: #6b7280;
        --gray-200: #e5e7eb;
        --gray-50: #f9fafb;
        --teal-600: #0d9488;
        --white: #ffffff;
        --font-zh: "Noto Sans TC", system-ui, sans-serif;
        --max-width: 480px;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: var(--font-zh);
        background: var(--gray-50);
        color: var(--dark-900);
        max-width: var(--max-width);
        margin: 0 auto;
        padding: 0 0 40px;
        -webkit-font-smoothing: antialiased;
      }
      .header {
        background: linear-gradient(135deg, var(--orange-600-bg), var(--orange-500));
        color: white;
        padding: 14px 16px;
        display: flex;
        align-items: center;
        gap: 12px;
        position: sticky;
        top: 0;
        z-index: 10;
      }
      .header .back-btn {
        background: rgba(255,255,255,0.2);
        border: none;
        width: 32px; height: 32px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        cursor: pointer;
        color: white;
        text-decoration: none;
      }
      .header h1 { font-size: 17px; font-weight: 600; flex: 1; color: white; margin: 0; }

      .content { padding: 16px; }

      /* Hero Banner */
      .hero {
        background: linear-gradient(135deg, #0f766e, #14b8a6);
        border-radius: 14px;
        padding: 24px 20px;
        text-align: center;
        color: white;
        margin-bottom: 16px;
      }
      .hero .icon { font-size: 36px; margin-bottom: 6px; }
      .hero h2 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
      .hero p { font-size: 13px; opacity: 0.9; line-height: 1.6; }
      .hero .cta-tag {
        display: inline-block;
        background: rgba(255,255,255,0.2);
        padding: 4px 14px;
        border-radius: 99px;
        font-size: 12px;
        font-weight: 600;
        margin-top: 10px;
      }

      /* Benefits */
      .benefits {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
      }
      .benefits .card {
        flex: 1;
        background: white;
        border-radius: 12px;
        padding: 14px 10px;
        text-align: center;
        box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        border: 1px solid rgba(0,0,0,0.04);
      }
      .benefits .card .num { font-size: 22px; font-weight: 700; color: var(--orange-600-bg); }
      .benefits .card .lbl { font-size: 11px; color: var(--dark-700); margin-top: 2px; }

      /* Form */
      .form-card {
        background: white;
        border-radius: 14px;
        padding: 20px;
        margin-bottom: 14px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        border: 1px solid rgba(0,0,0,0.04);
      }
      .form-card h3 { font-size: 15px; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
      .form-group { margin-bottom: 14px; }
      .form-group:last-child { margin-bottom: 0; }
      .form-group label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 4px;
        color: var(--dark-700);
      }
      .form-group label .required { color: #ef4444; }
      .form-group input,
      .form-group select,
      .form-group textarea {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--gray-200);
        border-radius: 8px;
        font-size: 14px;
        font-family: var(--font-zh);
        background: var(--white);
        transition: border 0.2s;
        box-sizing: border-box;
      }
      .form-group input:focus,
      .form-group select:focus,
      .form-group textarea:focus {
        outline: none;
        border-color: var(--orange-600-bg);
      }
      .form-group textarea { height: 70px; resize: vertical; }
      .form-row { display: flex; gap: 10px; }
      .form-row .form-group { flex: 1; }

      /* Free tag */
      .free-tag {
        display: flex;
        align-items: center;
        gap: 10px;
        background: #f0fdfa;
        border: 1px solid #99f6e4;
        border-radius: 14px;
        padding: 14px 16px;
        margin-bottom: 16px;
      }
      .free-tag .emoji { font-size: 28px; }
      .free-tag .text { font-size: 13px; line-height: 1.5; color: #115e59; }
      .free-tag .text strong { font-size: 15px; }

      /* Checkbox tags */
      .tag-group { display: flex; flex-wrap: wrap; gap: 6px; }
      .tag-group label {
        padding: 6px 12px;
        border: 1px solid var(--gray-200);
        border-radius: 8px;
        cursor: pointer;
        font-size: 12px;
        transition: all 0.15s;
        user-select: none;
      }
      .tag-group label:has(input:checked) {
        background: var(--orange-600-bg);
        color: white;
        border-color: var(--orange-600-bg);
      }
      .tag-group input { display: none; }

      .btn-primary {
        width: 100%;
        padding: 14px;
        background: var(--orange-600-bg);
        color: white;
        border: none;
        border-radius: 14px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        font-family: var(--font-zh);
        transition: all 0.2s;
      }
      .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
      .btn-primary:hover:not(:disabled) { background: #aa3218; }

      .msg {
        font-size: 13px;
        text-align: center;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 10px;
        display: none;
      }
      .msg.error {
        display: block;
        background: #fef2f2;
        color: #ef4444;
      }

      /* Success */
      .success-card {
        display: none;
        text-align: center;
        padding: 32px 20px;
      }
      .success-card .icon { font-size: 64px; margin-bottom: 10px; }
      .success-card h3 {
        font-size: 20px;
        font-weight: 700;
        background: linear-gradient(135deg, var(--orange-600-bg), var(--orange-500));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .success-card p { font-size: 14px; color: var(--dark-700); line-height: 1.6; margin-top: 8px; }
      .success-card .actions { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
      .success-card .actions a {
        display: block;
        padding: 14px;
        border-radius: 14px;
        font-size: 15px;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.2s;
      }
      .success-card .actions .primary-link {
        background: var(--orange-600-bg);
        color: white;
      }
      .success-card .actions .primary-link:hover { background: #aa3218; }
      .success-card .actions .secondary-link {
        background: white;
        color: var(--orange-700);
        border: 1.5px solid var(--orange-500);
      }
      .success-card .actions .secondary-link:hover { background: var(--orange-50); }
    </style>

    <title>免費登記場地 | ZenPass 禪流</title>
    <meta name="description" content="免費登記 ZenPass 場地，30秒開通，即時上架課程，零佣金零月費。" />
    <meta property="og:title" content="免費登記場地 | ZenPass 禪流" />
    <meta property="og:description" content="免費登記 ZenPass 場地，30秒開通，即時上架課程，零佣金零月費。" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://zenpass.hk/partner-apply.html" />
    <meta property="og:image" content="https://zenpass.hk/favicon.png" />
    <meta property="og:locale" content="zh_HK" />
    <meta name="twitter:card" content="summary_large_image" />
  </head>
  <body>
    <div class="header">
      <a class="back-btn" href="javascript:history.back()">←</a>
      <h1>🏪 免費登記場地</h1>
      <span style="width: 32px"></span>
    </div>

    <div class="content" id="app">
      <!-- Hero -->
      <div class="hero">
        <div class="icon">🎯</div>
        <h2>30秒免費登記，即時啟用</h2>
        <p>將你嘅課程放上 ZenPass，接觸更多學生<br />完全免費 · 無限課程 · 即時管理</p>
        <div class="cta-tag">✨ 零月費 · 零佣金 · 零風險</div>
      </div>

      <!-- Free tag -->
      <div class="free-tag">
        <div class="emoji">🎁</div>
        <div class="text">
          <strong>而家登記完全免費</strong><br />
          唔限課程數量，冇隱藏收費，唔使信用卡
        </div>
      </div>

      <!-- Benefits -->
      <div class="benefits">
        <div class="card"><div class="num">∞</div><div class="lbl">無限課程</div></div>
        <div class="card"><div class="num">$0</div><div class="lbl">月費</div></div>
        <div class="card"><div class="num">0%</div><div class="lbl">佣金</div></div>
        <div class="card"><div class="num">⚡</div><div class="lbl">即時開通</div></div>
      </div>

      <!-- Form -->
      <div id="formContainer">
        <div class="form-card">
          <h3>📋 場地資料</h3>
          <div class="form-group">
            <label>場地名稱 <span class="required">*</span></label>
            <input type="text" id="f-name" placeholder="例如：FitZone 健身中心" />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>類別 <span class="required">*</span></label>
              <select id="f-category">
                <option value="">請選擇...</option>
                <option value="瑜伽">🧘 瑜伽</option>
                <option value="健身">💪 健身</option>
                <option value="舞蹈">💃 舞蹈</option>
                <option value="新興運動">🎯 新興運動</option>
                <option value="冥想">🧠 冥想</option>
                <option value="伸展">🤸 伸展</option>
                <option value="兒童體適能">🧒 兒童體適能</option>
                <option value="其他">其他</option>
              </select>
            </div>
            <div class="form-group">
              <label>地區 <span class="required">*</span></label>
              <select id="f-district">
                <option value="">請選擇...</option>
                <option value="港島">港島</option>
                <option value="九龍">九龍</option>
                <option value="新界">新界</option>
                <option value="線上">線上</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>地址</label>
            <input type="text" id="f-address" placeholder="詳細地址（選填）" />
          </div>
          <div class="form-group">
            <label>場地簡介</label>
            <textarea id="f-desc" placeholder="介紹你的場地、設施、特色...（選填）"></textarea>
          </div>
          <div class="form-group">
            <label>場地設施（選填）</label>
            <div class="tag-group" id="facilitiesTags">
              <label><input type="checkbox" value="wifi" /> Wi-Fi</label>
              <label><input type="checkbox" value="shower" /> 沖涼房</label>
              <label><input type="checkbox" value="locker" /> 儲物櫃</label>
              <label><input type="checkbox" value="parking" /> 泊車</label>
              <label><input type="checkbox" value="changing" /> 更衣室</label>
              <label><input type="checkbox" value="equipment" /> 器材提供</label>
            </div>
          </div>
        </div>

        <div class="form-card">
          <h3>📞 聯絡資料</h3>
          <div class="form-group">
            <label>聯絡人姓名 <span class="required">*</span></label>
            <input type="text" id="f-contact" placeholder="你的姓名" />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>聯絡電話 <span class="required">*</span></label>
              <input type="tel" id="f-phone" placeholder="6123 4567" />
            </div>
            <div class="form-group">
              <label>電郵 <span class="required">*</span></label>
              <input type="email" id="f-email" placeholder="your@email.com" />
            </div>
          </div>
          <div class="form-group">
            <label>網站 / IG（選填）</label>
            <input type="text" id="f-website" placeholder="https://instagram.com/your_studio" />
          </div>
        </div>

        <div class="msg" id="form-msg"></div>
        <button class="btn-primary" id="submitBtn" onclick="handleSubmit()">
          🚀 免費登記 — 即時啟用
        </button>
        <p style="font-size: 11px; color: #9ca3af; text-align: center; margin-top: 12px;">
          點擊即表示你同意 <a href="terms.html" style="color: var(--orange-700);">服務條款</a> 及 <a href="privacy.html" style="color: var(--orange-700);">私隱政策</a>
        </p>
      </div>

      <!-- Success -->
      <div class="success-card" id="successCard">
        <div class="icon">🎉</div>
        <h3>登記成功！場地已啟用</h3>
        <p>你嘅場地 <strong id="successName"></strong> 已經準備就緒，<br>而家可以開始加入課程同管理時間表。</p>
        <div class="actions">
          <a href="partner-dashboard.html" class="primary-link">📊 進入場地管理後台</a>
          <a href="add-demo-class.html" class="secondary-link">➕ 加入第一個課程</a>
          <a href="index.html" class="secondary-link" style="border-color: var(--gray-200); color: var(--dark-700);">🏠 返回首頁</a>
        </div>
        <p style="font-size: 12px; color: #9ca3af; margin-top: 20px;">
          如有問題，可致電 📞 2387 0724
        </p>
      </div>
    </div>

    <script src="api.js?v=2"></script>
    <script>
      function getVal(id) { return (document.getElementById(id) || {}).value || ''; }
      function showMsg(text, type) {
        var el = document.getElementById('form-msg');
        el.textContent = text;
        el.className = 'msg ' + (type || '');
      }

      function getFacilities() {
        return Array.from(
          document.querySelectorAll('#facilitiesTags input:checked')
        ).map(function(cb) { return cb.value; });
      }

      function validate() {
        if (!getVal('f-name')) { showMsg('請輸入場地名稱', 'error'); return false; }
        if (!getVal('f-category')) { showMsg('請選擇場地類別', 'error'); return false; }
        if (!getVal('f-district')) { showMsg('請選擇地區', 'error'); return false; }
        if (!getVal('f-contact')) { showMsg('請輸入聯絡人姓名', 'error'); return false; }
        if (!getVal('f-phone')) { showMsg('請輸入聯絡電話', 'error'); return false; }
        if (!getVal('f-email')) { showMsg('請輸入電郵地址', 'error'); return false; }
        return true;
      }

      async function handleSubmit() {
        if (!validate()) return;
        var btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.textContent = '⏳ 登記中...';
        showMsg('', '');

        var payload = {
          name: getVal('f-name'),
          category: getVal('f-category'),
          district: getVal('f-district'),
          address: getVal('f-address'),
          description: getVal('f-desc'),
          contact_person: getVal('f-contact'),
          phone: getVal('f-phone'),
          email: getVal('f-email'),
          website: getVal('f-website'),
          facilities: getFacilities(),
          commission_plan: 'free',
        };

        try {
          var resp = await fetch(API_BASE + '/partner/apply', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          var data = await resp.json();

          if (resp.ok && data.success) {
            document.getElementById('successName').textContent = payload.name;
            document.getElementById('formContainer').style.display = 'none';
            document.getElementById('successCard').style.display = 'block';

            // Auto-login: redirect to partner dashboard
            var token = localStorage.getItem('zenpass_token');
            if (token) {
              // Already logged in — offer dashboard
              document.querySelector('.success-card .primary-link').href = 'partner-dashboard.html';
            }
            return;
          }

          showMsg(data.error || data.message || '登記失敗，請稍後再試', 'error');
        } catch (e) {
          console.error('partner apply error:', e);
          // Fallback: save locally
          try {
            var apps = JSON.parse(localStorage.getItem('zenpass_partner_apps') || '[]');
            apps.push({ id: 'LOCAL-' + Date.now(), ...payload, submitted_at: new Date().toISOString() });
            localStorage.setItem('zenpass_partner_apps', JSON.stringify(apps));
            document.getElementById('successName').textContent = payload.name;
            document.getElementById('formContainer').style.display = 'none';
            document.getElementById('successCard').style.display = 'block';
            return;
          } catch(e2) {
            showMsg('❌ 登記失敗，請稍後再試', 'error');
          }
        }

        btn.disabled = false;
        btn.textContent = '🚀 免費登記 — 即時啟用';
      }
    </script>
  <script src="js/nav.js"></script>
<div id="zp-footer"></div>
<script src="assets/footer-loader.js"></script>
</body>
</html>
