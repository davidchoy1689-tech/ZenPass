<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {"@type":"Question","name":"如何預約課程？","acceptedAnswer":{"@type":"Answer","text":"瀏覽課程頁 → 揀選有興趣嘅課程 → 選擇時間 → 確認預約 → 完成付款。預約成功後會收到確認通知。"}},
    {"@type":"Question","name":"可以取消預約嗎？","acceptedAnswer":{"@type":"Answer","text":"✅ 可以。以下係取消規則： 取消時間 後果 🟢 開課 12 小時前 ✅ 正常取消，全額退還 Credits 🟡 開課前 2-12 小時 ⚠️ 遲取消 — 唔退還已使用嘅 Credits（等同罰款） 🔴 開課前 少於 2 小時 ❌ 無法取消，缺席將被記名 📌 Note：預約時需要同意罰款規則先可以完成預約。取消後名額會自動釋放俾候補名單嘅用戶。"}},
    {"@type":"Question","name":"缺席（No-show）有咩後果？","acceptedAnswer":{"@type":"Answer","text":"如果預約咗課程但冇出席（缺席／No-show）： 已使用嘅 Credits 唔會退還（等於俾咗錢但冇上堂） 另外會被扣除 額外 2 Credits 缺席罰款（類似 ClassPass $15 USD 政策） 系統會自動檢測缺席（課程結束 30 分鐘後）並扣除罰款 💡 提示：如果知道上唔到堂，請喺開課 12 小時前取消，咁就唔會有任何損失。"}},
    {"@type":"Question","name":"咩係候補名單（Waitlist）？","acceptedAnswer":{"@type":"Answer","text":"當課程滿座時，你可以加入候補名單。如果有人取消預約，系統會自動通知排隊最耐嘅人。"}},
    {"@type":"Question","name":"點樣簽到？","acceptedAnswer":{"@type":"Answer","text":"上堂時可以向教練出示 QR Code 簽到，或者喺 checkin 頁手動輸入課堂編號。"}},
    {"@type":"Question","name":"接受咩付款方式？","acceptedAnswer":{"@type":"Answer","text":"我哋接受信用卡（Visa/Mastercard/AMEX，經 Stripe）、轉數快 FPS、PayMe。信用卡付款會自動確認，FPS/PayMe 需要 admin 核實。"}},
    {"@type":"Question","name":"會籍自動續費點樣運作？","acceptedAnswer":{"@type":"Answer","text":"升級會籍後，系統會每月自動從你嘅信用卡扣款。你隨時可以取消自動續費。"}},
    {"@type":"Question","name":"咩係 Credits？","acceptedAnswer":{"@type":"Answer","text":"Credits 係 ZenPass 嘅平台點數，可以用嚟預約課程。你可以購買 Credits 套票或者透過推薦朋友賺取。"}},
    {"@type":"Question","name":"點樣賺取積分？","acceptedAnswer":{"@type":"Answer","text":"每日簽到 +5 分、完成課堂 +50 分、課後評價 +20 分、推薦朋友 +100 分。連續簽到仲有額外獎勵！"}},
    {"@type":"Question","name":"積分有咩用？","acceptedAnswer":{"@type":"Answer","text":"積分可以兌換折扣碼、Credits、免費堂數同 ZenPass 周邊商品。去「積分中心」睇吓有咩獎勵。"}},
    {"@type":"Question","name":"勳章系統係點運作？","acceptedAnswer":{"@type":"Answer","text":"完成指定條件會自動解鎖勳章，例如出席 1 堂、完成 5 堂、連續簽到 7 日等。收集勳章可以解鎖特殊福利。"}},
    {"@type":"Question","name":"點樣成為 ZenPass 教練？","acceptedAnswer":{"@type":"Answer","text":"去「成為教練」頁填寫申請表，我哋嘅 team 會聯絡你跟進。審批通過後就可以開班教學。"}},
    {"@type":"Question","name":"教練點樣收取費用？","acceptedAnswer":{"@type":"Answer","text":"教練可以喺 Dashboard 查看收入同申請提款。提款可以經 Stripe Connect 自動轉賬到你嘅銀行戶口。"}},
    {"@type":"Question","name":"推薦其他教練有獎勵嗎？","acceptedAnswer":{"@type":"Answer","text":"有！喺教練 Dashboard 嘅「推薦教練」功能，推薦成功後可獲得額外收入。"}},
    {"@type":"Question","name":"點樣註冊帳戶？","acceptedAnswer":{"@type":"Answer","text":"去登入頁面揀「註冊」，輸入姓名、電郵同密碼即可。註冊後會引導你完成基本設定。"}},
    {"@type":"Question","name":"忘記密碼點算？","acceptedAnswer":{"@type":"Answer","text":"喺登入頁㩒「忘記密碼」即可重置。輸入已註冊嘅電郵，系統會發送重置指示。如果收唔到電郵，可以檢查垃圾郵件箱或聯絡我們。"}},
    {"@type":"Question","name":"我嘅個人資料安全嗎？","acceptedAnswer":{"@type":"Answer","text":"所有資料經加密傳輸（HTTPS），密碼經 bcrypt 加密儲存。付款資料經 Stripe 處理，我哋唔會儲存你嘅信用卡資料。"}}
  ]
}
