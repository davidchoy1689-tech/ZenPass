<!doctype html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>404 — ZenPass 禪流</title>
    <link rel="stylesheet" href="css/zenpass.css" />
    <style>
      .error-page { text-align: center; padding: 80px 20px; }
      .error-page h1 { font-size: 72px; color: var(--primary); margin: 0; }
      .error-page p { font-size: 18px; color: var(--text-muted); margin: 20px 0 30px; }
      .error-page .btn { display: inline-block; padding: 12px 32px; }
    </style>
<!-- Footer & Back-to-Top Styles -->
    <style>
      .footer-grad {
        background: linear-gradient(135deg, #1a1a2e 0%, #2d2d44 50%, #c94420 100%);
      }
      .footer-grad .footer-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
        max-width: 400px;
        margin: 0 auto;
        padding: 40px 16px 0;
      }
      @media (min-width: 768px) {
        .footer-grad .footer-grid {
          grid-template-columns: 1fr 1fr 1fr 1fr;
          max-width: 720px;
        }
      }
      .footer-grad .footer-section-title {
        color: rgba(255,255,255,0.5);
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 10px;
      }
      .footer-grad ul {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      .footer-grad li {
        margin-bottom: 6px;
      }
      .footer-link {
        color: rgba(255,255,255,0.6);
        text-decoration: none;
        transition: color 0.2s;
        font-size: 13px;
      }
      .footer-link:hover {
        color: #fff;
      }
      .back-to-top {
        position: fixed;
        bottom: 80px;
        right: 16px;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: var(--orange-600-bg, #c94420);
        color: #fff;
        border: none;
        font-size: 20px;
        cursor: pointer;
        box-shadow: 0 2px 12px rgba(0,0,0,0.2);
        z-index: 999;
        opacity: 0;
        transform: translateY(20px);
        transition: opacity 0.3s, transform 0.3s;
        pointer-events: none;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .back-to-top.visible {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }
      .back-to-top:hover {
        background: #aa3218;
      }
    </style>
  </head>
  <body>
    <div class="error-page">
      <h1>404</h1>
      <p>搵唔到呢版 🫤 可能條 link 錯咗或者已經搬走咗</p>
      <a href="/" class="btn btn-primary">返去主頁</a>
      <a href="/explore.html" class="btn btn-outline" style="margin-left:12px">睇課程</a>
    </div>
  </body>
</html>
