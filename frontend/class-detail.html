<!doctype html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="favicon.png" type="image/png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="theme-color" content="#f06030" />
    
    <script>
      // Fix PWA manifest path for localhost vs GitHub Pages
      (function () {
        var l = document.createElement("link");
        l.rel = "manifest";
        l.href =
          window.location.hostname.indexOf("github.io") > -1
            ? "/ZenPass/manifest.json"
            : "/manifest.json";
        document.head.appendChild(l);
      })();
    </script>

    <link rel="stylesheet" href="css/zenpass.css?v=2" />
    
    
    
    <!-- 📤 Share Button (fixed bottom-right, above wishlist) -->
    <div id="share-btn-container" style="display:none;position:fixed;bottom:160px;right:16px;z-index:998">
      <button id="shareClassBtn" onclick="shareCurrentClass()"
        style="width:52px;height:52px;border-radius:50%;border:2px solid var(--gray-200);background:var(--light-900);font-size:24px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.15);display:flex;align-items:center;justify-content:center;transition:all 0.2s"
        title="分享課程">
        📤
      </button>
    </div>
    <style>
      #shareClassBtn:hover { transform: scale(1.1); }
      html.dark #shareClassBtn { background: var(--dark-800); border-color: var(--dark-700); }
    </style>

    <!-- ❤️ Wishlist Button (fixed bottom-right, shown when currentClass is set) -->
    <div id="wishlist-btn-container" style="display:none;position:fixed;bottom:100px;right:16px;z-index:998">
      <button id="wishlistBtn" onclick="toggleWishlist()"
        style="width:52px;height:52px;border-radius:50%;border:2px solid var(--gray-200);background:var(--light-900);font-size:24px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.15);display:flex;align-items:center;justify-content:center;transition:all 0.2s"
        title="收藏課程">
        🤍
      </button>
    </div>
    <style>
      #wishlistBtn:hover { transform: scale(1.1); }
      html.dark #wishlistBtn { background: var(--dark-800); border-color: var(--dark-700); }
    </style>
    <script src="api.js"></script>
    <!-- 🏷️ Dynamic Pricing Container -->
    <div id="pricing-breakdown" style="display:none;max-width:600px;margin:16px auto;padding:0 16px;">
      <div class="pricing-card" style="background:var(--white);border-radius:16px;padding:16px;box-shadow:var(--shadow-sm);">
        <div id="pricing-header" style="margin-bottom:12px;">
          <div style="font-size:13px;font-weight:600;color:var(--dark-700);margin-bottom:4px;">💰 價格詳情</div>
          <div id="pricing-base" style="font-size:14px;">原價：<span id="pricing-base-amount">—</span></div>
        </div>
        <div id="pricing-adjustments" style="border-top:1px solid var(--gray-100);padding-top:8px;margin-top:4px;"></div>
        <div id="pricing-total" style="border-top:2px solid var(--orange-400);padding-top:10px;margin-top:8px;display:flex;justify-content:space-between;align-items:center;">
          <span style="font-size:15px;font-weight:700;">最終價格</span>
          <span id="pricing-final-amount" style="font-size:20px;font-weight:800;color:var(--orange-600);">—</span>
        </div>
      </div>
    </div>
    <style>
      .pricing-adjustment-item { display:flex;align-items:center;gap:6px;padding:6px 0;font-size:13px;border-bottom:1px solid var(--gray-50); }
      .pricing-adjustment-item:last-child { border-bottom:none; }
      .pricing-discount { color:var(--green-600);font-weight:600; }
      .pricing-surcharge { color:var(--red-500);font-weight:600; }
      .pricing-badge { display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600; }
      .pricing-badge-discount { background:#d1fae5;color:#065f46; }
      .pricing-badge-surcharge { background:#fee2e2;color:#991b1b; }
    </style>
    <script src="config.js"></script>
    <script src="js/share.js"></script>

    <!-- ⭐ Rating Modal -->
    <div id="rating-modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:9999;display:none;align-items:center;justify-content:center;" onclick="if(event.target===this)closeRatingModal()">
      <div style="background:white;border-radius:16px;padding:24px;width:90%;max-width:360px;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,0.2);">
        <div style="font-size:40px;margin-bottom:8px;">⭐</div>
        <h3 style="margin:0 0 4px;font-size:18px;">評價教練</h3>
        <p style="color:var(--dark-700);font-size:13px;margin-bottom:16px;">你覺得呢堂課點樣？俾個評分啦！</p>
        <div id="rating-stars" style="font-size:36px;margin-bottom:12px;cursor:pointer;user-select:none;letter-spacing:4px;">
          <span data-star="1" onclick="setRating(1)" style="color:#ddd;">★</span>
          <span data-star="2" onclick="setRating(2)" style="color:#ddd;">★</span>
          <span data-star="3" onclick="setRating(3)" style="color:#ddd;">★</span>
          <span data-star="4" onclick="setRating(4)" style="color:#ddd;">★</span>
          <span data-star="5" onclick="setRating(5)" style="color:#ddd;">★</span>
        </div>
        <textarea id="rating-comment" placeholder="寫低你嘅感想…（選擇性）" style="width:100%;border:1px solid var(--gray-200);border-radius:8px;padding:10px;font-size:13px;font-family:inherit;resize:none;height:60px;margin-bottom:12px;box-sizing:border-box;"></textarea>
        <input type="hidden" id="rating-booking-id" value="" />
        <input type="hidden" id="rating-coach-id" value="" />
        <button onclick="submitRating()" style="width:100%;padding:12px;background:var(--orange-600-bg);color:white;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;">提交評分</button>
        <button onclick="closeRatingModal()" style="width:100%;padding:8px;background:none;border:none;color:var(--dark-700);font-size:13px;cursor:pointer;margin-top:6px;font-family:inherit;">稍後再評</button>
      </div>
    </div>

    <script>
      // ===== Wishlist System =====
      var _currentClassId = null;

      /** 初始化 wishlist button — 由 class detail 頁面 load 完成後 call */
      /** 分享目前課程 */
      function shareCurrentClass() {
        if (!currentClass) {
          showToast('課程資料尚未載入', 'error');
          return;
        }
        shareClass(currentClass.id, currentClass.title || currentClass.name || '課程');
      }

      function initWishlistBtn(classId) {
        _currentClassId = classId;
        var container = document.getElementById('wishlist-btn-container');
        if (!container) return;
        container.style.display = 'block';
        // Also show share button
        var shareContainer = document.getElementById('share-btn-container');
        if (shareContainer) shareContainer.style.display = 'block';
        checkWishlistStatus();
      }

      /** 檢查 wishlist 狀態 */
      async function checkWishlistStatus() {
        if (!_currentClassId || !isLoggedIn()) return;
        try {
          var resp = await fetch((window.API_BASE || '/api') + '/api/wishlist/check/' + _currentClassId, {
            headers: { 'Authorization': 'Bearer ' + (localStorage.getItem('zenpass_token') || localStorage.getItem('token')) }
          });
          var data = await resp.json();
          var btn = document.getElementById('wishlistBtn');
          if (btn) {
            btn.innerHTML = data.wishlisted ? '❤️' : '🤍';
            btn.dataset.wishlisted = data.wishlisted ? 'true' : 'false';
          }
        } catch (e) { /* silent */ }
      }

      /** Toggle wishlist 收藏/取消 */
      async function toggleWishlist() {
        if (!isLoggedIn()) {
          showToast('請先登入以收藏課程', 'warning');
          window.location.href = 'login.html?redirect=' + encodeURIComponent(window.location.href);
          return;
        }
        if (!_currentClassId) return;

        var btn = document.getElementById('wishlistBtn');
        var currentlyWishlisted = btn && btn.dataset.wishlisted === 'true';
        var method = currentlyWishlisted ? 'DELETE' : 'POST';
        var url = (window.API_BASE || '/api') + '/api/wishlist/' + _currentClassId;

        try {
          var resp = await fetch(url, {
            method: method,
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + (localStorage.getItem('zenpass_token') || localStorage.getItem('token'))
            }
          });
          var data = await resp.json();
          if (resp.ok || resp.status === 200) {
            var newState = data.wishlisted;
            if (btn) {
              btn.innerHTML = newState ? '❤️' : '🤍';
              btn.dataset.wishlisted = newState ? 'true' : 'false';
            }
            showToast(newState ? '✅ 已加入收藏' : '已移除收藏', 'success');
          } else {
            showToast('❌ ' + (data.error || '操作失敗'), 'error');
          }
        } catch (err) {
          showToast('❌ ' + err.message, 'error');
        }
      }

      // ⭐ Rating System
      var currentRating = 0;
      
      function showRatingModal(bookingId, coachId) {
        currentRating = 0;
        document.getElementById('rating-booking-id').value = bookingId;
        document.getElementById('rating-coach-id').value = coachId;
        document.getElementById('rating-comment').value = '';
        resetStars();
        document.getElementById('rating-modal').style.display = 'flex';
      }
      
      function closeRatingModal() {
        document.getElementById('rating-modal').style.display = 'none';
      }
      
      function setRating(val) {
        currentRating = val;
        var stars = document.querySelectorAll('#rating-stars span');
        for (var i = 0; i < stars.length; i++) {
          stars[i].style.color = i < val ? '#f59e0b' : '#ddd';
        }
      }
      
      function resetStars() {
        var stars = document.querySelectorAll('#rating-stars span');
        for (var i = 0; i < stars.length; i++) {
          stars[i].style.color = '#ddd';
        }
      }
      
      async function submitRating() {
        if (currentRating === 0) {
          showToast('請選擇評分', 'warning');
          return;
        }
        var bookingId = document.getElementById('rating-booking-id').value;
        var coachId = document.getElementById('rating-coach-id').value;
        var comment = document.getElementById('rating-comment').value.trim();
        
        try {
          var resp = await fetch(API_BASE + '/ratings', {
            method: 'POST',
            headers: Object.assign({ 'Content-Type': 'application/json' }, getAuthHeaders()),
            body: JSON.stringify({
              booking_id: bookingId,
              coach_id: coachId,
              rating: currentRating,
              comment: comment
            })
          });
          var data = await resp.json();
          if (resp.ok) {
            showToast('✅ 評分已提交！', 'success');
            closeRatingModal();
          } else {
            showToast('❌ ' + (data.error || '提交失敗'), 'error');
          }
        } catch (err) {
          showToast('❌ ' + err.message, 'error');
        }
      }

      // Check after load if user has attended bookings for this class that need rating
      async function checkPendingRating() {
        if (!isLoggedIn() || !currentClass) return;
        try {
          var resp = await fetch(API_BASE + '/bookings/my?status=attended&class_id=' + currentClass.id, {
            headers: getAuthHeaders()
          });
          var data = await resp.json();
          if (resp.ok && data.bookings && data.bookings.length > 0) {
            var booking = data.bookings[0];
            // Check if already rated
            var ratedResp = await fetch(API_BASE + '/ratings/coach/' + currentClass.coach_id);
            var ratedData = await ratedResp.json();
            var alreadyRated = ratedData.ratings && ratedData.ratings.some(function(r) { return r.booking_id === booking.id; });
            if (!alreadyRated) {
              setTimeout(function() {
                showRatingModal(booking.id, currentClass.coach_id);
              }, 2000);
            }
          }
        } catch (e) {
          // Silent fail
        }
      }
      // ===== Dynamic Pricing =====
      var _currentScheduleId = null;

      /** Set the current schedule for pricing lookup — call from page init */
      function setCurrentSchedule(scheduleId) {
        _currentScheduleId = scheduleId;
        if (scheduleId) loadPricingBreakdown();
      }

      async function loadPricingBreakdown() {
        var container = document.getElementById('pricing-breakdown');
        if (!container || !_currentScheduleId) return;

        try {
          var resp = await fetch(API_BASE + '/pricing/estimate?schedule_id=' + _currentScheduleId);
          if (!resp.ok) return;
          var data = await resp.json();
          if (!data.success) return;

          container.style.display = 'block';

          // Base price
          document.getElementById('pricing-base-amount').textContent = data.basePrice + ' Credits';

          // Adjustments
          var adjContainer = document.getElementById('pricing-adjustments');
          adjContainer.innerHTML = '';

          if (data.adjustments && data.adjustments.length > 0) {
            for (var i = 0; i < data.adjustments.length; i++) {
              var adj = data.adjustments[i];
              var isDiscount = adj.multiplier < 1;
              var pctChange = isDiscount 
                ? '-' + Math.round((1 - adj.multiplier) * 100) + '%'
                : '+' + Math.round((adj.multiplier - 1) * 100) + '%';
              
              var item = document.createElement('div');
              item.className = 'pricing-adjustment-item';
              item.innerHTML = 
                '<span class="pricing-badge ' + (isDiscount ? 'pricing-badge-discount' : 'pricing-badge-surcharge') + '">' + pctChange + '</span>' +
                '<span style="flex:1;">' + (adj.description || adj.label || '') + '</span>';
              adjContainer.appendChild(item);
            }
          } else {
            adjContainer.innerHTML = '<div style="font-size:13px;color:var(--dark-700);padding:6px 0;">今日無特別優惠 🤙</div>';
          }

          // Final price
          document.getElementById('pricing-final-amount').textContent = data.finalPrice + ' Credits';
        } catch (e) {
          // Silent — pricing is optional
          container.style.display = 'none';
        }
      }
    </script>
  <script src="js/nav.js"></script>
<script src="js/footer.js"></script>
</body>
</html>
