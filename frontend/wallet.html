    <style>
      * { margin:0; padding:0; box-sizing:border-box; }
      body {
        font-family:'Inter','Noto Sans TC',sans-serif;
        background:#fff8f4;
        color:#1a1a2e;
        min-height:100vh;
        padding-bottom:80px;
      }

      /* Header */
      .wallet-header {
        background:linear-gradient(135deg,#FF6B35,#FF8C42);
        color:#fff;
        padding:24px 20px 32px;
        position:relative;
      }
      .wallet-header .back-row {
        display:flex;align-items:center;gap:8px;margin-bottom:16px;
      }
      .wallet-header .back-row a {
        color:#fff;text-decoration:none;font-size:14px;opacity:0.85;
      }
      .wallet-header .back-row a:hover{opacity:1;}
      .wallet-header h1 { font-size:20px;font-weight:700; }

      /* Balance Cards */
      .balance-row {
        display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:-16px 16px 0;
      }
      .balance-card {
        background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,0.06);
        position:relative;overflow:hidden;
      }
      .balance-card .label { font-size:12px;color:#888;margin-bottom:4px; }
      .balance-card .amount {
        font-size:24px;font-weight:700;color:#1a1a2e;
      }
      .balance-card .amount .currency { font-size:14px;color:#888;font-weight:500; }
      .balance-card .action-btn {
        display:block;margin-top:10px;padding:6px 12px;border:none;border-radius:8px;
        font-size:11px;font-weight:600;cursor:pointer;text-align:center;text-decoration:none;
      }
      .card-credits .action-btn { background:#fef3c7;color:#92400e; }
      .card-wallet .action-btn { background:#dbeafe;color:#1e40af; }

      /* Tab selector */
      .tab-row {
        display:flex;margin:20px 16px 0;gap:4px;background:#f0f0f0;border-radius:12px;padding:3px;
      }
      .tab-row .tab {
        flex:1;text-align:center;padding:10px;border-radius:10px;font-size:13px;font-weight:500;
        cursor:pointer;transition:all 0.2s;color:#666;
      }
      .tab-row .tab.active { background:#fff;color:#1a1a2e;font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,0.08); }

      /* Transaction list */
      .tx-list { margin:12px 16px 0; }
      .tx-day { font-size:12px;font-weight:600;color:#888;padding:12px 0 6px; }
      .tx-item {
        display:flex;align-items:center;gap:12px;padding:12px;background:#fff;
        border-radius:12px;margin-bottom:6px;box-shadow:0 1px 4px rgba(0,0,0,0.04);
      }
      .tx-icon {
        width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;
        font-size:14px;flex-shrink:0;
      }
      .tx-icon.credit { background:#fef3c7; }
      .tx-icon.debit { background:#fee2e2; }
      .tx-icon.income { background:#d1fae5; }
      .tx-info { flex:1;min-width:0; }
      .tx-info .tx-title { font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
      .tx-info .tx-date { font-size:11px;color:#aaa;margin-top:2px; }
      .tx-amount { font-size:14px;font-weight:600;text-align:right;white-space:nowrap; }
      .tx-amount.positive { color:#059669; }
      .tx-amount.negative { color:#dc2626; }

      .empty-tx {
        text-align:center;padding:48px 16px;color:#aaa;font-size:14px;
      }
      .empty-tx .icon { font-size:40px;margin-bottom:8px; }

      .load-more {
        text-align:center;padding:16px;
      }
      .load-more button {
        background:none;border:1px solid #e0e0e0;border-radius:8px;padding:8px 24px;
        font-size:13px;color:#888;cursor:pointer;
      }
      .load-more button:hover{background:#f5f5f5;}

      /* Loading & Error */
      .loading-state {
        text-align:center;padding:60px 16px;color:#aaa;
      }
      .loading-state .spinner {
        display:inline-block;width:32px;height:32px;
        border:3px solid #f0f0f0;border-top-color:#FF6B35;
        border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:12px;
      }
      @keyframes spin{to{transform:rotate(360deg)}}

      /* Nav */
      .bottom-nav {
        position:fixed;bottom:0;left:0;right:0;background:#fff;
        border-top:1px solid #f0f0f0;display:flex;padding:8px 0;padding-bottom:env(safe-area-inset-bottom,8px);
        z-index:100;
      }
      .bottom-nav a {
        flex:1;text-align:center;text-decoration:none;color:#888;font-size:11px;font-weight:500;
        padding:4px 0;
      }
      .bottom-nav a.active { color:#FF6B35; }
      .bottom-nav a .nav-icon { font-size:20px;display:block;margin-bottom:2px; }

      @media (max-width:380px) {
        .balance-row { grid-template-columns:1fr; }
        .balance-card .amount { font-size:20px; }
      }
    </style>

  <body>

    <!-- Header -->
    <div class="wallet-header">
      <div class="back-row">
        <a href="my.html">← 返回</a>
        <h1>💰 錢包</h1>
      </div>
    </div>

    <!-- Balance Cards -->
    <div class="balance-row" id="balanceCards"></div>

    <!-- Tab Selector -->
    <div class="tab-row" id="tabRow">
      <div class="tab active" data-tab="credits" onclick="switchTab('credits')">🎫 Credits</div>
      <div class="tab" data-tab="wallet" onclick="switchTab('wallet')">💰 銀包</div>
    </div>

    <!-- Content -->
    <div id="content">
      <div class="loading-state">
        <div class="spinner"></div>
        <div>載入中...</div>
      </div>
    </div>

    <!-- Bottom Nav -->
    <div class="bottom-nav">
      <a href="index.html"><span class="nav-icon">🏠</span>首頁</a>
      <a href="courses.html"><span class="nav-icon">📋</span>課程</a>
      <a href="my-bookings.html"><span class="nav-icon">📅</span>我的預約</a>
      <a href="my.html" class="active"><span class="nav-icon">👤</span>帳戶</a>
    </div>

    <script src="api.js?v=2"></script>
    <script>
      // ===== Auth check =====
      var token = localStorage.getItem("zenpass_token");
      if (!token) { location.href = "login.html?redirect=wallet.html"; }

      var user = null;
      try { user = JSON.parse(localStorage.getItem("zenpass_user") || "{}"); } catch(e){}
      var isCoach = user && (user.is_coach === 1 || user.is_coach === true);
      var API = typeof API_BASE !== "undefined" ? API_BASE : "/api";
      var currentTab = "credits";
      var walletTxOffset = 0;
      var creditTxOffset = 0;
      var hasMoreWallet = true;
      var hasMoreCredits = true;

      // ===== Load wallet data =====
      async function loadWallet() {
        try {
          // Load user data for credits
          if (user && user.id) {
            try {
              var r = await fetch(API + "/auth/me", {
                headers: { Authorization: "Bearer " + token }
              });
              var d = await r.json();
              if (d.user) {
                user = d.user;
                localStorage.setItem("zenpass_user", JSON.stringify(d.user));
              }
            } catch(e){ /* use cached user */ }
          }

          // Load wallet summary (for coaches/partners)
          var walletSummary = null;
          try {
            var wr = await fetch(API + "/wallet/summary", {
              headers: { Authorization: "Bearer " + token }
            });
            walletSummary = await wr.json();
          } catch(e) {}

          renderBalanceCards(walletSummary);
          loadCredits();
        } catch(e) {
          document.getElementById("content").innerHTML =
            '<div class="empty-tx"><div class="icon">❌</div>載入失敗，請稍後再試</div>';
        }
      }

      // ===== Render balance cards =====
      function renderBalanceCards(summary) {
        var credits = user ? user.credits || 0 : 0;
        var walletBal = summary && summary.wallet_balance ? summary.wallet_balance : 0;

        var html = "";
        // Credits card
        html += '<div class="balance-card card-credits">' +
          '<div class="label">🎫 Credits 餘額</div>' +
          '<div class="amount">' + credits + ' <span class="currency">cr</span></div>' +
          '<a href="buy-credits.html" class="action-btn">➕ 加購</a>' +
          '</div>';

        // Wallet card (show for coaches or if balance > 0)
        if (isCoach || walletBal > 0) {
          html += '<div class="balance-card card-wallet">' +
            '<div class="label">💰 銀包結餘</div>' +
            '<div class="amount">HK$<span class="currency">' + (walletBal || 0).toFixed(2) + '</span></div>' +
            (isCoach ? '<a href="coach-dashboard.html" class="action-btn">📊 查看詳情</a>' : '') +
            '</div>';
        } else {
          html += '<div class="balance-card card-wallet" style="opacity:0.6">' +
            '<div class="label">💰 銀包結餘</div>' +
            '<div class="amount">HK$0.00</div>' +
            '<div style="font-size:11px;color:#aaa;margin-top:6px">教練／夥伴專用</div>' +
            '</div>';
        }

        document.getElementById("balanceCards").innerHTML = html;
      }

      // ===== Switch tab =====
      function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll(".tab-row .tab").forEach(function(el) {
          el.classList.toggle("active", el.dataset.tab === tab);
        });
        if (tab === "credits") loadCredits();
        else loadWalletTransactions();
      }

      // ===== Load credits history =====
      async function loadCredits() {
        var content = document.getElementById("content");
        content.innerHTML = '<div class="loading-state"><div class="spinner"></div><div>載入中...</div></div>';

        try {
          var r = await fetch(API + "/auth/me", {
            headers: { Authorization: "Bearer " + token }
          });
          var d = await r.json();
          if (d.user) {
            user = d.user;
            localStorage.setItem("zenpass_user", JSON.stringify(d.user));
          }

          // Get credit transactions from /transactions endpoint
          var txs = [];
          try {
            var tr = await fetch(API + "/payments/transactions?type=credits_topup&limit=50", {
              headers: { Authorization: "Bearer " + token }
            });
            var td = await tr.json();
            if (td.transactions) txs = td.transactions;
            else if (Array.isArray(td)) txs = td;
          } catch(e) {}

          // Also get wallet transactions for booking spends
          var walletTxs = [];
          try {
            var wr = await fetch(API + "/wallet/transactions?limit=50", {
              headers: { Authorization: "Bearer " + token }
            });
            var wd = await wr.json();
            if (wd.transactions) walletTxs = wd.transactions;
            else if (Array.isArray(wd)) walletTxs = wd;
          } catch(e) {}

          renderCredits(txs, walletTxs);
        } catch(e) {
          renderCredits([], []);
        }
      }

      function renderCredits(creditTxs, walletTxs) {
        var credits = user ? user.credits || 0 : 0;

        // Build combined list
        var items = [];

        // Credit top-ups
        if (Array.isArray(creditTxs)) {
          creditTxs.forEach(function(tx) {
            items.push({
              type: "credit_topup",
              icon: "🎫",
              iconClass: "credit",
              title: tx.description || "加購 Credits",
              date: tx.created_at || "",
              amount: "+" + (tx.amount || 0) + " cr",
              amountClass: "positive",
              rawDate: tx.created_at || ""
            });
          });
        }

        // Wallet transactions for this user (booking spends, class income)
        if (Array.isArray(walletTxs)) {
          walletTxs.forEach(function(tx) {
            var amt = tx.amount || 0;
            var isPositive = amt > 0;
            items.push({
              type: tx.type || "adjustment",
              icon: isPositive ? "💰" : "💸",
              iconClass: isPositive ? "income" : "debit",
              title: tx.description || (isPositive ? "收入" : "支出"),
              date: tx.created_at || "",
              amount: (isPositive ? "+" : "") + "HK$" + Math.abs(amt).toFixed(2),
              amountClass: isPositive ? "positive" : "negative",
              rawDate: tx.created_at || ""
            });
          });
        }

        // Also fake some credit spending from bookings if we have user booking data
        // In a real app, we'd have a dedicated credits transaction endpoint

        if (items.length === 0) {
          document.getElementById("content").innerHTML =
            '<div class="empty-tx"><div class="icon">🎫</div><div>尚未有交易記錄<br><span style="font-size:12px;color:#ccc">預約課程後會喺呢度顯示</span></div></div>';
          return;
        }

        items.sort(function(a, b) { return b.rawDate.localeCompare(a.rawDate); });

        var html = '<div class="tx-list">';
        var lastDay = "";
        items.forEach(function(item) {
          var day = item.date ? item.date.substring(0, 10) : "";
          if (day !== lastDay) {
            html += '<div class="tx-day">' + formatDay(day) + '</div>';
            lastDay = day;
          }
          html +=
            '<div class="tx-item">' +
            '<div class="tx-icon ' + item.iconClass + '">' + item.icon + '</div>' +
            '<div class="tx-info">' +
            '<div class="tx-title">' + item.title + '</div>' +
            '<div class="tx-date">' + (item.date ? item.date.substring(0, 16).replace("T", " ") : "") + '</div>' +
            '</div>' +
            '<div class="tx-amount ' + item.amountClass + '">' + item.amount + '</div>' +
            '</div>';
        });
        html += '</div>';
        document.getElementById("content").innerHTML = html;
      }

      // ===== Load wallet (HKD) transactions =====
      async function loadWalletTransactions() {
        var content = document.getElementById("content");
        content.innerHTML = '<div class="loading-state"><div class="spinner"></div><div>載入中...</div></div>';

        try {
          var r = await fetch(API + "/wallet/transactions?limit=50", {
            headers: { Authorization: "Bearer " + token }
          });
          var d = await r.json();
          var txs = d.transactions || [];
          renderWalletTxs(txs);
        } catch(e) {
          renderWalletTxs([]);
        }
      }

      function renderWalletTxs(txs) {
        if (!txs || txs.length === 0) {
          document.getElementById("content").innerHTML =
            '<div class="empty-tx"><div class="icon">💰</div><div>尚未有銀包交易<br><span style="font-size:12px;color:#ccc">成為教練或夥伴後，收入會喺呢度顯示</span></div></div>';
          return;
        }

        var html = '<div class="tx-list">';
        var lastDay = "";
        txs.forEach(function(tx) {
          var day = tx.created_at ? tx.created_at.substring(0, 10) : "";
          if (day !== lastDay) {
            html += '<div class="tx-day">' + formatDay(day) + '</div>';
            lastDay = day;
          }
          var amt = tx.amount || 0;
          var isPositive = amt > 0;
          var icon, iconClass, label;
          switch(tx.type) {
            case "class_income": icon = "📚"; iconClass = "income"; label = "課堂收入"; break;
            case "withdrawal": icon = "🏧"; iconClass = "debit"; label = "提現"; break;
            case "rental_payment": icon = "🏠"; iconClass = "debit"; label = "租場"; break;
            case "refund": icon = "↩️"; iconClass = "income"; label = "退款"; break;
            case "adjustment": icon = "⚙️"; iconClass = "credit"; label = "調整"; break;
            default: icon = "💳"; iconClass = isPositive ? "income" : "debit"; label = tx.description || tx.type || "交易"; break;
          }

          html +=
            '<div class="tx-item">' +
            '<div class="tx-icon ' + iconClass + '">' + icon + '</div>' +
            '<div class="tx-info">' +
            '<div class="tx-title">' + label + '</div>' +
            '<div class="tx-date">' + (tx.created_at ? tx.created_at.substring(0, 16).replace("T", " ") : "") + '</div>' +
            '</div>' +
            '<div class="tx-amount ' + (isPositive ? "positive" : "negative") + '">' +
            (isPositive ? "+" : "-") + "HK$" + Math.abs(amt).toFixed(2) +
            '</div>' +
            '</div>';
        });
        html += '</div>';
        document.getElementById("content").innerHTML = html;
      }

      // ===== Helpers =====
      function formatDay(dateStr) {
        if (!dateStr) return "";
        var parts = dateStr.split("-");
        if (parts.length < 3) return dateStr;
        try {
          var d = new Date(dateStr + "T12:00:00");
          var today = new Date();
          var yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);

          if (d.toDateString() === today.toDateString()) return "今天";
          if (d.toDateString() === yesterday.toDateString()) return "昨天";

          var monthNames = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
          return parseInt(parts[1]) + "月" + parseInt(parts[2]) + "日";
        } catch(e) {
          return dateStr;
        }
      }

      // ===== Init =====
      loadWallet();
    </script>
