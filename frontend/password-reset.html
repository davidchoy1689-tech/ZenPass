<!doctype html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#f06030" />
    
    <script defer src="api.js?v=2"></script>
    <link rel="stylesheet" href="css/zenpass.css?v=2" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: var(--font-zh);
        background: var(--gray-50);
        color: var(--dark-900);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .card {
        background: var(--white);
        border-radius: var(--radius-md);
        padding: 32px 24px;
        width: 100%;
        max-width: var(--max-width);
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      }
      .logo { text-align: center; margin-bottom: 24px; }
      .logo .icon { font-size: 48px; }
      .logo h1 { font-size: 22px; font-weight: 800; margin-top: 8px; }
      .logo p { font-size: 13px; color: var(--dark-700); margin-top: 4px; }
      .form-group { margin-bottom: 14px; }
      .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; color: var(--dark-700); }
      .form-group input {
        width: 100%; padding: 12px; border: 1px solid var(--gray-200);
        border-radius: var(--radius-sm); font-size: 15px; font-family: var(--font-zh);
        background: var(--white); transition: border 0.2s;
      }
      .form-group input:focus { outline: none; border-color: var(--orange-700); }
      .btn {
        width: 100%; padding: 14px; border: none; border-radius: var(--radius-sm);
        font-size: 16px; font-weight: 700; cursor: pointer; font-family: var(--font-zh);
        transition: background 0.2s;
      }
      .btn-primary { background: var(--orange-600-bg); color: var(--white); }
      .btn-primary:hover { background: #e55a2b; }
      .btn-primary:disabled { background: var(--gray-200); cursor: not-allowed; }
      .msg { font-size: 13px; margin-top: 8px; padding: 8px; border-radius: 6px; display: none; }
      .msg.error { display: block; background: #fef2f2; color: var(--red-500); }
      .msg.success { display: block; background: #ecfdf5; color: var(--green-500); }
      .msg.info { display: block; background: #eff6ff; color: var(--blue-500); }
      .back-link {
        display: block; text-align: center; margin-top: 16px;
        color: var(--orange-700); text-decoration: none; font-size: 14px;
      }
      .back-link:hover { text-decoration: underline; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .spinner {
        display: inline-block; width: 18px; height: 18px;
        border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
        border-radius: 50%; animation: spin 0.8s linear infinite;
        vertical-align: middle; margin-right: 8px;
      }
      @media (max-width: 480px) {
        .card { padding: 24px 16px; }
        .logo .icon { font-size: 36px; }
        .logo h1 { font-size: 18px; }
        .btn { padding: 12px; font-size: 14px; }
      }
      .step { display: none; }
      .step.active { display: block; }
      .token-display {
        background: var(--gray-100); padding: 12px; border-radius: 6px;
        font-family: monospace; font-size: 13px; word-break: break-all;
        margin: 12px 0; text-align: center;
      }
    </style>
    <!-- Google tag (gtag.js) - GA4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MKF5N4YLBM"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() { dataLayer.push(arguments); }
      gtag("js", new Date());
      gtag("config", "G-MKF5N4YLBM");

        <!-- SEO -->
    <title>重設密碼 — ZenPass 禪流</title>
    <meta name="description" content="重設你的 ZenPass 帳戶密碼。">
    <meta property="og:title" content="重設密碼 — ZenPass 禪流">
    <meta property="og:description" content="重設你的 ZenPass 帳戶密碼。">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="ZenPass 禪流">
    <meta name="twitter:card" content="summary_large_image">
    <!-- Footer & Back-to-Top Styles -->
    <style>
      .footer-grad {
        background: linear-gradient(135deg, #1a1a2e 0%, #2d2d44 50%, #c94420 100%);
      }
      .footer-grad .footer-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
        max-width: 400px;
        margin: 0 auto;
        padding: 40px 16px 0;
      }
      @media (min-width: 768px) {
        .footer-grad .footer-grid {
          grid-template-columns: 1fr 1fr 1fr 1fr;
          max-width: 720px;
        }
      }
      .footer-grad .footer-section-title {
        color: rgba(255,255,255,0.5);
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 10px;
      }
      .footer-grad ul {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      .footer-grad li {
        margin-bottom: 6px;
      }
      .footer-link {
        color: rgba(255,255,255,0.6);
        text-decoration: none;
        transition: color 0.2s;
        font-size: 13px;
      }
      .footer-link:hover {
        color: #fff;
      }
      .back-to-top {
        position: fixed;
        bottom: 80px;
        right: 16px;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: var(--orange-600-bg, #c94420);
        color: #fff;
        border: none;
        font-size: 20px;
        cursor: pointer;
        box-shadow: 0 2px 12px rgba(0,0,0,0.2);
        z-index: 999;
        opacity: 0;
        transform: translateY(20px);
        transition: opacity 0.3s, transform 0.3s;
        pointer-events: none;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .back-to-top.visible {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }
      .back-to-top:hover {
        background: #aa3218;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">
        <div class="icon">🔑</div>
        <h1>重置密碼</h1>
        <p>請輸入新密碼</p>
      </div>

      <!-- Step 1: Request Reset -->
      <div class="step active" id="step-request">
        <div class="form-group">
          <label>電郵</label>
          <input type="email" id="reset-email" placeholder="your@email.com" />
        </div>
        <button class="btn btn-primary" id="reset-request-btn" onclick="requestReset()">
          發送重置連結
        </button>
        <div class="msg" id="request-msg"></div>
        <a href="login.html" class="back-link">← 返回登入</a>
      </div>

      <!-- Step 2: Enter New Password -->
      <div class="step" id="step-reset">
        <div class="form-group">
          <label>新密碼</label>
          <input type="password" id="new-password" placeholder="至少 6 個字元" />
        </div>
        <div class="form-group">
          <label>確認密碼</label>
          <input type="password" id="confirm-password" placeholder="再次輸入新密碼" />
        </div>
        <button class="btn btn-primary" id="reset-btn" onclick="doPasswordReset()">
          重置密碼
        </button>
        <div class="msg" id="reset-msg"></div>
        <a href="login.html" class="back-link">← 返回登入</a>
      </div>

      <!-- Step 3: Done -->
      <div class="step" id="step-done">
        <div class="msg success" id="done-msg" style="display:block;text-align:center;font-size:15px;padding:16px;">
          ✅ 密碼已成功重置！
        </div>
        <a href="login.html" class="btn btn-primary" style="display:block;text-align:center;margin-top:16px;text-decoration:none;">
          前往登入
        </a>
      </div>
    </div>

    <script>
      var API_BASE = window.API_BASE || '';

      // Check for token in URL
      (function() {
        var match = window.location.search.match(/[?&]token=([^&]+)/);
        if (match) {
          var token = decodeURIComponent(match[1]);
          document.getElementById('step-request').classList.remove('active');
          document.getElementById('step-reset').classList.add('active');
          // Store token
          window.__resetToken = token;
        }
      })();

      function setMsg(id, text, type) {
        var el = document.getElementById(id);
        el.textContent = text;
        el.className = 'msg ' + type;
      }

      async function requestReset() {
        var email = document.getElementById('reset-email').value.trim();
        if (!email) {
          setMsg('request-msg', '請輸入電郵', 'error');
          return;
        }

        var btn = document.getElementById('reset-request-btn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> 處理中...';

        try {
          var resp = await fetch(API_BASE + '/auth/password-reset-request', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email })
          });
          var data = await resp.json();
          setMsg('request-msg', '✅ ' + data.message, 'success');

          // Dev mode: show token if available
          if (data.dev_token) {
            var tokenHtml = '<div style="margin-top:12px;padding:12px;background:#fef9c3;border-radius:6px;font-size:13px;">';
            tokenHtml += '<strong>🔧 開發模式</strong><br>';
            tokenHtml += 'Token: <code style="word-break:break-all;background:#fff;padding:2px 6px;border-radius:4px;">' + data.dev_token + '</code><br>';
            tokenHtml += '<a href="password-reset.html?token=' + data.dev_token + '" style="color:var(--orange-700);font-weight:600;">→ 按此重置密碼</a>';
            tokenHtml += '</div>';
            document.getElementById('request-msg').insertAdjacentHTML('afterend', tokenHtml);
          }

          btn.disabled = false;
          btn.textContent = '發送重置連結';
        } catch (e) {
          setMsg('request-msg', '❌ 網絡錯誤，請稍後再試', 'error');
          btn.disabled = false;
          btn.textContent = '發送重置連結';
        }
      }

      async function doPasswordReset() {
        var password = document.getElementById('new-password').value;
        var confirm = document.getElementById('confirm-password').value;

        if (!password || !confirm) {
          setMsg('reset-msg', '請填寫所有欄位', 'error');
          return;
        }
        if (password.length < 6) {
          setMsg('reset-msg', '密碼至少需要 6 個字元', 'error');
          return;
        }
        if (password !== confirm) {
          setMsg('reset-msg', '兩次輸入的密碼不一致', 'error');
          return;
        }

        var btn = document.getElementById('reset-btn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> 重置中...';

        try {
          var resp = await fetch(API_BASE + '/auth/password-reset', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: window.__resetToken, new_password: password })
          });
          var data = await resp.json();

          if (!resp.ok) {
            setMsg('reset-msg', '❌ ' + (data.error || '重置失敗'), 'error');
            btn.disabled = false;
            btn.textContent = '重置密碼';
            return;
          }

          // Success - show done step
          document.getElementById('step-reset').classList.remove('active');
          document.getElementById('step-done').classList.add('active');
        } catch (e) {
          setMsg('reset-msg', '❌ 網絡錯誤，請稍後再試', 'error');
          btn.disabled = false;
          btn.textContent = '重置密碼';
        }
      }
    </script>
  <script src="js/nav.js"></script>
<div id="zp-footer"></div>
<script src="assets/footer-loader.js"></script>
</body>
</html>
