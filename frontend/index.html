        // ===== Render Class Card =====
        function renderClassCard(cls) {
            var emojiMap = { '瑜伽': '🧘', '健身': '🏋️', '伸展': '🤸', '冥想': '🧠', '舞蹈': '💃', '新興運動': '🎯', '普拉提': '🤸', '武術': '🥋', '太極': '☯️' };
            var emoji = emojiMap[cls.category] || '🏃';
            var price = cls.price_hkd ? 'HK$' + cls.price_hkd : '';
            var rating = cls.rating || '⭐4.8';
            var spots = cls.remaining_spots !== undefined ? cls.remaining_spots : null;
            var coach = cls.coach_name || '';
            var hot = cls.is_hot || cls.popular ? '<span class="badge-hot">🔥 熱門</span>' : '';
            var schedule = cls.schedules && cls.schedules[0] ? 
                '<div class="class-card-meta">📅 ' + formatDate(cls.schedules[0].start_time) + ' ' + formatTime(cls.schedules[0].start_time) + '</div>' : '';
            
            return '<div class="class-card" onclick="location.href=\'class-detail.html?id=' + cls.id + '\'">' + 
                '<div class="class-card-img">' + emoji + '</div>' + 
                '<div class="class-card-body">' + 
                '<span class="class-card-category">' + cls.category + '</span>' + 
                '<div class="class-card-title">' + cls.title + '</div>' + 
                (schedule ? schedule : '<div class="class-card-meta">⏱ ' + (cls.duration_min || 60) + 'min · ' + rating + (coach ? ' · 👩‍🏫 ' + coach : '') + '</div>') + 
                '<div class="class-card-price">' + price + ' ' + hot + '</div>' + 
                (spots !== null ? '<div class="class-card-spots">剩餘 ' + spots + ' 位</div>' : '') + 
                '</div></div>';
        }

            var query = document.getElementById('search-input').value.trim();
            if (query) {
                window.location.href = 'explore.html?search=' + encodeURIComponent(query);
            }

            updateNavBar();
        });
    
  // Bind click handlers for login/register/search
  var loginBtn = document.getElementById("zenBtnLogin");
  if (loginBtn) loginBtn.addEventListener("click", function(e) { e.preventDefault(); showLoginModal(); });
  var regBtn = document.getElementById("zenBtnRegister");
  if (regBtn) regBtn.addEventListener("click", function(e) { e.preventDefault(); showLoginModal(); });
  var searchBtn = document.getElementById("searchBtn");
  if (searchBtn) searchBtn.addEventListener("click", handleSearch);

</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js")}</script>
<script>
// User name badge — shows current user, click to switch
(function(){
    var n = localStorage.getItem('zenpass_name');
    if(n){
        var b = document.createElement('div');
        b.style.cssText = 'position:fixed;top:10px;right:10px;z-index:9999;background:#FF6B35;color:white;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.15);font-family:sans-serif;';
        b.textContent = '👤 '+n;
        b.onclick = function(){
            var nn = prompt('切換用戶\n當前：'+n, n);
            if(nn && nn.trim() && nn.trim() !== n){
                localStorage.setItem('zenpass_name', nn.trim());
                localStorage.removeItem('zenpass_token');
                localStorage.removeItem('zenpass_user');
                location.reload();
            }
        };
        document.body.appendChild(b);
    }
})();
</script>
