<!doctype html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <meta name="theme-color" content="#FF6B35" />
    
    <link rel="stylesheet" href="css/zenpass.css?v=2" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: var(--font-zh);
        background: var(--gray-50);
        color: var(--dark-900);
        max-width: var(--max-width);
        margin: 0 auto;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .verify-card {
        background: var(--white);
        border-radius: var(--radius-lg);
        padding: 40px 24px;
        box-shadow: var(--shadow-md);
        text-align: center;
        max-width: 400px;
        width: 100%;
      }
      .verify-card .icon {
        font-size: 64px;
        margin-bottom: 16px;
      }
      .verify-card h1 {
        font-size: 22px;
        font-weight: 800;
        margin-bottom: 8px;
      }
      .verify-card p {
        font-size: 14px;
        color: var(--dark-700);
        margin-bottom: 20px;
        line-height: 1.6;
      }
      .verify-card .btn {
        display: inline-block;
        padding: 12px 24px;
        background: var(--orange-600-bg);
        color: var(--white);
        border: none;
        border-radius: var(--radius-sm);
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        text-decoration: none;
        font-family: var(--font-zh);
      }
      .verify-card .btn:hover { background: #e55a2b; }
      .loading-spinner {
        display: inline-block;
        width: 32px;
        height: 32px;
        border: 3px solid var(--gray-200);
        border-top: 3px solid var(--orange-500);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 16px auto;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .status-success { color: #059669; }
      .status-error { color: #dc2626; }
    </style>
    <!-- Google tag (gtag.js) - GA4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MKF5N4YLBM"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() { dataLayer.push(arguments); }
      gtag("js", new Date());
      gtag("config", "G-MKF5N4YLBM");
    </script>
        <!-- SEO -->
    <title>驗證電郵 — ZenPass 禪流</title>
    <meta name="description" content="驗證你的 ZenPass 帳戶電郵地址。">
    <meta property="og:title" content="驗證電郵 — ZenPass 禪流">
    <meta property="og:description" content="驗證你的 ZenPass 帳戶電郵地址。">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="ZenPass 禪流">
    <meta name="twitter:card" content="summary_large_image">
    <!-- Footer & Back-to-Top Styles -->
    <style>
      .footer-grad {
        background: linear-gradient(135deg, #1a1a2e 0%, #2d2d44 50%, #c94420 100%);
      }
      .footer-grad .footer-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
        max-width: 400px;
        margin: 0 auto;
        padding: 40px 16px 0;
      }
      @media (min-width: 768px) {
        .footer-grad .footer-grid {
          grid-template-columns: 1fr 1fr 1fr 1fr;
          max-width: 720px;
        }
      }
      .footer-grad .footer-section-title {
        color: rgba(255,255,255,0.5);
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 10px;
      }
      .footer-grad ul {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      .footer-grad li {
        margin-bottom: 6px;
      }
      .footer-link {
        color: rgba(255,255,255,0.6);
        text-decoration: none;
        transition: color 0.2s;
        font-size: 13px;
      }
      .footer-link:hover {
        color: #fff;
      }
      .back-to-top {
        position: fixed;
        bottom: 80px;
        right: 16px;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: var(--orange-600-bg, #c94420);
        color: #fff;
        border: none;
        font-size: 20px;
        cursor: pointer;
        box-shadow: 0 2px 12px rgba(0,0,0,0.2);
        z-index: 999;
        opacity: 0;
        transform: translateY(20px);
        transition: opacity 0.3s, transform 0.3s;
        pointer-events: none;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .back-to-top.visible {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }
      .back-to-top:hover {
        background: #aa3218;
      }
    </style>
  </head>
  <body>
    <div class="verify-card">
      <div class="icon" id="statusIcon">📧</div>
      <h1 id="statusTitle">驗證電郵</h1>
      <div id="statusMsg">
        <p>正在驗證你的電郵地址...</p>
        <div class="loading-spinner"></div>
      </div>
      <a href="login.html" id="loginBtn" class="btn" style="display:none">🔑 前往登入</a>
    </div>

    <script>
      (async function() {
        var params = new URLSearchParams(window.location.search);
        var token = params.get("token");

        if (!token) {
          document.getElementById("statusIcon").textContent = "❌";
          document.getElementById("statusTitle").textContent = "驗證連結無效";
          document.getElementById("statusMsg").innerHTML = "<p>缺少驗證 token，請檢查連結是否完整。</p>";
          return;
        }

        try {
          var resp = await fetch("/api/auth/verify-email?token=" + encodeURIComponent(token));
          var data = await resp.json();

          if (resp.ok) {
            document.getElementById("statusIcon").textContent = "✅";
            document.getElementById("statusTitle").textContent = "電郵驗證成功";
            document.getElementById("statusTitle").className = "status-success";
            document.getElementById("statusMsg").innerHTML = "<p>你的電郵已成功驗證！現在可以開始使用 ZenPass 所有功能。</p>";
            document.getElementById("loginBtn").style.display = "inline-block";
          } else {
            document.getElementById("statusIcon").textContent = "❌";
            document.getElementById("statusTitle").textContent = "驗證失敗";
            document.getElementById("statusTitle").className = "status-error";
            document.getElementById("statusMsg").innerHTML = "<p>" + (data.error || "驗證連結已過期或無效") + "</p><p style='margin-top:8px;font-size:13px;'>請嘗試重新發送驗證電郵。</p>";
            document.getElementById("loginBtn").style.display = "inline-block";
          }
        } catch (err) {
          document.getElementById("statusIcon").textContent = "❌";
          document.getElementById("statusTitle").textContent = "網絡錯誤";
          document.getElementById("statusTitle").className = "status-error";
          document.getElementById("statusMsg").innerHTML = "<p>無法連接到伺服器，請稍後再試。</p>";
          document.getElementById("loginBtn").style.display = "inline-block";
        }
      })();
    </script>
  <script src="js/nav.js"></script>
</body>
</html>
