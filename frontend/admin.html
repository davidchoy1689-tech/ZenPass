    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --primary: #c86a4a;
        --primary-light: #f0ded4;
        --primary-bg: #faf3ee;
        --dark: #1c1816;
        --dark2: #2d2d44;
        --gray: #8a7e78;
        --gray-light: #ede8e4;
        --gray-bg: #fbf9f6;
        --white: #fff;
        --green: #5b8c5a;
        --red: #c45a5a;
        --yellow: #c49a4a;
        --radius: 14px;
        --shadow: 0 2px 8px rgba(28, 24, 22, 0.06);
      }
      body {
        font-family: "Noto Sans TC", "PingFang HK", sans-serif;
        background: var(--gray-bg);
        color: var(--dark);
        display: flex;
        min-height: 100vh;
        font-size: 14px;
        line-height: 1.6;
      }
      /* Sidebar */
      .sidebar {
        width: 220px;
        background: var(--dark);
        color: var(--white);
        position: fixed;
        height: 100vh;
        display: flex;
        flex-direction: column;
        z-index: 10;
      }
      html {
        scroll-behavior: smooth;
      }
      #main-content {
        scroll-margin-top: 20px;
      }
      img,
      video {
        max-width: 100%;
        height: auto;
      }
      .sidebar-logo {
        padding: 20px 20px 24px;
        font-size: 20px;
        font-weight: 700;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }
      .sidebar-logo span {
        color: var(--primary);
      }
      .sidebar-logo small {
        display: block;
        font-size: 11px;
        font-weight: 400;
        color: rgba(255, 255, 255, 0.3);
        margin-top: 2px;
      }
      .nav-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 18px;
        color: rgba(255, 255, 255, 0.55);
        cursor: pointer;
        border-left: 3px solid transparent;
        font-size: 13px;
        transition: all 0.12s;
        text-decoration: none;
      }
      .nav-item:hover {
        background: rgba(255, 255, 255, 0.04);
        color: var(--white);
      }
      .nav-item.active {
        background: rgba(200, 106, 74, 0.1);
        color: var(--primary);
        border-left-color: var(--primary);
        font-weight: 600;
      }
      .nav-item .icon {
        font-size: 15px;
        width: 20px;
        text-align: center;
      }
      /* Main */
      .main {
        margin-left: 220px;
        flex: 1;
        padding: 24px 28px;
        min-height: 100vh;
        max-width: 1200px;
      }
      .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }
      .top-bar h1 {
        font-size: 20px;
        font-weight: 700;
      }
      .top-bar .sub {
        font-size: 12px;
        color: var(--gray);
        margin-top: 2px;
      }
      .top-bar .user-info {
        font-size: 12px;
        color: var(--gray);
      }
      /* Stats */
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
        margin-bottom: 20px;
      }
      .stat-card {
        background: var(--white);
        border-radius: var(--radius);
        padding: 16px;
        box-shadow: var(--shadow);
      }
      .stat-card .val {
        font-size: 24px;
        font-weight: 700;
      }
      .stat-card .lbl {
        font-size: 12px;
        color: var(--gray);
        margin-top: 2px;
      }
      .stat-card .ico {
        font-size: 18px;
        margin-bottom: 4px;
      }
      /* Cards */
      .card {
        background: var(--white);
        border-radius: var(--radius);
        padding: 16px;
        margin-bottom: 10px;
        box-shadow: var(--shadow);
      }
      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }
      .card-header h3 {
        font-size: 14px;
        font-weight: 600;
      }
      /* Table */
      .table-wrap {
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      th {
        text-align: left;
        padding: 8px 10px;
        border-bottom: 2px solid var(--gray-light);
        font-weight: 600;
        color: var(--gray);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        white-space: nowrap;
      }
      td {
        padding: 8px 10px;
        border-bottom: 1px solid var(--gray-light);
        white-space: nowrap;
      }
      tr:last-child td {
        border-bottom: none;
      }
      tr:hover td {
        background: var(--primary-bg);
      }
      /* Badge */
      .badge {
        display: inline-block;
        padding: 1px 8px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 600;
      }
      .bg-green {
        background: #edf4ea;
        color: var(--green);
      }
      .bg-red {
        background: #f8ecec;
        color: var(--red);
      }
      .bg-yellow {
        background: #f8f2e4;
        color: var(--yellow);
      }
      .bg-orange {
        background: var(--primary-bg);
        color: var(--primary);
      }
      .bg-gray {
        background: var(--gray-light);
        color: var(--gray);
      }
      /* Buttons */
      .btn {
        padding: 6px 14px;
        border: none;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
        transition: opacity 0.12s;
        min-height: 32px;
      }
      .btn:hover {
        opacity: 0.85;
      }
      .btn-sm {
        padding: 4px 10px;
        font-size: 11px;
        min-height: 28px;
      }
      .btn-primary {
        background: var(--primary);
        color: var(--white);
      }
      .btn-green {
        background: var(--green);
        color: var(--white);
      }
      .btn-red {
        background: var(--red);
        color: var(--white);
      }
      .btn-outline {
        background: transparent;
        border: 1px solid var(--gray-light);
        color: var(--gray);
      }
      .btn-ghost {
        background: transparent;
        color: var(--primary);
        border: 1px solid var(--primary);
      }
      /* Tab */
      .tab-content {
        display: none;
      }
      .tab-content.active {
        display: block;
      }
      /* Search */
      .search-bar {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
      }
      .search-bar input {
        flex: 1;
        padding: 8px 12px;
        border: 1px solid var(--gray-light);
        border-radius: 6px;
        font-size: 13px;
        font-family: inherit;
        min-height: 36px;
      }
      .search-bar input:focus {
        outline: none;
        border-color: var(--primary);
      }
      /* Login */
      #loginScreen {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100vw;
        height: 100vh;
        background: var(--gray-bg);
      }
      .login-box {
        background: var(--white);
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
        width: 360px;
        text-align: center;
      }
      .login-box h1 {
        font-size: 24px;
        margin-bottom: 4px;
      }
      .login-box h1 span {
        color: var(--primary);
      }
      .login-box p {
        font-size: 13px;
        color: var(--gray);
        margin-bottom: 24px;
      }
      .login-box input {
        width: 100%;
        padding: 10px 14px;
        margin: 6px 0;
        border: 1px solid var(--gray-light);
        border-radius: 8px;
        font-size: 14px;
        font-family: inherit;
        min-height: 44px;
      }
      .login-box input:focus {
        outline: none;
        border-color: var(--primary);
      }
      .login-box .btn {
        width: 100%;
        padding: 12px;
        margin-top: 8px;
        font-size: 14px;
        min-height: 44px;
      }
      .msg {
        font-size: 12px;
        margin-top: 8px;
      }
      .msg.error {
        color: var(--red);
      }
      .msg.success {
        color: var(--green);
      }
      /* Loading */
      .loading {
        text-align: center;
        padding: 30px;
        color: var(--gray);
        font-size: 13px;
      }
      .loading::after {
        content: "";
        display: block;
        width: 20px;
        height: 20px;
        margin: 8px auto;
        border: 2px solid var(--gray-light);
        border-top-color: var(--primary);
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .empty {
        text-align: center;
        padding: 30px;
        color: var(--gray);
        font-size: 13px;
      }
      .empty .ico {
        font-size: 32px;
        margin-bottom: 6px;
      }
      /* Modal */
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.3);
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .modal {
        background: var(--white);
        border-radius: 12px;
        padding: 24px;
        width: 400px;
        max-width: 90vw;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
      }
      .modal h3 {
        font-size: 16px;
        margin-bottom: 12px;
      }
      .modal p {
        font-size: 13px;
        color: var(--gray);
        margin-bottom: 16px;
      }
      .modal .actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
      }
      /* Responsive */
      @media (max-width: 768px) {
        .sidebar {
          width: 60px;
          overflow: hidden;
        }
        .sidebar-logo {
          font-size: 0;
          padding: 16px;
        }
        .sidebar-logo::before {
          content: "🧘";
          font-size: 24px;
        }
        .nav-item span:not(.icon) {
          display: none;
        }
        .main {
          margin-left: 60px;
          padding: 16px;
        }
        .stats-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      /* Details row */
      .details-row {
        display: none;
        background: var(--gray-bg);
        padding: 0 !important;
      }
      .details-row td {
        padding: 12px 16px !important;
        border-bottom: 1px solid var(--gray-light);
      }
      .details-row.show {
        display: table-row;
      }
      .expand-btn {
        cursor: pointer;
        user-select: none;
        color: var(--primary);
        font-size: 11px;
      }
    </style>

    <script>
      // ===== Course Contents =====
      async function loadCourseContents() {
        var main = document.getElementById("mainContent");
        try {
          var d = await apiGet("/course-contents");
          var items = d.data || [];
          var classesData = [];
          try {
            var cd = await apiGet("/classes");
            classesData = cd.classes || [];
          } catch (e) {}

          var stats =
            '<div class="stats-grid" style="grid-template-columns:repeat(3,1fr)">' +
            '<div class="stat-card" style="background:var(--primary);color:white"><div class="ico">📝</div><div class="val">' +
            items.length +
            '</div><div class="lbl" style="color:rgba(255,255,255,.75)">課程內容總數</div></div>' +
            '<div class="stat-card" style="background:var(--green);color:white"><div class="ico">🎬</div><div class="val">' +
            items.filter(function (i) {
              return i.video_url;
            }).length +
            '</div><div class="lbl" style="color:rgba(255,255,255,.75)">有影片</div></div>' +
            '<div class="stat-card" style="background:var(--yellow);color:white"><div class="ico">❓</div><div class="val">' +
            items.filter(function (i) {
              return i.faqs && i.faqs.length;
            }).length +
            '</div><div class="lbl" style="color:rgba(255,255,255,.75)">有 FAQ</div></div>' +
            "</div>";

          var table =
            '<div class="card"><div class="card-header"><h3>📋 課程內容列表</h3></div><div class="table-wrap">';
          if (!items.length) {
            table +=
              '<div style="text-align:center;padding:30px;color:var(--gray)"><div style="font-size:28px;margin-bottom:6px">📭</div>暫無課程內容</div>';
          } else {
            table +=
              "<table><thead><tr><th>課程</th><th>標題</th><th>Level</th><th>影片</th><th>圖片</th><th>教材</th><th>FAQ</th><th>更新</th></tr></thead><tbody>" +
              items
                .map(function (cc) {
                  var courseName = cc.course_id;
                  if (classesData.length) {
                    var found = classesData.find(function (c) {
                      return c.id === cc.course_id;
                    });
                    if (found) courseName = found.title;
                  }
                  return (
                    "<tr><td>" +
                    courseName +
                    "</td>" +
                    "<td>" +
                    (cc.title || "—") +
                    "</td>" +
                    "<td>" +
                    (cc.level || "—") +
                    "</td>" +
                    "<td>" +
                    (cc.video_url ? "✅" : "—") +
                    "</td>" +
                    "<td>" +
                    (cc.images && cc.images.length
                      ? cc.images.length + "張"
                      : "—") +
                    "</td>" +
                    "<td>" +
                    (cc.materials && cc.materials.length
                      ? cc.materials.length + "項"
                      : "—") +
                    "</td>" +
                    "<td>" +
                    (cc.faqs && cc.faqs.length ? cc.faqs.length + "條" : "—") +
                    "</td>" +
                    "<td>" +
                    (cc.updated_at ? cc.updated_at.substring(0, 10) : "—") +
                    "</td></tr>"
                  );
                })
                .join("") +
              "</tbody></table>";
          }
          table += "</div></div>";
          main.innerHTML = stats + table;
        } catch (e) {
          main.innerHTML =
            '<div class="card" style="color:var(--red);padding:20px">❌ 載入失敗: ' +
            e.message +
            "</div>";
        }
      }

      // ===== Migration =====
      async function loadMigrateTab() {
        var main = document.getElementById("mainContent");
        try {
          var d = await apiGet("/migrate/course-contents");
          var exists = d.exists;
          var statusHtml = exists
            ? '<div style="background:#ECFDF5;color:var(--green);padding:12px;border-radius:8px;margin-bottom:14px;font-size:13px">✅ course_contents 表格已就緒</div>'
            : '<div style="background:#FFFBEB;color:#C49A4A;padding:12px;border-radius:8px;margin-bottom:14px;font-size:13px">⏳ 需要建立 course_contents 表格</div>';

          var btnHtml = exists
            ? '<button class="btn" disabled style="opacity:0.5;background:var(--green)">✅ 已建立</button>'
            : '<button class="btn" onclick="runMigration()">🚀 執行 course_contents Migration</button>';

          main.innerHTML =
            '<div class="card">' +
            '<div class="card-header"><h3>⚙️ 資料庫 Migration</h3></div>' +
            '<p style="font-size:13px;color:var(--gray);margin-bottom:14px">執行資料庫更新，建立 course_contents 表格。</p>' +
            statusHtml +
            btnHtml +
            "</div>";
        } catch (e) {
          main.innerHTML =
            '<div class="card" style="color:var(--red);padding:20px">❌ 載入失敗: ' +
            e.message +
            "</div>";
        }
      }

      async function runMigration() {
        try {
          var d = await apiPost("/migrate/course-contents", {});
          if (d.status === "created") {
            alert("✅ Migration 成功！");
            loadMigrateTab();
          } else if (d.status === "skipped") {
            alert("ℹ️ 表格已存在");
            loadMigrateTab();
          } else {
            alert("❌ 失敗: " + (d.error || "未知錯誤"));
          }
        } catch (e) {
          alert("❌ 錯誤: " + e.message);
        }
      }
    </script>
    <script>
      var user = null;

      // ===== CSV Export =====
      function exportCSV() {
        var rows = [["預約編號", "用戶", "課程", "金額", "狀態", "日期"]];
        try {
          var w = window;
          var bkgs = (w._allBookings || []).filter(function (b) {
            return b.booking_reference;
          });
          bkgs.forEach(function (b) {
            rows.push([
              b.booking_reference || "",
              b.user_name || "",
              b.class_title || "",
              b.amount || "",
              b.status || "",
              (b.created_at || "").substring(0, 10),
            ]);
          });
          if (rows.length === 1) {
            var statData = [
              ["總用戶", String(s?.stats?.total_users || 0)],
              ["總課程", String(s?.stats?.total_classes || 0)],
              ["已確認預約", String(s?.stats?.confirmed_bookings || 0)],
              ["總收入", String(s?.stats?.total_revenue || 0)],
              ["待處理付款", String(s?.stats?.pending_payments || 0)],
            ];
            rows = [["指標", "數值"], ...statData];
          }
        } catch (e) {
          rows = [["錯誤", e.message]];
        }
        var csv = rows
          .map(function (r) {
            return r
              .map(function (v) {
                return '"' + String(v).replace(/"/g, '""') + '"';
              })
              .join(",");
          })
          .join("\n");
        var blob = new Blob(["\uFEFF" + csv], {
          type: "text/csv;charset=utf-8;",
        });
        var link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download =
          "zenpass-report-" +
          new Date().toISOString().substring(0, 10) +
          ".csv";
        link.click();
      }

      function sendMarketing() {
        var subject = document.getElementById("mk-subject").value.trim();
        var message = document.getElementById("mk-message").value.trim();
        if (!subject || !message) {
          document.getElementById("mk-status").textContent =
            "⚠️ 請填寫主旨和內容";
          return;
        }
        var btn = event.target;
        btn.disabled = true;
        btn.textContent = "⏳ 傳送中...";
        apiPost("/marketing/broadcast", {
          subject: subject,
          message: message,

          .then(function (d) {
            document.getElementById("mk-status").innerHTML =
              "✅ 已發送 " + d.sent + "/" + d.total + " 位用戶";
            btn.disabled = false;
            btn.textContent = "📤 發送廣播";

            document.getElementById("mk-status").textContent =
              "❌ " + e.message;
            btn.disabled = false;
            btn.textContent = "📤 發送廣播";

            }
          }
        } catch (e) {
          document.getElementById("report-content").innerHTML =
            '<div class="empty"><div class="ico">❌</div>' +
            escape(e.message) +
            "</div>";
        }
      }

      // ===== 商戶管理 Tab =====
      async function loadPartnersTab() {
        var main = document.getElementById("mainContent");
        main.innerHTML = '<div style="padding:20px"><h2 style="font-size:20px;font-weight:700;margin-bottom:16px">🏪 商戶管理</h2>' +
          '<div style="display:flex;gap:8px;margin-bottom:16px">' +
          '<button class="tab-btn active" onclick="showPartnerSection(\'pending\', this)" style="padding:8px 16px;border:1px solid var(--gray-200);border-radius:8px;background:var(--orange-50);cursor:pointer;font-size:13px;font-weight:500">⏳ 待審批</button>' +
          '<button class="tab-btn" onclick="showPartnerSection(\'active\', this)" style="padding:8px 16px;border:1px solid var(--gray-200);border-radius:8px;background:var(--white);cursor:pointer;font-size:13px;font-weight:500">✅ 已核准</button>' +
          '</div><div id="partner-list"><div class="loading-spinner">載入中...</div></div></div>';
        showPartnerSection('pending');
      }

      async function showPartnerSection(status) {
        var btns = document.querySelectorAll('#mainContent .tab-btn');
        btns.forEach(function(b){ b.classList.remove('active'); b.style.background = 'var(--white)'; });
        var container = document.getElementById('partner-list');
        if (!container) return;
        container.innerHTML = '<div class="loading-spinner">載入中...</div>';
        try {
          var ep = status === 'pending' ? '/admin/partner-applications' : '/admin/partner-list';
          var d = await apiGet(ep);
          var list = status === 'pending' ? (d.applications || []) : (d.partners || []);
          if (list.length === 0) {
            container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--dark-700)">暫無記錄</div>'; return;
          }
          var html = '';
          list.forEach(function(p) {
            var badge = p.status === 'pending' ? '<span style="background:#fef3c7;color:#92400e;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600">⏳ 待審批</span>' :
              p.status === 'active' ? '<span style="background:#ecfdf5;color:#059669;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600">✅ 活躍</span>' :
              '<span style="background:#fef2f2;color:#dc2626;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600">' + escape(p.status || '') + '</span>';
            html += '<div style="background:white;border-radius:14px;padding:16px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,0.06);border:1px solid rgba(0,0,0,0.04)">' +
              '<div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:6px">' +
              '<div><div style="font-weight:600;font-size:15px">' + escape(p.name || '') + '</div>' +
              '<div style="font-size:12px;color:var(--dark-700);margin-top:2px">' + escape(p.category || '') + ' · ' + escape(p.district || '') + '</div></div>' +
              badge + '</div>' +
              (p.contact_person ? '<div style="font-size:12px;color:var(--dark-700)">👤 ' + escape(p.contact_person) + ' · 📞 ' + escape(p.phone || '') + '</div>' : '') +
              (p.email ? '<div style="font-size:12px;color:var(--dark-700)">📧 ' + escape(p.email) + '</div>' : '');
            if (p.status === 'pending') {
              html += '<div style="margin-top:10px;display:flex;gap:8px">' +
                '<button onclick="approvePartner(\'' + p.id + '\')" style="flex:1;padding:8px;background:#059669;color:white;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600">✅ 核准</button>' +
                '<button onclick="rejectPartner(\'' + p.id + '\')" style="flex:1;padding:8px;background:#dc2626;color:white;border:none;border-radius:8px;cursor:pointer;font-size:12px">❌ 拒絕</button></div>';
            }
            if (p.status === 'active') {
              html += '<div style="margin-top:6px;font-size:12px;color:var(--dark-700)">分佣：<strong>' + Math.round((p.commission_rate || 0.3) * 100) + '%</strong></div>';
            }
            html += '</div>';
          });
          container.innerHTML = html;
        } catch(e) {
          container.innerHTML = '<div style="text-align:center;padding:40px;color:#ef4444">❌ 無法載入</div>';
        }
      }

      async function approvePartner(venueId) {
        if (!confirm('核准此商戶申請？')) return;
        try {
          await apiPost('/admin/partner-approve', { venue_id: venueId, action: 'accept', commission_rate: 0.3 });
          showToast('✅ 已核准', 'success');
          showPartnerSection('pending');
        } catch(e) { showToast('❌ ' + e.message, 'error'); }
      }

      async function rejectPartner(venueId) {
        if (!confirm('拒絕此商戶申請？')) return;
        try {
          await apiPost('/admin/partner-approve', { venue_id: venueId, action: 'reject' });
          showToast('✅ 已拒絕', 'success');
          showPartnerSection('pending');
        } catch(e) { showToast('❌ ' + e.message, 'error'); }
      }

      function escHtml(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

      // ===== 📋 教練申請審批 Tab =====
      async function loadCoachAppsTab() {
        var main = document.getElementById('mainContent');
        main.innerHTML = 
          '<div style="padding:20px">' +
          '<h2 style="font-size:20px;font-weight:700;margin-bottom:8px">📋 教練申請審批</h2>' +
          '<p style="font-size:13px;color:#6b7280;margin-bottom:16px">審批教練提交的開班申請</p>' +
          '<div style="display:flex;gap:8px;margin-bottom:16px">' +
          '<button class="filter-btn active" onclick="loadCoachApps(\'pending\')" id="ca-pending">⏳ 待審批</button>' +
          '<button class="filter-btn" onclick="loadCoachApps(\'approved\')" id="ca-approved">✅ 已通過</button>' +
          '<button class="filter-btn" onclick="loadCoachApps(\'rejected\')" id="ca-rejected">❌ 已拒絕</button>' +
          '</div>' +
          '<div id="coach-apps-list"><div class="loading-spinner">載入中...</div></div></div>';
        loadCoachApps('pending');
      }

      async function loadCoachApps(status) {
        // Update active filter
        document.querySelectorAll('#coach-apps-list').forEach(function(el) { el.style.opacity = '0.5'; });
        document.querySelectorAll('[id^="ca-"]').forEach(function(b) { b.classList.remove('active'); });
        var activeBtn = document.getElementById('ca-' + status);
        if (activeBtn) activeBtn.classList.add('active');

        try {
          var d = await apiGet('/admin/coach-applications?status=' + status);
          var apps = d.applications || [];
          var container = document.getElementById('coach-apps-list');
          container.style.opacity = '1';

          if (apps.length === 0) {
            container.innerHTML = '<div style="text-align:center;padding:40px;color:#9ca3af"><div style="font-size:48px;margin-bottom:8px">📭</div><div>暫無' + (status === 'pending' ? '待審批' : status === 'approved' ? '已通過' : '已拒絕') + '嘅申請</div></div>';
            return;
          }

          var html = '<div style="overflow-x:auto"><table class="admin-table"><thead><tr>' +
            '<th>申請編號</th><th>姓名</th><th>電郵</th><th>電話</th><th>專長</th><th>場地</th><th>申請日期</th>' +
            (status === 'pending' ? '<th>操作</th>' : '<th>審批人</th><th>審批日期</th>') +
            '</tr></thead><tbody>';

          for (var i = 0; i < apps.length; i++) {
            var a = apps[i];
            var specialties = a.specialties || '—';
            var date = (a.created_at || '').substring(0, 10);
            var reviewDate = a.reviewed_at ? a.reviewed_at.substring(0, 10) : '—';
            var reviewer = a.reviewed_by ? a.reviewed_by.substring(0, 8) : '—';
            html += '<tr>' +
              '<td><code>' + (a.application_reference || a.id.substring(0,8)) + '</code></td>' +
              '<td><strong>' + escHtml(a.name) + '</strong></td>' +
              '<td>' + escHtml(a.email) + '</td>' +
              '<td>' + escHtml(a.phone || '—') + '</td>' +
              '<td style="font-size:12px">' + escHtml(specialties) + '</td>' +
              '<td style="font-size:12px">' + escHtml(a.venue_name || a.venue_address || '—') + '</td>' +
              '<td>' + date + '</td>';

            if (status === 'pending') {
              html += '<td style="white-space:nowrap">' +
                '<button class="btn-sm btn-success" onclick="approveCoach(\'' + a.id + '\',\'' + escHtml(a.name) + '\')" style="margin-right:4px">✅ 通過</button>' +
                '<button class="btn-sm btn-danger" onclick="rejectCoach(\'' + a.id + '\',\'' + escHtml(a.name) + '\')">❌ 拒絕</button>' +
                '</td>';
            } else {
              html += '<td>' + reviewer + '</td><td>' + reviewDate + '</td>';
            }
            html += '</tr>';
          }

          html += '</tbody></table></div>';
          container.innerHTML = html;

          // Update badge
          if (status === 'pending') {
            var badge = document.getElementById('coach-app-badge');
            if (badge) { badge.textContent = apps.length; badge.style.display = apps.length > 0 ? '' : 'none'; }
          }
        } catch (e) {
          document.getElementById('coach-apps-list').innerHTML = '<div style="color:#ef4444;padding:20px">❌ 載入失敗</div>';
          console.error(e);
        }
      }

      async function approveCoach(id, name) {
        if (!confirm('確定通過 ' + name + ' 的教練申請？')) return;
        try {
          var r = await apiPost('/admin/coach-approve', { application_id: id });
          showToast('✅ ' + name + ' 已成為教練！', 'success');
          loadCoachApps('pending');
        } catch(e) { showToast('❌ ' + e.message, 'error'); }
      }

      async function rejectCoach(id, name) {
        var reason = prompt('請輸入拒絕原因（可選）：', '');
        if (reason === null) return;
        try {
          var r = await apiPost('/admin/coach-reject', { application_id: id, reason: reason || undefined });
          showToast('✅ 已拒絕 ' + name, 'info');
          loadCoachApps('pending');
        } catch(e) { showToast('❌ ' + e.message, 'error'); }
      }
    </script>
  </body>
</html>
