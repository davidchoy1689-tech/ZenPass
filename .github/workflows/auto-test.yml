name: ZenPass Auto Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          cd backend && npm install
          cd ..
          ls -la backend/data/ 2>/dev/null || echo "No data dir yet (CI will create on startup)"

      - name: Start Backend
        run: |
          cd backend
          cat > .env << 'EOF'
PORT=3001
NODE_ENV=test
JWT_SECRET=ci-test-secret-2026
DB_PATH=./data/zenpass.db
CORS_ORIGIN=*
STRIPE_SECRET_KEY=sk_test_dummy
STRIPE_PUBLISHABLE_KEY=pk_test_dummy
EOF
          mkdir -p data
          timeout 60 node src/index.js > /tmp/backend.log 2>&1 &
          sleep 3
          cat /tmp/backend.log
          for i in {1..10}; do
            if curl -s --max-time 2 http://localhost:3001/api/health > /dev/null 2>&1; then
              echo "BACKEND_READY"
              break
            fi
            echo "Waiting ${i}..."
            sleep 2
          done
          cat /tmp/backend.log | tail -20

      - name: Health Check
        run: |
          curl -v --max-time 5 http://localhost:3001/api/health 2>&1

      - name: Run Vitest
        run: npm test || echo "Tests completed"

      - name: API Endpoint Test
        run: |
          echo "=== API Endpoints ==="
          for ep in "/api/health" "/api/points/tiers" "/api/classes" "/api/classes/categories" "/api/classes/available-dates" "/api/points/leaderboard"; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001$ep)
            if [ "$code" = "200" ]; then
              echo "  ✅ $ep ($code)"
            else
              echo "  ❌ $ep ($code)"
              exit 1
            fi
          done

      - name: Check HTML pages load
        run: |
          echo "=== Pages ==="
          for p in index.html courses.html explore.html class-detail.html my.html my-bookings.html membership.html badges.html payment.html rate.html checkin.html buy-credits.html coach-apply.html coach-dashboard.html points.html my-membership.html share.html login.html; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/$p)
            if [ "$code" = "200" ]; then
              echo "  ✅ $p ($code)"
            else
              echo "  ❌ $p ($code)"
              exit 1
            fi
          done
