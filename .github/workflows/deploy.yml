name: Deploy ZenPass

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: cd backend && npm install
      - name: Health check
        run: cd backend && node verify-full.js || echo "Run locally"

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to server
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          KEY: ${{ secrets.DEPLOY_KEY }}
          PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          echo "Setup GitHub Secrets → Settings → Secrets → Actions"
          echo "DEPLOY_HOST, DEPLOY_USER, DEPLOY_KEY, DEPLOY_PATH"
