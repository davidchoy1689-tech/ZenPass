name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx eslint backend/src/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: |
          cd backend
          npm ci
      - name: Start server & run tests
        run: |
          cd backend
          node src/index.js &
          sleep 3
          npx vitest run
          kill %1

  e2e:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npx playwright install chromium
      - name: Start server & run E2E
        run: |
          cd backend && node src/index.js &
          sleep 3
          npx playwright test tests/e2e/critical-flows.spec.js
