<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ZenPass 管理後台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--orange:#FF6B35;--orange-light:#FFF0E8;--dark:#1A1A2E;--dark2:#2D2D44;--gray:#6B7280;--gray-light:#E5E7EB;--gray-bg:#F3F4F6;--white:#FFF;--green:#059669;--red:#EF4444;--blue:#3B82F6;--radius:10px;--shadow:0 1px 3px rgba(0,0,0,.08)}
body{font-family:-apple-system,'Noto Sans TC',sans-serif;background:var(--gray-bg);color:var(--dark)}

/* Login Screen */
.login-wrap{position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,#1A1A2E,#2D2D44);display:flex;align-items:center;justify-content:center;z-index:999}
.login-box{background:var(--white);border-radius:16px;padding:40px;width:380px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-box h2{font-size:24px;margin-bottom:4px;font-weight:800}.login-box h2 span{color:var(--orange)}
.login-box p{color:var(--gray);font-size:13px;margin-bottom:20px}
.login-box input{width:100%;padding:11px 14px;border:1px solid var(--gray-light);border-radius:8px;font-size:14px;font-family:inherit;margin-bottom:12px}
.login-box input:focus{outline:none;border-color:var(--orange)}
.login-box .btn{width:100%;padding:12px;background:var(--orange);color:var(--white);border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
.login-box .btn:hover{opacity:.9}.login-box .btn:disabled{opacity:.5;cursor:not-allowed}
.login-box .msg{margin-top:12px;font-size:13px;color:var(--red)}

/* Layout */
.sidebar{width:220px;background:var(--dark);color:var(--white);position:fixed;height:100vh;display:flex;flex-direction:column;z-index:50}
.sidebar-logo{padding:20px 20px 24px;font-size:20px;font-weight:800;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-logo span{color:var(--orange)}
.sidebar-logo small{display:block;font-size:10px;font-weight:400;color:rgba(255,255,255,.4);margin-top:2px}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 18px;color:rgba(255,255,255,.6);cursor:pointer;border-left:3px solid transparent;font-size:13px;transition:all .15s}
.nav-item:hover{background:rgba(255,255,255,.05);color:var(--white)}
.nav-item.active{background:rgba(255,107,53,.12);color:var(--orange);border-left-color:var(--orange);font-weight:600}
.nav-item .ico{font-size:15px;width:20px;text-align:center}
.nav-section{flex:1}
.nav-footer{padding:14px 18px;font-size:11px;color:rgba(255,255,255,.35);border-top:1px solid rgba(255,255,255,.06)}
.nav-footer .admin-name{color:rgba(255,255,255,.6);margin-bottom:4px}

.main{margin-left:220px;flex:1;padding:20px 24px;min-height:100vh}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--gray-light)}
.top-bar h1{font-size:20px;font-weight:700}.top-bar .sub{font-size:12px;color:var(--gray);margin-top:2px}
.btn{background:var(--orange);color:var(--white);border:none;padding:7px 16px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.btn:hover{opacity:.88}.btn-sm{padding:4px 10px;font-size:11px}.btn-green{background:var(--green)}.btn-red{background:var(--red)}
.btn-outline{background:transparent;border:1px solid var(--gray-light);color:var(--gray)}
.btn-outline:hover{background:var(--gray-bg)}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.stat-card{background:var(--white);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}
.stat-card .val{font-size:24px;font-weight:800}.stat-card .lbl{font-size:12px;color:var(--gray);margin-top:2px}
.stat-card .ico{font-size:20px;margin-bottom:6px}
.stat-card.primary{background:var(--orange);color:var(--white)}.stat-card.primary .lbl{color:rgba(255,255,255,.75)}
.stat-card.green{background:var(--green);color:var(--white)}.stat-card.green .lbl{color:rgba(255,255,255,.75)}
.stat-card.blue{background:var(--blue);color:var(--white)}.stat-card.blue .lbl{color:rgba(255,255,255,.75)}

/* Tables */
.section-title{font-size:15px;font-weight:700;margin:18px 0 10px;display:flex;align-items:center;gap:8px}
.table-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow-x:auto;margin-bottom:16px}
table{width:100%;border-collapse:collapse;min-width:500px}
th{text-align:left;padding:9px 12px;font-size:11px;font-weight:600;color:var(--gray);background:var(--gray-bg);border-bottom:1px solid var(--gray-light);white-space:nowrap}
td{padding:9px 12px;font-size:12px;border-bottom:1px solid var(--gray-light);white-space:nowrap}
tr:hover td{background:#FAFAFA}

.status{padding:2px 7px;border-radius:6px;font-size:10px;font-weight:600;display:inline-block}
.status.paid,.status.completed,.status.confirmed{background:#ECFDF5;color:var(--green)}
.status.pending,.status.pending_payment{background:#FFFBEB;color:#D97706}
.status.cancelled{background:#FEF2F2;color:var(--red)}
.status.approved,.status.active{background:#EFF6FF;color:var(--blue)}
.status.inactive,.status.draft{background:#F3F4F6;color:var(--gray)}

.tab-content{display:none}.tab-content.active{display:block}
.loading{text-align:center;padding:30px;color:var(--gray);font-size:13px}
.empty{text-align:center;padding:30px;color:var(--gray)}.empty .ico{font-size:28px;display:block;margin-bottom:6px}

/* Search & Filter */
.search-bar{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.search-bar input{padding:8px 12px;border:1px solid var(--gray-light);border-radius:6px;font-size:13px;font-family:inherit;flex:1;min-width:180px}
.search-bar input:focus{outline:none;border-color:var(--orange)}
.search-bar select{padding:8px;border:1px solid var(--gray-light);border-radius:6px;font-size:12px;font-family:inherit}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;padding:10px 18px;border-radius:8px;font-size:13px;z-index:999;animation:fadeIn .3s;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.toast.success{background:#ECFDF5;color:var(--green);border:1px solid #A7F3D0}
.toast.error{background:#FEF2F2;color:var(--red);border:1px solid #FCA5A5}
.toast.info{background:#EFF6FF;color:var(--blue);border:1px solid #93C5FD}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:var(--white);border-radius:12px;padding:24px;width:480px;max-width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h3{font-size:16px;font-weight:700;margin-bottom:12px}
.modal .form-group{margin-bottom:10px}
.modal .form-group label{display:block;font-size:12px;font-weight:600;color:var(--gray);margin-bottom:3px}
.modal .form-group input,.modal .form-group select,.modal .form-group textarea{width:100%;padding:8px 10px;border:1px solid var(--gray-light);border-radius:6px;font-size:13px;font-family:inherit}
.modal .form-group textarea{resize:vertical;min-height:60px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}

@media(max-width:768px){
  .sidebar{width:56px}.sidebar-logo span{display:none}.nav-item span:not(.ico){display:none}.main{margin-left:56px;padding:14px}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<!-- Login -->
<div class="login-wrap" id="loginScreen">
<div class="login-box">
<h2>Z<span>P</span></h2><p>管理後台</p>
<form id="loginForm" onsubmit="return doLogin(event)">
<input type="email" id="loginEmail" placeholder="admin@email.com" value="admin@zenpass.hk" required>
<input type="password" id="loginPassword" placeholder="密碼" value="admin123" required>
<button type="submit" class="btn" id="loginBtn">登入管理後台</button>
<div class="msg" id="loginMsg"></div>
</form>
</div></div>

<!-- App -->
<div id="app" style="display:none;width:100%">
<aside class="sidebar">
<div class="sidebar-logo">Z<span>P</span><small>管理後台</small></div>
<div class="nav-section">
<div class="nav-item active" onclick="switchTab('dashboard')"><span class="ico">📊</span><span>儀表板</span></div>
<div class="nav-item" onclick="switchTab('users')"><span class="ico">👤</span><span>用戶管理</span></div>
<div class="nav-item" onclick="switchTab('classes')"><span class="ico">🏋️</span><span>課程管理</span></div>
<div class="nav-item" onclick="switchTab('bookings')"><span class="ico">📅</span><span>預約管理</span></div>
<div class="nav-item" onclick="switchTab('payments')"><span class="ico">💰</span><span>付款管理</span></div>
</div>
<div class="nav-footer">
<div class="admin-name" id="adminName"></div>
<div onclick="logout()" style="cursor:pointer;color:rgba(255,255,255,.35);margin-top:4px">🚪 登出</div>
</div>
</aside>

<div class="main">
<div class="top-bar"><div><h1 id="pageTitle">📊 儀表板</h1><div class="sub" id="pageSub"></div></div>
<button class="btn btn-outline" onclick="refreshCurrent()">🔄 重新整理</button></div>

<!-- Dashboard -->
<div id="tab-dashboard" class="tab-content active">
<div class="stats-grid" id="statsGrid"><div class="loading">載入中...</div></div>

<div class="section-title">👤 最新用戶</div>
<div class="table-card"><div id="dashUsers"><div class="empty"><span class="ico">📭</span>暫無用戶</div></div></div>

<div class="section-title">📅 近期預約</div>
<div class="table-card"><div id="dashBookings"><div class="empty"><span class="ico">📭</span>暫無預約</div></div></div>
</div>

<!-- Users -->
<div id="tab-users" class="tab-content">
<div class="search-bar">
<input type="text" id="userSearch" placeholder="🔍 搜尋用戶名稱或電郵..." oninput="loadUsers()">
<select id="userRoleFilter" onchange="loadUsers()">
<option value="all">全部身份</option>
<option value="coach">教練</option>
<option value="user">一般用戶</option>
</select>
</div>
<div class="table-card"><table><thead><tr><th>名稱</th><th>電郵</th><th>身份</th><th>會籍</th><th>Credits</th><th>註冊日期</th></tr></thead>
<tbody id="usersBody"><tr><td colspan="6" class="loading">載入中...</td></tr></tbody></table></div>
</div>

<!-- Classes -->
<div id="tab-classes" class="tab-content">
<div class="search-bar">
<input type="text" id="classSearch" placeholder="🔍 搜尋課程..." oninput="loadClasses()">
<select id="classStatusFilter" onchange="loadClasses()">
<option value="all">全部狀態</option>
<option value="active">上架中</option>
<option value="inactive">已下架</option>
</select>
<button class="btn btn-green" onclick="showAddClass()">➕ 新增課程</button>
</div>
<div class="table-card"><table><thead><tr><th>課程</th><th>教練</th><th>分類</th><th>價格</th><th>課堂數</th><th>預約數</th><th>狀態</th><th>操作</th></tr></thead>
<tbody id="classesBody"><tr><td colspan="8" class="loading">載入中...</td></tr></tbody></table></div>
</div>

<!-- Bookings -->
<div id="tab-bookings" class="tab-content">
<div class="search-bar">
<input type="text" id="bookingSearch" placeholder="🔍 搜尋參考編號或用戶..." oninput="loadBookings()">
<select id="bookingStatusFilter" onchange="loadBookings()">
<option value="all">全部狀態</option>
<option value="confirmed">已確認</option>
<option value="pending_payment">待付款</option>
<option value="cancelled">已取消</option>
</select>
</div>
<div class="table-card"><table><thead><tr><th>編號</th><th>用戶</th><th>課程</th><th>金額</th><th>付款</th><th>時間</th><th>狀態</th><th>操作</th></tr></thead>
<tbody id="bookingsBody"><tr><td colspan="8" class="loading">載入中...</td></tr></tbody></table></div>
</div>

<!-- Payments -->
<div id="tab-payments" class="tab-content">
<div class="search-bar">
<span style="font-size:13px;padding:6px 0">待確認付款: <strong id="pendingPayCount">0</strong></span>
</div>
<div class="section-title">⏳ 待確認</div>
<div class="table-card"><div id="pendingPayBody"><div class="empty"><span class="ico">📭</span>暫無待確認付款</div></div></div>
</div>

</div></div>

<script>
// ======== Config ========
var API = '/api';

// ======== State ========
var token = localStorage.getItem('zp_admin_token') || null;
var adminName = localStorage.getItem('zp_admin_name') || '管理員';

// ======== Helpers ========
function $(id){return document.getElementById(id)}
function showToast(msg,type){var t=document.createElement('div');t.className='toast '+type;t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(function(){t.remove()},300)},2500)}
function fmtNum(n){return 'HK$'+(Number(n)||0).toLocaleString()}
function st(s){var m={paid:'paid',confirmed:'confirmed',completed:'completed',pending_payment:'pending',pending:'pending',cancelled:'cancelled',active:'active',inactive:'inactive',draft:'draft'};var c=m[s]||'pending';return '<span class="status '+c+'">'+(s||'—')+'</span>'}

// ======== Auth ========
async function doLogin(e){
  e.preventDefault();
  var email=$('loginEmail').value.trim(), pass=$('loginPassword').value;
  if(!email||!pass){$('loginMsg').textContent='請輸入電郵和密碼';return false}
  var btn=$('loginBtn');btn.disabled=true;btn.textContent='登入中...';
  try{
    var r=await fetch(API+'/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email,password:pass})});
    var d=await r.json();
    if(!r.ok||!d.token){$('loginMsg').textContent=d.error||'登入失敗';btn.disabled=false;btn.textContent='登入管理後台';return false}
    token=d.token;adminName=d.user?.name||'管理員';
    localStorage.setItem('zp_admin_token',token);
    localStorage.setItem('zp_admin_name',adminName);
    showApp();
  }catch(e){$('loginMsg').textContent='連線錯誤';btn.disabled=false;btn.textContent='登入管理後台'}
  return false;
}

function logout(){
  if(!confirm('確定登出？'))return;
  localStorage.removeItem('zp_admin_token');localStorage.removeItem('zp_admin_name');
  token=null;window.location.reload();
}

function showApp(){
  $('loginScreen').style.display='none';
  $('app').style.display='block';
  $('adminName').textContent='👤 '+adminName;
  loadAll();
}

// Check existing token
(function(){
  if(token)showApp();
})();

// ======== API Call ========
async function api(path,opts){
  opts=opts||{};
  var headers=opts.headers||{};
  headers['Authorization']='Bearer '+token;
  if(opts.body&&!(opts.body instanceof FormData))headers['Content-Type']='application/json';
  var r=await fetch(API+path,{method:opts.method||'GET',headers:headers,body:opts.body});
  if(r.status===401||r.status===403){
    showToast('登入已過期，請重新登入','error');
    localStorage.removeItem('zp_admin_token');
    token=null;
    setTimeout(function(){window.location.reload()},1500);
    return null;
  }
  return r;
}

// ======== Tabs ========
var currentTab='dashboard';
function switchTab(name,e){
  currentTab=name;
  document.querySelectorAll('.nav-item').forEach(function(n){n.classList.remove('active')});
  document.querySelectorAll('.tab-content').forEach(function(t){t.classList.remove('active')});
  document.querySelectorAll('[onclick*="'+name+'"]')[0].classList.add('active');
  $('tab-'+name).classList.add('active');
  var titles={'dashboard':'📊 儀表板','users':'👤 用戶管理','classes':'🏋️ 課程管理','bookings':'📅 預約管理','payments':'💰 付款管理'};
  $('pageTitle').textContent=titles[name]||name;
  if(name==='users')loadUsers();
  if(name==='classes')loadClasses();
  if(name==='bookings')loadBookings();
  if(name==='payments')loadPayments();
}

function refreshCurrent(){if(currentTab==='dashboard')loadAll();else{var f='load'+currentTab.charAt(0).toUpperCase()+currentTab.slice(1);if(window[f])window[f]()}}

// ======== Dashboard ========
async function loadAll(){
  try{
    var sr=await api('/admin/stats');
    if(!sr)return;
    var sd=await sr.json();
    var s=sd.stats;
    $('statsGrid').innerHTML=
      '<div class="stat-card primary"><div class="ico">👤</div><div class="val">'+s.total_users+'</div><div class="lbl">總用戶</div></div>'+
      '<div class="stat-card"><div class="ico">📚</div><div class="val">'+s.total_classes+'</div><div class="lbl">課程</div></div>'+
      '<div class="stat-card blue"><div class="ico">📅</div><div class="val">'+s.total_bookings+'</div><div class="lbl">總預約</div></div>'+
      '<div class="stat-card green"><div class="ico">💰</div><div class="val">'+fmtNum(s.total_revenue)+'</div><div class="lbl">總收入</div></div>';

    // Recent users
    var ur=await api('/admin/users');
    if(ur){
      var ud=await ur.json();
      var users=(ud.users||[]).slice(0,5);
      $('dashUsers').innerHTML=users.length
        ? '<table><thead><tr><th>名稱</th><th>電郵</th><th>身份</th><th>註冊日期</th></tr></thead><tbody>'+
          users.map(function(u){return '<tr><td>'+(u.name||'—')+'</td><td>'+(u.email||'—')+'</td><td>'+(u.is_coach?'教練':'一般用戶')+'</td><td>'+(u.created_at?u.created_at.substring(0,10):'—')+'</td></tr>'}).
          join('')+'</tbody></table>'
        : '<div class="empty"><span class="ico">📭</span>暫無用戶</div>';
    }

    // Recent bookings
    var br=await api('/admin/bookings?limit=5');
    if(br){
      var bd=await br.json();
      var bks=(bd.bookings||[]).slice(0,5);
      $('dashBookings').innerHTML=bks.length
        ? '<table><thead><tr><th>編號</th><th>用戶</th><th>課程</th><th>金額</th><th>狀態</th></tr></thead><tbody>'+
          bks.map(function(b){return '<tr><td>'+(b.booking_reference||b.id.substring(0,8))+'</td><td>'+(b.user_name||'—')+'</td><td>'+(b.class_title||'—')+'</td><td>'+fmtNum(b.amount)+'</td><td>'+st(b.status)+'</td></tr>'}).
          join('')+'</tbody></table>'
        : '<div class="empty"><span class="ico">📭</span>暫無預約</div>';
    }
  }catch(e){showToast('載入失敗: '+e.message,'error')}
}

// ======== Users ========
async function loadUsers(){
  try{
    var r=await api('/admin/users');
    if(!r)return;
    var d=await r.json();
    var users=d.users||[];
    var search=$('userSearch').value.toLowerCase();
    var filter=$('userRoleFilter').value;
    if(search)users=users.filter(function(u){return(u.name||'').toLowerCase().includes(search)||(u.email||'').toLowerCase().includes(search)});
    if(filter!=='all')users=users.filter(function(u){return filter==='coach'?u.is_coach>0:u.is_coach==0});
    $('pageSub').textContent='共 '+users.length+' 人';
    var body=$('usersBody');
    if(!users.length){body.innerHTML='<tr><td colspan="6" class="empty"><span class="ico">📭</span>無符合用戶</td></tr>';return}
    body.innerHTML=users.map(function(u){
      return '<tr><td>'+(u.name||'—')+'</td><td>'+(u.email||'—')+'</td><td>'+(u.is_coach?'教練':'一般用戶')+'</td><td>'+(u.membership_type||'—')+'</td><td>'+(u.credits||0)+'</td><td>'+(u.created_at?u.created_at.substring(0,10):'—')+'</td></tr>';
    }).join('');
  }catch(e){showToast('載入用戶失敗','error')}
}

// ======== Classes ========
async function loadClasses(){
  try{
    var r=await api('/admin/classes');
    if(!r)return;
    var d=await r.json();
    var classes=d.classes||[];
    var search=$('classSearch').value.toLowerCase();
    var filter=$('classStatusFilter').value;
    if(search)classes=classes.filter(function(c){return(c.title||'').toLowerCase().includes(search)||(c.coach_name||'').toLowerCase().includes(search)});
    if(filter!=='all')classes=classes.filter(function(c){return c.status===filter});
    $('pageSub').textContent='共 '+classes.length+' 課程';
    var body=$('classesBody');
    if(!classes.length){body.innerHTML='<tr><td colspan="8" class="empty"><span class="ico">📭</span>無符合課程</td></tr>';return}
    body.innerHTML=classes.map(function(c){
      return '<tr><td>'+(c.title||'—')+'</td><td>'+(c.coach_name||'—')+'</td><td>'+(c.category||'—')+'</td><td>'+fmtNum(c.price_hkd||c.price||0)+'</td><td>'+(c.total_schedules||0)+'</td><td>'+(c.total_bookings||0)+'</td><td>'+st(c.status)+'</td><td>'+
        '<button class="btn btn-sm '+(c.status==='active'?'btn-red':'btn-green')+'" onclick="toggleClass(\''+c.id+'\',\''+c.status+'\')">'+(c.status==='active'?'下架':'上架')+'</button>'+
        '</td></tr>';
    }).join('');
  }catch(e){showToast('載入課程失敗','error')}
}

async function toggleClass(id,currentStatus){
  var newStatus=currentStatus==='active'?'inactive':'active';
  try{
    var r=await api('/classes/'+id+'/status',{method:'PUT',body:JSON.stringify({status:newStatus})});
    if(!r||!r.ok){showToast('操作失敗','error');return}
    showToast('✅ 課程已'+(newStatus==='active'?'上架':'下架'),'success');
    loadClasses();
  }catch(e){showToast('操作失敗','error')}
}

function showAddClass(){
  var overlay=document.createElement('div');
  overlay.className='modal-overlay';
  overlay.innerHTML='<div class="modal"><h3>➕ 新增課程</h3>'+
    '<div class="form-group"><label>課程名稱</label><input type="text" id="newClassTitle" placeholder="流瑜伽 Flow Yoga"></div>'+
    '<div class="form-group"><label>分類</label><input type="text" id="newClassCategory" placeholder="瑜伽"></div>'+
    '<div class="form-group"><label>價格 (HKD)</label><input type="number" id="newClassPrice" placeholder="120"></div>'+
    '<div class="form-group"><label>教練 ID</label><input type="text" id="newClassCoach" placeholder="用戶ID"></div>'+
    '<div class="form-group"><label>描述</label><textarea id="newClassDesc" placeholder="課程描述..."></textarea></div>'+
    '<div class="modal-btns">'+
    '<button class="btn btn-outline" onclick="this.closest(\'.modal-overlay\').remove()">取消</button>'+
    '<button class="btn btn-green" onclick="doAddClass()">✅ 建立</button></div></div>';
  document.body.appendChild(overlay);
}

async function doAddClass(){
  var title=$('newClassTitle')?.value.trim();
  var category=$('newClassCategory')?.value.trim();
  var price=$('newClassPrice')?.value;
  var coachId=$('newClassCoach')?.value.trim();
  var desc=$('newClassDesc')?.value.trim();
  if(!title||!price||!coachId){showToast('請填寫必填欄位','error');return}
  try{
    var r=await api('/admin/classes',{method:'POST',body:JSON.stringify({title:title,category:category,price_hkd:parseFloat(price),coach_id:coachId,description:desc})});
    if(!r)return;
    if(!r.ok){var e=await r.json();showToast(e.error||'建立失敗','error');return}
    showToast('✅ 課程已建立','success');
    document.querySelector('.modal-overlay')?.remove();
    loadClasses();
  }catch(e){showToast('建立課程失敗','error')}
}

// ======== Bookings ========
async function loadBookings(){
  try{
    var r=await api('/admin/bookings');
    if(!r)return;
    var d=await r.json();
    var bookings=d.bookings||[];
    var search=$('bookingSearch').value.toLowerCase();
    var filter=$('bookingStatusFilter').value;
    if(search)bookings=bookings.filter(function(b){
      return(b.booking_reference||'').toLowerCase().includes(search)||(b.user_name||'').toLowerCase().includes(search)||(b.class_title||'').toLowerCase().includes(search);
    });
    if(filter!=='all')bookings=bookings.filter(function(b){return b.status===filter});
    $('pageSub').textContent='共 '+bookings.length+' 筆';
    var body=$('bookingsBody');
    if(!bookings.length){body.innerHTML='<tr><td colspan="8" class="empty"><span class="ico">📭</span>無符合預約</td></tr>';return}
    body.innerHTML=bookings.map(function(b){
      var action='';
      if(b.status==='pending_payment'&&b.payment_status==='pending'&&(b.fps_reference||b.payme_reference)){
        action='<button class="btn btn-sm btn-green" onclick="markPaid(\''+b.id+'\')">✅ 確認收款</button>';
      }
      return '<tr><td>'+(b.booking_reference||b.id.substring(0,8))+'</td>'+
        '<td>'+(b.user_name||'—')+'</td>'+
        '<td>'+(b.class_title||'—')+'</td>'+
        '<td>'+fmtNum(b.amount)+'</td>'+
        '<td>'+st(b.payment_status)+'</td>'+
        '<td>'+(b.start_time?b.start_time.substring(0,16).replace('T',' '):'—')+'</td>'+
        '<td>'+st(b.status)+'</td>'+
        '<td>'+action+'</td></tr>';
    }).join('');
  }catch(e){showToast('載入預約失敗','error')}
}

async function markPaid(id){
  if(!confirm('確認此筆付款？'))return;
  try{
    var r=await api('/admin/approve-payment',{method:'POST',body:JSON.stringify({booking_id:id})});
    if(!r)return;
    if(!r.ok){var e=await r.json();showToast(e.error||'操作失敗','error');return}
    showToast('✅ 付款已確認','success');
    loadBookings();
    loadPayments();
  }catch(e){showToast('操作失敗','error')}
}
