# ZenPass 禪流 — Nginx Production Config
# 用法：sudo ln -sf $(pwd)/deploy/nginx.conf /etc/nginx/sites-available/zenpass
#       sudo ln -sf /etc/nginx/sites-available/zenpass /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name zenpass.hk www.zenpass.hk;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name zenpass.hk www.zenpass.hk;

    # SSL (用 certbot 或 Let's Encrypt 生成)
    ssl_certificate /etc/letsencrypt/live/zenpass.hk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zenpass.hk/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Static files (cache aggressively)
    location /assets/ {
        root /var/www/zenpass/frontend;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /icons/ {
        root /var/www/zenpass/frontend;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        root /var/www/zenpass/frontend;
        try_files $uri $uri/ /index.html;
        expires 10m;
        add_header Cache-Control "public, max-age=600";
    }

    # API proxy to Node.js backend
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 30s;
    }

    # Uploads
    location /uploads/ {
        alias /var/www/zenpass/uploads/;
        expires 7d;
    }

    # Deny access to sensitive files
    location ~ /\.(env|git|db) {
        deny all;
    }

    # gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;
}
