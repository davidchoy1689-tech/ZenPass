<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>ZenPass 禪流</title>
    <script>
      // Redirect to correct /ZenPass/ path if accessed from root
      var path = window.location.pathname;
      if (!path.startsWith('/ZenPass/')) {
        var newPath = '/ZenPass' + (path === '/' ? '' : path) + window.location.search;
        window.location.replace(newPath);
      }
    </script> />
    <link rel="stylesheet" href="css/zenpass.css" />
</head>
  <body></body>
</html>
