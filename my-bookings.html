 <!-- Cancel Reason Modal -->
<div id="cancel-modal-overlay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);z-index:1000;opacity:0;transition:opacity 0.3s;" onclick="closeCancelModal(event)">

        <label class="cancel-option" style="display:flex;align-items:center;gap:10px;padding:12px;border:1px solid #e4e4e7;border-radius:12px;cursor:pointer;transition:all 0.2s;" onclick="selectCancelReason(this,'not_interested')">
          <input type="radio" name="cancel_reason" value="not_interested" style="accent-color:#f06030;" />
          <span style="font-size:14px;">😐 唔再有興趣</span>
        </label>
        <label class="cancel-option" style="display:flex;align-items:center;gap:10px;padding:12px;border:1px solid #e4e4e7;border-radius:12px;cursor:pointer;transition:all 0.2s;" onclick="selectCancelReason(this,'found_other')">
          <input type="radio" name="cancel_reason" value="found_other" style="accent-color:#f06030;" />
          <span style="font-size:14px;">🔍 搵到其他課程</span>
        </label>
        <label class="cancel-option" style="display:flex;align-items:center;gap:10px;padding:12px;border:1px solid #e4e4e7;border-radius:12px;cursor:pointer;transition:all 0.2s;" onclick="selectCancelReason(this,'too_expensive')">
          <input type="radio" name="cancel_reason" value="too_expensive" style="accent-color:#f06030;" />
          <span style="font-size:14px;">💰 費用太貴</span>
        </label>
        <label class="cancel-option" style="display:flex;align-items:center;gap:10px;padding:12px;border:1px solid #e4e4e7;border-radius:12px;cursor:pointer;transition:all 0.2s;" onclick="selectCancelReason(this,'other')">
          <input type="radio" name="cancel_reason" value="other" style="accent-color:#f06030;" />
          <span style="font-size:14px;">✏️ 其他原因</span>
        </label>
      </div>
      <div id="cancel-reason-other-wrap" style="display:none;margin-top:10px;">
        <input type="text" id="cancel-reason-other" placeholder="請輸入原因..." style="width:100%;padding:12px;border:1px solid #e4e4e7;border-radius:12px;font-size:14px;font-family:var(--font-zh);" />
      </div>
    </div>
    <button class="btn btn-primary" id="cancel-confirm-btn" onclick="confirmCancel()" style="width:100%;padding:14px;border:none;border-radius:12px;background:#ef4444;color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--font-zh);transition:background 0.2s;">
      確認取消
    </button>
    <div class="msg" id="cancel-msg" style="font-size:13px;margin-top:8px;padding:10px;border-radius:10px;display:none;"></div>
    <button onclick="closeCancelModal()" style="display:block;width:100%;margin-top:12px;padding:10px;border:none;background:none;color:#71717a;font-size:14px;cursor:pointer;font-family:var(--font-zh);">返回</button>

 <script>
// ─── NPS 評價快取 — 記錄已提交 NPS 嘅 booking ID ───
var __npsSubmitted = {};

/** 檢查邊啲 booking 已提交 NPS */
async function loadNpsStatus(bookingIds) {
  var token = localStorage.getItem('zenpass_token') || localStorage.getItem('token');
  if (!token || !bookingIds.length) return;
  try {
    // 逐一快速檢查 — 如果在 server 搵到記錄就算
    var att = bookingIds.filter(function(id) { return id && id !== 'undefined'; });
    for (var i = 0; i < att.length; i++) {
      (function(bid) {
        // We store status locally after first submit
      })(att[i]);
    }
  } catch(e) { /* silent */ }
}

/** 標記某個 booking 已提交 NPS */
function markNpsSubmitted(bookingId) {
  __npsSubmitted[bookingId] = true;
  try {
    var stored = JSON.parse(localStorage.getItem('zenpass_nps_done') || '[]');
    if (stored.indexOf(String(bookingId)) === -1) {
      stored.push(String(bookingId));
      localStorage.setItem('zenpass_nps_done', JSON.stringify(stored));
    }
  } catch(e) {}
}

/** 檢查某個 booking 是否已提交 NPS */
function isNpsDone(bookingId) {
  if (__npsSubmitted[bookingId]) return true;
  try {
    var stored = JSON.parse(localStorage.getItem('zenpass_nps_done') || '[]');
    return stored.indexOf(String(bookingId)) !== -1;
  } catch(e) { return false; }
}

// 初始化 NPS 快取
(function initNpsCache() {
  try {
    var stored = JSON.parse(localStorage.getItem('zenpass_nps_done') || '[]');
    stored.forEach(function(id) { __npsSubmitted[id] = true; });
  } catch(e) {}
})();

// ─── Cancel Reason Modal ───
var __cancelBookingId = null;
var __selectedCancelReason = null;

function selectCancelReason(labelEl, value) {
  document.querySelectorAll('.cancel-option').forEach(function(el) {
    el.style.borderColor = '#e4e4e7';
    el.style.background = '';
  });
  labelEl.style.borderColor = '#f06030';
  labelEl.style.background = 'rgba(240,96,48,0.04)';
  labelEl.querySelector('input').checked = true;

  __selectedCancelReason = value;
  var otherWrap = document.getElementById('cancel-reason-other-wrap');
  if (value === 'other') {
    otherWrap.style.display = 'block';
  } else {
    otherWrap.style.display = 'none';
  }

  var msg = document.getElementById('cancel-msg');
  msg.className = 'msg';
  msg.style.display = 'none';
}

function showCancelModal(bookingId) {
  __cancelBookingId = bookingId;
  __selectedCancelReason = null;
  document.querySelectorAll('.cancel-option input').forEach(function(el) { el.checked = false; });
  document.querySelectorAll('.cancel-option').forEach(function(el) {
    el.style.borderColor = '#e4e4e7';
    el.style.background = '';
  });
  document.getElementById('cancel-reason-other-wrap').style.display = 'none';
  document.getElementById('cancel-reason-other').value = '';
  var msg = document.getElementById('cancel-msg');
  msg.className = 'msg';
  msg.style.display = 'none';

  var overlay = document.getElementById('cancel-modal-overlay');
  var modal = document.getElementById('cancel-modal');
  overlay.style.display = 'block';
  setTimeout(function() { overlay.style.opacity = '1'; modal.style.bottom = '0'; }, 10);
}

function closeCancelModal(e) {
  var overlay = document.getElementById('cancel-modal-overlay');
  var modal = document.getElementById('cancel-modal');
  overlay.style.opacity = '0';
  modal.style.bottom = '-100%';
  setTimeout(function() { overlay.style.display = 'none'; }, 300);
  __cancelBookingId = null;
}

async function confirmCancel() {
  var id = __cancelBookingId;
  if (!id) return;

  var reason = __selectedCancelReason;
  if (reason === 'other') {
    reason = document.getElementById('cancel-reason-other').value.trim();
    if (!reason) {
      var msg = document.getElementById('cancel-msg');
      msg.textContent = '請輸入取消原因'; msg.className = 'msg error'; msg.style.display = 'block';
      return;
    }
  }

  var btn = document.getElementById('cancel-confirm-btn');
  btn.disabled = true;
  btn.innerHTML = '取消中...';
  btn.style.opacity = '0.6';

  // Try backend API first
  var API_BASE = window.API_BASE || '';
  var token = localStorage.getItem('zenpass_token') || localStorage.getItem('token');
  var apiSuccess = false;

  if (token) {
    try {
      var resp = await fetch(API_BASE + '/bookings/' + id + '/cancel', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ reason: reason || null })
      });
      var data = await resp.json();
      if (resp.ok) {
        apiSuccess = true;
      } else {
        // Fall through to local cancel
        console.warn('API cancel failed:', data.error);
      }
    } catch(e) {
      console.warn('API cancel error:', e);
    }
  }

  // Fallback: local storage cancel
  if (!apiSuccess) {
    if (typeof ZenPassBooking !== 'undefined') {
      ZenPassBooking.cancel(id);
    }
    var booked = JSON.parse(localStorage.getItem('zenpass_booked') || '{}');
    if (booked[id]) {
      booked[id].status = 'cancelled';
      booked[id].cancel_reason = reason;
      localStorage.setItem('zenpass_booked', JSON.stringify(booked));
    }
  }

  closeCancelModal();
  renderBookings();
  showToast('✅ 預約已取消');

  btn.disabled = false;
  btn.textContent = '確認取消';
  btn.style.opacity = '1';
}

function showToast(text) {
  var el = document.createElement('div');
  el.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#18181b;color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,0.2);max-width:90%;text-align:center;animation:fadeIn 0.3s ease';
  el.textContent = text;
  document.body.appendChild(el);
  setTimeout(function() { el.style.opacity = '0'; el.style.transition = 'opacity 0.3s'; setTimeout(function() { el.remove(); }, 300); }, 2500);
}

function renderBookings() {
  var container = document.getElementById('bookings-list');
  showState('bookings-list', 'loading', { message: '正在載入預約...' });

  var data;
  try {
    data = (typeof ZenPassBooking !== 'undefined') ? ZenPassBooking.getAll() : (JSON.parse(localStorage.getItem('zenpass_booked') || '{}'));
  } catch(e) {
    showError('bookings-list', '無法載入預約資料', renderBookings);
    return;
  }

  var activeKeys = Object.keys(data).filter(function(id) { return data[id].status !== 'cancelled'; });

  if (activeKeys.length === 0) {
    showState('bookings-list', 'empty', {
      icon: '📅',
      title: '仲未有任何預約',
      message: '快去探索全城精彩課程啦！',
      action: { label: '立即探索課程 →', fn: 'window.location.href=\'explore.html\'' }
    });
    return;
  }

  hideState('bookings-list');
  container.innerHTML = '';
  activeKeys.forEach(function(id) {
    var b = data[id];
    container.innerHTML += '' +
    '<div class="booking-card"><div style="display:flex;flex-direction:column;gap:16px">' +
    '<div style="display:flex;flex-direction:column;gap:12px">' +
    '<div class="booking-title">' + escHtml(b.title || '') + '</div>' +
    (b.instructor ? '<div class="booking-instructor">' + escHtml(b.instructor) + '</div>' : '') +
    '<div class="booking-meta">📅 ' + (b.datetime || '未指定時間') + '<br>📍 ' + (b.location || '香港') + '</div>' +
    '</div>' +
    '<div style="display:flex;justify-content:space-between;align-items:center">' +
    '<span class="booking-status">已確認</span>' +
    (b.status === 'attended' ? '' : '<button onclick="showCancelModal(\'' + id + '\')" class="cancel-btn">✕ 取消預約</button>') +
    '</div>' +
    (b.status === 'attended' ? '<div style="display:flex;gap:8px;padding-top:4px">' +
      '<button onclick="window.location.href=\'nps-survey.html?booking_id=' + id + '&class_name=' + encodeURIComponent(b.title || '') + '\'" class="btn btn-sm btn-outline" ' + (isNpsDone(id) ? 'disabled style="opacity:0.5"' : '') + '>' +
        (isNpsDone(id) ? '✅ 已評價' : '📝 評價課堂') +
      '</button>' +
      '<button onclick="shareBooking(\'' + id + '\', \'' + escHtml(b.title || '') + '\')" class="btn btn-sm btn-outline">📤 分享</button>' +
    '</div>' : '') +
    '</div></div>';
  });
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
 </script>

<script>
renderBookings();
// Retry a few times for IndexedDB to initialize
var _rt = 0;
(function _tryR() {
  if (++_rt < 10) { setTimeout(function() { renderBookings(); _tryR(); }, 300); }
})();
document.addEventListener('bookingUpdated', function() {
  renderBookings();
});
</script>
