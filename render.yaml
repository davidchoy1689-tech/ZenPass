services:
  - type: web
    name: zenpass-api
    env: node
    buildCommand: npm install
    startCommand: node backend/src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: ./backend/data/zenpass.db
      - key: CORS_ORIGIN
        value: https://zenpass-api.onrender.com
      - key: ALLOW_DEMO_TOKEN
        value: "true"
      - key: JWT_SECRET
        generateValue: true
