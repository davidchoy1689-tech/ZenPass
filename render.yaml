services:
  - type: web
    name: zenpass-api
    env: node
    region: hongkong
    buildCommand: cd backend && npm install
    startCommand: cd backend && node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: ./data/zenpass.db
      - key: CORS_ORIGIN
        value: https://zenpass-api.onrender.com
      - key: PORT
        value: "3001"
      - key: ALLOW_DEMO_TOKEN
        value: "true"
      - key: JWT_SECRET
        generateValue: true
