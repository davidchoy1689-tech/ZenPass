server {
    listen 80;
    server_name zenpass.hk www.zenpass.hk;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name zenpass.hk www.zenpass.hk;

    ssl_certificate /etc/letsencrypt/live/zenpass.hk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zenpass.hk/privkey.pem;

    root /var/www/zenpass/frontend;
    index index.html;

    # Gzip compression (更全面)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain text/css text/javascript
        application/json application/javascript
        application/x-javascript text/xml application/xml
        application/rss+xml image/svg+xml
        font/woff font/woff2;

    # Security headers
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://ssl.gstatic.com https://apis.google.com https://accounts.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' https://images.pexels.com https://*.googleusercontent.com data: blob:; frame-src 'self' https://accounts.google.com; connect-src 'self' https://www.google-analytics.com https://region1.google-analytics.com https://*.googleapis.com; manifest-src 'self';" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # === Cache Policy ===

    # HTML — always fresh (用 service worker cache fallback)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }

    # JS/CSS — versioned via query string (?v=2), cache long-term
    location ~* \.(js|css)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires 1y;
        add_header "Access-Control-Allow-Origin" "*";
    }

    # Images — cache long-term
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires 1y;
        add_header "Access-Control-Allow-Origin" "*";
    }

    # Fonts — cache long-term
    location ~* \.(woff|woff2|ttf|eot)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires 1y;
        add_header "Access-Control-Allow-Origin" "*";
    }

    # JSON API responses — no cache
    location /api/ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # sitemap / robots / manifest — no cache but allow crawl
    location = /sitemap.xml { add_header Cache-Control "public, max-age=86400"; }
    location = /robots.txt { add_header Cache-Control "public, max-age=86400"; }
    location = /manifest.json { add_header Cache-Control "no-cache"; expires -1; }

    # PWA service worker — 必須 always fresh
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }

    # Fallback — SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
